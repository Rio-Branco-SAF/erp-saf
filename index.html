<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>SAF Pusher v2</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a2e;color:#eee}
h2{color:#4fc3f7}
button{background:#4fc3f7;border:none;padding:10px 20px;font-size:16px;cursor:pointer;border-radius:4px;color:#000;margin:5px}
input[type=file]{background:#333;padding:10px;border-radius:4px;width:400px;color:#eee}
#log{background:#0d1117;padding:15px;border-radius:4px;height:400px;overflow-y:auto;margin-top:15px;font-size:12px;white-space:pre}
.ok{color:#56d364} .err{color:#f85149} .info{color:#79c0ff}
</style></head><body>
<h2>SAF ERP - Pusher de Arquivos</h2>
<p>Selecione o arquivo <strong>files_payload.json</strong>:</p>
<input type="file" id="jsonFile" accept=".json">
<br><br>
<button onclick="pushAll()">🚀 Enviar Arquivos para GitHub</button>
<button onclick="checkStatus()">🔍 Verificar Status</button>
<div id="log">Aguardando...</div>

<script>
const TOKEN = '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';
const REPO = 'Rio-Branco-SAF/erp-saf';
const NEEDS_PUSH = [
  "DEPLOY.md",
  "backend/db/schema_metas.sql",
  "backend/db/schema_investidores.sql",
  "backend/db/schema_pedidos.sql",
  "backend/db/schema_relatorios.sql",
  "backend/db/seed_investidores.sql",
  "backend/db/schema_atletas.sql",
  "backend/db/init.sql",
  "frontend/atletas.html",
  "frontend/financeiro.html",
  "frontend/index.html",
  "frontend/investidores.html",
  "frontend/jogos.html",
  "frontend/metas.html",
  "frontend/pedidos.html",
  "frontend/relatorios.html"
];

const log = document.getElementById('log');
function addLog(msg, cls='') {
  const ts = new Date().toLocaleTimeString();
  log.innerHTML += `<span class="${cls}">[${ts}] ${msg}\n</span>`;
  log.scrollTop = log.scrollHeight;
}

async function pushFile(path, content) {
  const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
  const h = {Authorization: 'token '+TOKEN, Accept: 'application/vnd.github.v3+json'};
  let sha;
  try {
    const r = await fetch(url, {headers: h});
    if (r.ok) { const j = await r.json(); sha = j.sha; }
  } catch(e) {}
  const b = {message: 'push '+path, content};
  if (sha) b.sha = sha;
  const r2 = await fetch(url, {method:'PUT', headers:{...h,'Content-Type':'application/json'}, body: JSON.stringify(b)});
  return r2.status;
}

async function pushAll() {
  const fileInput = document.getElementById('jsonFile');
  if (!fileInput.files[0]) { addLog('Selecione o arquivo files_payload.json primeiro!', 'err'); return; }
  
  addLog('Lendo files_payload.json...', 'info');
  const text = await fileInput.files[0].text();
  let allFiles;
  try { allFiles = JSON.parse(text); } catch(e) { addLog('Erro: JSON inválido - '+e.message, 'err'); return; }
  
  const filesMap = {};
  for (const f of allFiles) filesMap[f.path] = f.content;
  
  addLog(`Encontrados ${allFiles.length} arquivos no JSON`, 'info');
  addLog(`Enviando ${NEEDS_PUSH.length} arquivos necessários...`, 'info');
  
  for (const path of NEEDS_PUSH) {
    if (!filesMap[path]) { addLog(`SKIP: ${path} não encontrado no JSON`, 'err'); continue; }
    addLog(`Enviando: ${path}...`, 'info');
    const status = await pushFile(path, filesMap[path]);
    if (status === 200 || status === 201) {
      addLog(`✓ ${path} (${status})`, 'ok');
    } else {
      addLog(`✗ ${path} (${status})`, 'err');
    }
    await new Promise(r => setTimeout(r, 100));
  }
  addLog('\n=== CONCLUÍDO ===', 'ok');
}

async function checkStatus() {
  addLog('Verificando status dos arquivos...', 'info');
  const h = {Authorization: 'token '+TOKEN, Accept: 'application/vnd.github.v3+json'};
  
  async function listDir(path) {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {headers: h});
    if (!r.ok) return [];
    const j = await r.json();
    if (!Array.isArray(j)) return [{path: j.path, size: j.size}];
    let files = [];
    for (const item of j) {
      if (item.type === 'file') files.push({path: item.path, size: item.size});
      else if (item.type === 'dir') {
        const sub = await listDir(item.path);
        files = files.concat(sub);
      }
    }
    return files;
  }
  
  const all = await listDir('');
  addLog(`Total de arquivos no repo: ${all.length}`, 'ok');
  for (const f of all.sort((a,b)=>a.path.localeCompare(b.path))) {
    addLog(`  ${f.path}: ${f.size} bytes`);
  }
}
</script></body></html>
