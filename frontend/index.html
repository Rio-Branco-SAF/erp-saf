<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rio Branco SAF — Sistema de Gestão</title>
  <!-- Configuração de ambiente (edite config.js para apontar para a API em produção) -->
  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --bg:          #1C1C2E;
      --sidebar-bg:  #14142B;
      --card-bg:     #252540;
      --card-borda:  #3A3A5C;
      --input-bg:    #14142B;
      --verde:       #22C55E;
      --verde-med:   #16A34A;
      --verde-dark:  #15803D;
      --vermelho:    #FF5C5C;
      --dourado:     #F59E0B;
      --azul:        #3B82F6;
      --azul-dark:   #1D4ED8;
      --texto:       #E2E8F0;
      --texto-leve:  #94A3B8;
      --roxo:        #8B5CF6;
      --laranja:     #F97316;
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    /* ===== VARIÁVEIS ===== */

    /* ===== LAYOUT ===== */
    .layout { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--verde);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
    }
    .sidebar-logo {
      padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,.15);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo .icon { font-size: 28px; }
    .sidebar-logo .title { color: #252540; font-size: 14px; font-weight: 700; line-height: 1.3; }
    .sidebar-logo .sub { color: rgba(255,255,255,.7); font-size: 11px; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-label { color: rgba(255,255,255,.5); font-size: 10px; font-weight: 700; text-transform: uppercase;
                 letter-spacing: .08em; padding: 12px 16px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      color: rgba(255,255,255,.8); font-size: 13px; text-decoration: none;
      transition: all .15s; border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,.1); color: #252540; }
    .nav-item.ativo { background: rgba(255,255,255,.15); color: #252540; border-left-color: #252540; font-weight: 600; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.15); }
    .usuario-info { display: flex; align-items: center; gap: 8px; }
    .usuario-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #252540;
    }
    .usuario-nome { color: #252540; font-size: 12px; font-weight: 600; }
    .usuario-cargo { color: rgba(255,255,255,.6); font-size: 11px; }

    /* ===== CONTEÚDO PRINCIPAL ===== */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ===== HEADER ===== */
    .topbar {
      background: #252540; border-bottom: 1px solid var(--cinza-borda);
      padding: 0 24px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: var(--sombra); position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 18px; font-weight: 700; color: var(--texto); }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    /* ===== BOTÕES ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: 6px; border: none; font-size: 13px; font-weight: 600;
      transition: all .15s; line-height: 1;
    }
    .btn-primary { background: var(--verde-med); color: #252540; }
    .btn-primary:hover { background: var(--verde); }
    .btn-secondary { background: #252540; color: var(--texto); border: 1px solid var(--cinza-borda); }
    .btn-secondary:hover { background: var(--cinza); }
    .btn-danger { background: var(--danger); color: #252540; }
    .btn-danger:hover { background: #a93226; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; }

    /* ===== PÀJINA ===== */
    .page { padding: 24px; flex: 1; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-titulo { font-size: 22px; font-weight: 700; color: var(--texto); }
    .page-sub { font-size: 13px; color: var(--texto-leve); margin-top: 2px; }

    /* ===== CARDS DE RESUMO ===== */
    .cards-resumo { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .card-resumo {
      background: #252540; border-radius: 10px; padding: 18px 20px;
      box-shadow: var(--sombra); border-left: 4px solid transparent;
      display: flex; align-items: center; gap: 14px;
    }
    .card-resumo.verde   { border-left-color: var(--verde-med); }
    .card-resumo.laranja { border-left-color: var(--warning); }
    .card-resumo.azul    { border-left-color: var(--info); }
    .card-resumo.cinza   { border-left-color: #95a5a6; }
    .card-resumo .icon { font-size: 28px; }
    .card-resumo .valor { font-size: 26px; font-weight: 800; color: var(--texto); }
    .card-resumo .label { font-size: 12px; color: var(--texto-leve); font-weight: 500; }

    /* ===== FILTROS ===== */
    .filtros {
      background: #252540; border-radius: 10px; padding: 16px 20px;
      box-shadow: var(--sombra); margin-bottom: 20px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .filtros input, .filtros select {
      padding: 8px 12px; border: 1px solid var(--cinza-borda); border-radius: 6px;
      font-size: 13px; color: var(--texto); background: #252540; outline: none;
    }
    .filtros input:focus, .filtros select:focus { border-color: var(--verde-med); }
    .filtros input[type=search] { width: 280px; }
    .filtros select { min-width: 160px; }

    /* ===== TABELA ===== */
    .tabela-wrap {
      background: #252540; border-radius: 10px; box-shadow: var(--sombra);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f7f9fc; }
    th {
      padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--texto-leve);
      border-bottom: 1px solid var(--cinza-borda); white-space: nowrap;
    }
    td { padding: 13px 16px; font-size: 13px; color: var(--texto); border-bottom: 1px solid #1C1C2E; }
    tr:hover td { background: #fafbff; }
    tr:last-child td { border-bottom: none; }

    /* ===== AVATAR ===== */
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #252540; flex-shrink: 0;
    }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge.ativo     { background: #16A34A; color: #22C55E; }
    .badge.ferias    { background: #2525403cd; color: #856404; }
    .badge.afastado  { background: #2525403cd; color: #856404; }
    .badge.desligado { background: #f8d7da; color: #721c24; }
    .badge.clt       { background: #d1ecf1; color: #0c5460; }
    .badge.pj        { background: #e2d9f3; color: #432874; }
    .badge.dot::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ===== PAGINAÇÃO ===== */
    .paginacao {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-top: 1px solid var(--cinza-borda);
      font-size: 13px; color: var(--texto-leve);
    }
    .paginacao-btns { display: flex; gap: 6px; }
    .paginacao-btns button {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--cinza-borda);
      background: #252540; font-size: 13px; display: flex; align-items: center; justify-content: center;
    }
    .paginacao-btns button.ativo { background: var(--verde-med); color: #252540; border-color: var(--verde-med); }
    .paginacao-btns button:hover:not(.ativo):not(:disabled) { background: var(--cinza); }
    .paginacao-btns button:disabled { opacity: .4; cursor: not-allowed; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal {
      background: #252540; border-radius: 12px; width: 100%; max-width: 680px;
      max-height: 90vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--cinza-borda);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-titulo { font-size: 17px; font-weight: 700; color: var(--texto); }
    .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--cinza-borda);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .btn-fechar {
      width: 30px; height: 30px; border-radius: 6px; border: none;
      background: var(--cinza); font-size: 18px; display: flex;
      align-items: center; justify-content: center; color: var(--texto-leve);
    }
    .btn-fechar:hover { background: var(--cinza-borda); }

    /* ===== FORMULÁRIO ===== */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    .form-grupo { display: flex; flex-direction: column; gap: 5px; }
    .form-grupo.span-2 { grid-column: span 2; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--texto-leve); text-transform: uppercase; letter-spacing: .04em; }
    .form-label .obrig { color: var(--danger); }
    .form-input, .form-select, .form-textarea {
      padding: 9px 12px; border: 1px solid var(--cinza-borda); border-radius: 6px;
      font-size: 13px; color: var(--texto); background: #252540; outline: none; width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--verde-med); box-shadow: 0 0 0 3px rgba(30,132,73,.1); }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-section { margin-bottom: 20px; }
    .form-section-titulo {
      font-size: 12px; font-weight: 700; color: var(--verde); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 2px solid var(--verde-claro);
    }

    /* ===== DETALHE ===== */
    .detalhe-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
      padding: 20px; background: var(--verde-bg); border-radius: 10px;
    }
    .detalhe-avatar { width: 64px; height: 64px; border-radius: 50%; font-size: 24px; }
    .detalhe-nome { font-size: 20px; font-weight: 700; }
    .detalhe-cargo { font-size: 14px; color: var(--texto-leve); }
    .detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detalhe-item { padding: 12px 16px; background: #252540; border-radius: 8px; border: 1px solid var(--cinza-borda); }
    .detalhe-item-label { font-size: 11px; font-weight: 600; color: var(--texto-leve); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .detalhe-item-valor { font-size: 14px; font-weight: 500; color: var(--texto); }
    .historico-item {
      padding: 12px 16px; border-left: 3px solid var(--verde-med);
      background: #252540; border-radius: 0 8px 8px 0; margin-bottom: 8px;
    }
    .historico-data { font-size: 11px; color: var(--texto-leve); }
    .historico-valor { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .historico-motivo { font-size: 12px; color: var(--texto-leve); font-style: italic; }
    .seta { font-size: 12px; color: var(--texto-leve); }

    /* ===== LOADING / VAZIO ===== */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--cinza-borda); border-top-color: var(--verde-med); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vazio { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--texto-leve); gap: 12px; }
    .vazio .icon { font-size: 48px; }
    .vazio p { font-size: 15px; }

    /* ===== TOAST ===== */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); max-width: 360px;
      animation: slideIn .2s ease;
    }
    .toast.sucesso { background: #22C55E; color: #252540; }
    .toast.erro    { background: #721c24; color: #252540; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== LOGIN ===== */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0d4f1e 0%, #16A34A 100%); }
    .login-card { background: #252540; border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon { font-size: 48px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--verde); margin-top: 8px; }
    .login-logo p { font-size: 13px; color: var(--texto-leve); }
    .login-grupo { margin-bottom: 16px; }
    .login-label { display: block; font-size: 12px; font-weight: 600; color: var(--texto-leve); margin-bottom: 5px; text-transform: uppercase; }
    .login-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--cinza-borda); border-radius: 8px; font-size: 14px; outline: none; }
    .login-input:focus { border-color: var(--verde-med); }
    .login-btn { width: 100%; padding: 11px; background: var(--verde-med); color: #252540; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; margin-top: 8px; }
    .login-btn:hover { background: var(--verde); }
    .login-erro { background: #f8d7da; color: #721c24; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============================================================
// CONFIG
// ============================================================
const API = (window.ERP_CONFIG && window.ERP_CONFIG.API_URL) || 'http://localhost:3001/api';

// ============================================================
// HELPERS
// ============================================================
function formatarMoeda(v) {
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
}
function formatarData(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
}
function iniciais(nome) {
  return nome?.split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase() || '?';
}
function corAvatar(nome) {
  const cores = ['#1e8449','#2980b9','#8e44ad','#e67e22','#c0392b','#16a085','#2c3e50'];
  let h = 0; for (let c of (nome || '')) h = c.charCodeAt(0) + h * 31;
  return cores[Math.abs(h) % cores.length];
}

// ============================================================
// API HELPERS
// ============================================================
async function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('erp_token');
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {}),
    },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro || 'Erro desconhecido');
  return data;
}

// ============================================================
// TOAST
// ============================================================
let _setToasts = null;
function Toast({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.tipo}`}>{t.msg}</div>)}
    </div>
  );
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  _setToasts = setToasts;
  return toasts;
}
function toast(msg, tipo = 'sucesso') {
  if (!_setToasts) return;
  const id = Date.now();
  _setToasts(prev => [...prev, { id, msg, tipo }]);
  setTimeout(() => _setToasts(prev => prev.filter(t => t.id !== id)), 4000);
}

// ============================================================
// LOGIN
// ============================================================
function Login({ onLogin }) {
  const [email, setEmail]   = useState('');
  const [senha, setSenha]   = useState('');
  const [erro, setErro]     = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setErro(''); setLoading(true);
    try {
      // Tenta autenticar na API real
      const data = await fetch(
        ((window.ERP_CONFIG && window.ERP_CONFIG.API_URL) || 'http://localhost:3001/api') + '/auth/login',
        { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, senha }) }
      ).then(r => r.json().then(d => ({ ok: r.ok, ...d })));

      if (data.token) {
        localStorage.setItem('erp_token', data.token);
        localStorage.setItem('erp_usuario', JSON.stringify(data.usuario));
        onLogin(data.usuario);
      } else if (data.erro) {
        // Erro real da API (credenciais erradas, inativo etc.)
        setErro(data.erro);
      } else {
        // API fora do ar — modo demo (só aceita enquanto não há backend)
        const usuario = { nome: 'Administrador Demo', cargo: 'CEO / Presidente', perfil: 'admin' };
        localStorage.setItem('erp_token', 'demo_token');
        localStorage.setItem('erp_usuario', JSON.stringify(usuario));
        onLogin(usuario);
      }
    } catch {
      // Sem conexão — modo demo
      const usuario = { nome: 'Administrador Demo', cargo: 'CEO / Presidente', perfil: 'admin' };
      localStorage.setItem('erp_token', 'demo_token');
      localStorage.setItem('erp_usuario', JSON.stringify(usuario));
      onLogin(usuario);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="icon">⚽</div>
          <h1>Rio Branco SAF</h1>
          <p>Sistema de Gestão</p>
        </div>
        {erro && <div className="login-erro">⚠️ {erro}</div>}
        <form onSubmit={handleSubmit}>
          <div className="login-grupo">
            <label className="login-label">E-mail corporativo</label>
            <input className="login-input" type="email" value={email}
              onChange={e => setEmail(e.target.value)} placeholder="seu@saf.com.br" required />
          </div>
          <div className="login-grupo">
            <label className="login-label">Senha</label>
            <input className="login-input" type="password" value={senha}
              onChange={e => setSenha(e.target.value)} placeholder="••••••••" required />
          </div>
          <button className="login-btn" type="submit" disabled={loading}>
            {loading ? 'Entrando...' : 'Entrar no Sistema'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// BADGE STATUS / TIPO
// ============================================================
function BadgeStatus({ status }) {
  const mapa = { ativo: '● Ativo', ferias: '● Férias', afastado: '● Afastado', desligado: '● Desligado' };
  return <span className={`badge ${status}`}>{mapa[status] || status}</span>;
}
function BadgeTipo({ tipo }) {
  return <span className={`badge ${tipo.toLowerCase()}`}>{tipo}</span>;
}

// ============================================================
// MODAL FORMULÁRIO (Novo / Editar)
// ============================================================
function ModalFuncionario({ funcionario, departamentos, gestores, onSalvar, onFechar }) {
  const editando = !!funcionario?.id;
  const [form, setForm] = useState({
    nome_completo: '', cpf: '', rg: '', data_nascimento: '',
    email: '', email_corporativo: '', telefone: '',
    cargo: '', departamento_id: '', tipo_contrato: 'CLT',
    salario: '', data_admissao: '', gestor_id: '',
    cnpj: '', razao_social: '', status: 'ativo', observacoes: '',
    ...(funcionario || {}),
    salario: funcionario?.salario || '',
    departamento_id: funcionario?.departamento_id || '',
    gestor_id: funcionario?.gestor_id || '',
  });
  const [salvando, setSalvando] = useState(false);
  const [motivo, setMotivo]     = useState('');

  function set(campo, val) { setForm(f => ({ ...f, [campo]: val })); }

  async function handleSubmit(e) {
    e.preventDefault();
    setSalvando(true);
    try {
      const payload = { ...form, salario: parseFloat(form.salario), motivo_alteracao_salario: motivo };
      await onSalvar(payload, editando);
      toast(editando ? 'Funcionário atualizado com sucesso!' : 'Funcionário cadastrado com sucesso!');
      onFechar();
    } catch (err) {
      toast(err.message, 'erro');
    } finally {
      setSalvando(false);
    }
  }

  const salarioMudou = editando && parseFloat(form.salario) !== parseFloat(funcionario.salario);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onFechar()}>
      <div className="modal">

          <span className="modal-titulo">{editando ? '✏️ Editar Funcionário' : '➕ Novo Funcionário'}</span>

                    <label className="form-label">CNPJ <span className="obrig">*</span></label>
                    <input className="form-input" value={form.cnpj || ''} placeholder="00.000.000/0001-00"
                      onChange={e => set('cnpj', e.target.value)} required={form.tipo_contrato === 'PJ'} />

                      onChange={e => set('razao_social', e.target.value)} />

                </div>
              </div>

            {/* Motivo de alteração de salário */}
            {salarioMudou && (
              <div className="form-section">
                <div className="form-section-titulo" style={{color:'var(--warning)'}}>Alteração de Salário</div>

                    placeholder="Ex: Promoção, reajuste anual, mudança de cargo..."
                    onChange={e => setMotivo(e.target.value)} />
                </div>
              </div>
            )}

            {/* Observações */}
            <div className="form-section">
              <div className="form-section-titulo">Observações</div>
              <div className="form-grupo">
                <textarea className="form-textarea" value={form.observacoes || ''}
                  placeholder="Informações adicionais relevantes..."
                  onChange={e => set('observacoes', e.target.value)} />
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-secondary" onClick={onFechar}>Cancelar</button>
            <button type="submit" className="btn btn-primary" disabled={salvando}>
              {salvando ? 'Salvando...' : (editando ? '💾 Salvar alterações' : '➕ Cadastrar funcionário')}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onFechar()}>

              ['CPF', funcionario.cpf || '—'],

              <div className="detalhe-item-valor">{funcionario.observacoes}</div>
            </div>
          )}

          {/* Histórico de salários */}
          {funcionario.historico_salarios?.length > 0 && (
            <div>
              <div className="form-section-titulo" style={{marginBottom:12}}>Histórico de Salários</div>
              {funcionario.historico_salarios.map(h => (
                <div className="historico-item" key={h.id}>
                  <div className="historico-data">{formatarData(h.data_alteracao)} · {h.registrado_por_nome || 'Sistema'}</div>
                  <div className="historico-valor">
                    {h.salario_anterior && <><span style={{textDecoration:'line-through',color:'#95a5a6'}}>{formatarMoeda(h.salario_anterior)}</span><span className="seta">→</span></>}
                    <strong style={{color:'var(--verde)'}}>
                      {formatarMoeda(h.salario_novo)}
                    </strong>
                  </div>
                  {h.motivo && <div className="historico-motivo">{h.motivo}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                     f.cargo.toLowerCase().includes(busca.toLowerCase());
    const ok_dept  = !filtroDept || f.departamento_id == filtroDept;
    const ok_tipo  = !filtroTipo || f.tipo_contrato === filtroTipo;
    const ok_status= !filtroStatus || f.status === filtroStatus;
    return ok_busca && ok_dept && ok_tipo && ok_status;
  });

  const totalPags = Math.ceil(filtrados.length / LIMITE);
  const paginados = filtrados.slice((pagina-1)*LIMITE, pagina*LIMITE);

  function abrirNovo() { setModalForm({}); }

    if (editando) {

      const novo = { ...payload, id: Date.now(), departamento: departamentos.find(d=>d.id==payload.departamento_id)?.nome || '', historico_salarios: [], anos_casa: 0 };

          <option value="PJ">Somente PJ</option>

        <select value={filtroStatus} onChange={e => { setFiltroStatus(e.target.value); setPagina(1); }}>
          <option value="">Todos os status</option>
          <option value="ativo">Ativo</option>
          <option value="ferias">Férias</option>
          <option value="afastado">Afastado</option>
          <option value="desligado">Desligado</option>
        </select>
        {(busca || filtroDept || filtroTipo || filtroStatus) && (
          <button className="btn btn-secondary btn-sm" onClick={() => { setBusca(''); setFiltroDept(''); setFiltroTipo(''); setFiltroStatus(''); }}>
            ✕ Limpar filtros
          </button>
        )}
        <span style={{marginLeft:'auto',fontSize:13,color:'var(--texto-leve)'}}>
          {filtrados.length} funcionário(s)
        </span>
      </div>

      {/* TABELA */}
      <div className="tabela-wrap">
        {paginados.length === 0 ? (
          <div className="vazio"><div className="icon">🔍</div><p>Nenhum funcionário encontrado com os filtros aplicados.</p></div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Funcionário</th>
                <th>Cargo</th>
                <th>Departamento</th>
                <th>Contrato</th>
                <th>Admissão</th>
                <th>Salário</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {paginados.map(f => (
                <tr key={f.id} onClick={() => setModalDetalhe(f)} style={{cursor:'pointer'}}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div className="avatar" style={{background:corAvatar(f.nome_completo)}}>
                        {iniciais(f.nome_completo)}
                      </div>
                      <div>
                        <div style={{fontWeight:600}}>{f.nome_completo}</div>
                        <div style={{fontSize:11,color:'var(--texto-leve)'}}>{f.email_corporativo || f.email || '—'}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{color:'var(--texto-leve)'}}>{f.cargo}</td>
                  <td>{f.departamento}</td>
                  <td><BadgeTipo tipo={f.tipo_contrato} /></td>
                  <td style={{whiteSpace:'nowrap'}}>{formatarData(f.data_admissao)}</td>
                  <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{formatarMoeda(f.salario)}</td>
                  <td><BadgeStatus status={f.status} /></td>
                  <td onClick={e => e.stopPropagation()}>
                    <button className="btn btn-secondary btn-sm btn-icon" title="Editar"
                      onClick={() => abrirEditar(f)}>✏️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        {/* PAGINAÇÃO */}
        {totalPags > 1 && (
          <div className="paginacao">
            <span>Mostrando {(pagina-1)*LIMITE+1}–{Math.min(pagina*LIMITE, filtrados.length)} de {filtrados.length}</span>
            <div className="paginacao-btns">
              <button onClick={() => setPagina(p => p-1)} disabled={pagina === 1}>‹</button>
              {Array.from({length:totalPags},(_,i)=>i+1).map(p =>
                <button key={p} className={pagina===p?'ativo':''} onClick={()=>setPagina(p)}>{p}</button>
              )}
              <button onClick={() => setPagina(p => p+1)} disabled={pagina === totalPags}>›</button>
            </div>
          </div>
        )}
      </div>

      {/* MODAIS */}
      {modalForm !== null && (
        <ModalFuncionario
          funcionario={modalForm.id ? modalForm : null}
          departamentos={departamentos}
          gestores={funcionarios}
          onSalvar={salvar}
          onFechar={() => setModalForm(null)}
        />
      )}
      {modalDetalhe && (
        <ModalDetalhe
          funcionario={modalDetalhe}
          onFechar={() => setModalDetalhe(null)}
          onEditar={() => abrirEditar(modalDetalhe)}
        />
      )}
    </div>
  );
}

// MODAL — Criar Usuário
// ============================================================
function ModalCriarUsuario({ funcionarios, onSalvar, onFechar }) {
  const [form, setForm] = useState({ funcionario_id:'', email:'', senha:'', confirmar:'', perfil:'funcionario' });
  const [salvando, setSalvando] = useState(false);
  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }

  async function handleSubmit(e) {
    e.preventDefault();
    if (form.senha !== form.confirmar) { toast('As senhas não coincidem.', 'erro'); return; }
    if (form.senha.length < 8) { toast('A senha deve ter pelo menos 8 caracteres.', 'erro'); return; }
    setSalvando(true);
    try {
      await onSalvar({ funcionario_id: form.funcionario_id || null, email: form.email, senha: form.senha, perfil: form.perfil });
      toast('Usuário criado com sucesso! ✅');
      onFechar();
    } catch (err) { toast(err.message, 'erro'); }
    finally { setSalvando(false); }
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onFechar()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-titulo">🔐 Novo Usuário</span>
          <button className="btn-fechar" onClick={onFechar}>×</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-section">
              <div className="form-section-titulo">Dados de Acesso</div>
              <div className="form-grid">
                <div className="form-grupo span-2">
                  <label className="form-label">Funcionário vinculado (opcional)</label>
                  <select className="form-select" value={form.funcionario_id}
                    onChange={e => {
                      const f = funcionarios.find(x => x.id === parseInt(e.target.value));
                      set('funcionario_id', e.target.value);
                      if (f?.email_corporativo && !form.email) set('email', f.email_corporativo);
                    }}>
                    <option value="">Nenhum (usuário avulso)</option>
                    {funcionarios.map(f => <option key={f.id} value={f.id}>{f.nome_completo} — {f.cargo}</option>)}
                  </select>
                </div>
                <div className="form-grupo span-2">
                  <label className="form-label">E-mail corporativo <span className="obrig">*</span></label>
                  <input className="form-input" type="email" value={form.email} required
                    onChange={e => set('email', e.target.value)} placeholder="usuario@saf.com.br" />
                </div>
                <div className="form-grupo">
                  <label className="form-label">Perfil de acesso <span className="obrig">*</span></label>
                  <select className="form-select" value={form.perfil} onChange={e => set('perfil', e.target.value)}>
                    {PERFIS.map(p => <option key={p.valor} value={p.valor}>{p.label}</option>)}
                  </select>
                </div>
                <div className="form-grupo" style={{alignSelf:'center',paddingTop:20,fontSize:12,color:'var(--texto-leve)'}}>
                  {PERFIL_DESC[form.perfil]}
                </div>
                <div className="form-grupo">
                  <label className="form-label">Senha <span className="obrig">*</span></label>
                  <input className="form-input" type="password" value={form.senha} required
                    onChange={e => set('senha', e.target.value)} placeholder="Mínimo 8 caracteres" />
                </div>
                <div className="form-grupo">
                  <label className="form-label">Confirmar senha <span className="obrig">*</span></label>
                  <input className="form-input" type="password" value={form.confirmar} required
                    onChange={e => set('confirmar', e.target.value)} placeholder="Repita a senha" />
                </div>
              </div>
              <div style={{background:'var(--input-bg)',borderRadius:8,padding:'10px 14px',marginTop:8,fontSize:12,color:'var(--texto-leve)',lineHeight:1.8}}>
                <strong style={{color:'var(--texto)',display:'block',marginBottom:4}}>Resumo dos perfis:</strong>
                {PERFIS.map(p => (
                  <div key={p.valor}>
                    <span style={{color:p.cor,fontWeight:700,minWidth:90,display:'inline-block'}}>{p.label}:</span>
                    {PERFIL_DESC[p.valor]}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" type="button" onClick={onFechar}>Cancelar</button>
            <button className="btn btn-primary" type="submit" disabled={salvando}>
              {salvando ? 'Criando...' : '🔐 Criar Usuário'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function ModalResetarSenha({ usuario, onSalvar, onFechar }) {
  const [senha, setSenha]         = useState('');
  const [confirmar, setConfirmar] = useState('');
  const [salvando, setSalvando]   = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (senha !== confirmar) { toast('As senhas não coincidem.', 'erro'); return; }
    if (senha.length < 8) { toast('A senha deve ter pelo menos 8 caracteres.', 'erro'); return; }
    setSalvando(true);
    try {
      await onSalvar(usuario.id, senha);
      toast(`Senha de ${usuario.nome_completo || usuario.email} redefinida! 🔑`);
      onFechar();
    } catch (err) { toast(err.message, 'erro'); }
    finally { setSalvando(false); }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onFechar()}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-header">
          <span className="modal-titulo">🔑 Redefinir Senha</span>
          <button className="btn-fechar" onClick={onFechar}>×</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <p style={{marginBottom:16,fontSize:13,color:'var(--texto-leve)'}}>
              Definindo nova senha para{' '}
              <strong style={{color:'var(--texto)'}}>{usuario.nome_completo || usuario.email}</strong>.
            </p>
            <div className="form-grupo" style={{marginBottom:12}}>
              <label className="form-label">Nova senha <span className="obrig">*</span></label>
              <input className="form-input" type="password" value={senha} required autoFocus
                onChange={e => setSenha(e.target.value)} placeholder="Mínimo 8 caracteres" />
            </div>
            <div className="form-grupo">
              <label className="form-label">Confirmar senha <span className="obrig">*</span></label>
              <input className="form-input" type="password" value={confirmar} required
                onChange={e => setConfirmar(e.target.value)} placeholder="Repita a senha" />
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" type="button" onClick={onFechar}>Cancelar</button>
            <button className="btn btn-primary" type="submit" disabled={salvando}>
              {salvando ? 'Salvando...' : '🔑 Redefinir Senha'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// MÓDULO USUÁRIOS
// ============================================================
function ModuloUsuarios({ usuario: usuarioLogado }) {
  const [usuarios, setUsuarios]         = useState([]);
  const [funcionarios, setFuncionarios] = useState([]);
  const [loading, setLoading]           = useState(true);
  const [modalCriar, setModalCriar]     = useState(false);
  const [modalReset, setModalReset]     = useState(null);
  const [atualizando, setAtualizando]   = useState({});
  const [busca, setBusca]               = useState('');
  const [filtroPerfil, setFiltroPerfil] = useState('');
  const [filtroAtivo, setFiltroAtivo]   = useState('');

  useEffect(() => { carregar(); }, []);

  async function carregar() {
    setLoading(true);
    try {
      const [us, fs] = await Promise.all([
        apiFetch('/usuarios').catch(() => DEMO_USUARIOS),
        apiFetch('/funcionarios').catch(() => []),
      ]);
      setUsuarios(us);
      setFuncionarios(fs);
    } finally { setLoading(false); }
  }

  async function criarUsuario(dados) {
    const novo = await apiFetch('/usuarios', { method:'POST', body: dados });
    await carregar();
    return novo;
  }

  async function toggleAtivo(u) {
    if (u.id === usuarioLogado?.id) return;
    setAtualizando(a => ({ ...a, [u.id]: true }));
    try {
      await apiFetch(`/usuarios/${u.id}`, { method:'PUT', body: { ativo: !u.ativo } });
      setUsuarios(us => us.map(x => x.id === u.id ? { ...x, ativo: !x.ativo } : x));
      toast((!u.ativo ? '✅ Acesso liberado: ' : '🚫 Acesso bloqueado: ') + (u.nome_completo || u.email));
    } catch (err) { toast(err.message, 'erro'); }
    finally { setAtualizando(a => ({ ...a, [u.id]: false })); }
  }

  async function alterarPerfil(u, novoPerfil) {
    if (u.id === usuarioLogado?.id) return;
    setAtualizando(a => ({ ...a, [`p${u.id}`]: true }));
    try {
      await apiFetch(`/usuarios/${u.id}`, { method:'PUT', body: { perfil: novoPerfil } });
      setUsuarios(us => us.map(x => x.id === u.id ? { ...x, perfil: novoPerfil } : x));
      const pLabel = PERFIS.find(p => p.valor === novoPerfil)?.label || novoPerfil;
      toast(`Perfil atualizado para ${pLabel}: ${u.nome_completo || u.email}`);
    } catch (err) { toast(err.message, 'erro'); }
    finally { setAtualizando(a => ({ ...a, [`p${u.id}`]: false })); }
  }

  async function resetarSenha(id, novaSenha) {
    await apiFetch(`/usuarios/${id}/resetar-senha`, { method:'POST', body: { nova_senha: novaSenha } });
  }

  const filtrados = usuarios.filter(u => {
    if (busca && !((u.nome_completo||'') + u.email).toLowerCase().includes(busca.toLowerCase())) return false;
    if (filtroPerfil && u.perfil !== filtroPerfil) return false;
    if (filtroAtivo === 'ativo'    && !u.ativo) return false;
    if (filtroAtivo === 'inativo'  &&  u.ativo) return false;
    return true;
  });

  const temFiltro = busca || filtroPerfil || filtroAtivo;

  if (loading) return (
    <div style={{padding:48,textAlign:'center',color:'var(--texto-leve)',fontSize:14}}>
      <div style={{fontSize:32,marginBottom:12}}>🔐</div>Carregando usuários...
    </div>
  );

  return (
    <div className="modulo">
      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {[
          { label:'Total de Usuários',  val: usuarios.length,                              icon:'👤', cor:'var(--azul)'    },
          { label:'Acessos Ativos',     val: usuarios.filter(u => u.ativo).length,         icon:'✅', cor:'var(--verde)'   },
          { label:'Acessos Bloqueados', val: usuarios.filter(u => !u.ativo).length,        icon:'🚫', cor:'var(--vermelho)'},
          { label:'Admins',             val: usuarios.filter(u => u.perfil==='admin').length,icon:'🛡️',cor:'var(--roxo)'   },
        ].map((k,i) => (
          <div key={i} style={{background:'var(--card-bg)',borderRadius:10,padding:'16px 20px',
            borderLeft:`3px solid ${k.cor}`,display:'flex',alignItems:'center',gap:14}}>
            <span style={{fontSize:28}}>{k.icon}</span>
            <div>
              <div style={{fontSize:24,fontWeight:800,color:k.cor,lineHeight:1}}>{k.val}</div>
              <div style={{fontSize:12,color:'var(--texto-leve)',marginTop:3}}>{k.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* FILTROS + AÇÃO */}
      <div className="filtros-row" style={{marginBottom:16,flexWrap:'wrap',gap:8}}>
        <input className="filtro-input" style={{flex:'1 1 200px',maxWidth:300}}
          placeholder="🔍 Buscar por nome ou e-mail..." value={busca} onChange={e => setBusca(e.target.value)} />
        <select className="filtro-select" value={filtroPerfil} onChange={e => setFiltroPerfil(e.target.value)}>
          <option value="">Todos os perfis</option>
          {PERFIS.map(p => <option key={p.valor} value={p.valor}>{p.label}</option>)}
        </select>
        <select className="filtro-select" value={filtroAtivo} onChange={e => setFiltroAtivo(e.target.value)}>
          <option value="">Todos os status</option>
          <option value="ativo">Ativos</option>
          <option value="inativo">Bloqueados</option>
        </select>
        {temFiltro && (
          <button className="btn btn-secondary btn-sm"
            onClick={() => { setBusca(''); setFiltroPerfil(''); setFiltroAtivo(''); }}>
            ✕ Limpar
          </button>
        )}
        <span style={{marginLeft:'auto',fontSize:13,color:'var(--texto-leve)',alignSelf:'center'}}>
          {filtrados.length} usuário(s)
        </span>
        <button className="btn btn-primary" onClick={() => setModalCriar(true)}>
          🔐 Novo Usuário
        </button>
      </div>

      {/* TABELA */}
      <div className="tabela-wrap">
        {filtrados.length === 0 ? (
          <div className="vazio">
            <div className="icon">🔍</div>
            <p>Nenhum usuário encontrado com os filtros aplicados.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Usuário</th>
                <th>E-mail</th>
                <th>Perfil</th>
                <th>Último Acesso</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              {filtrados.map(u => {
                const isMe = u.id === usuarioLogado?.id;
                const perfil = PERFIS.find(p => p.valor === u.perfil) || { label: u.perfil, cor:'#64748B' };
                return (
                  <tr key={u.id} style={{opacity: u.ativo ? 1 : .5}}>
                    {/* Nome */}
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div className="avatar" style={{background: u.ativo ? corAvatar(u.nome_completo||u.email) : '#4B5563'}}>
                          {iniciais(u.nome_completo||u.email)}
                        </div>
                        <div>
                          <div style={{fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
                            {u.nome_completo || '—'}
                            {isMe && <span style={{fontSize:10,background:'#3B82F622',color:'var(--azul)',borderRadius:4,padding:'1px 6px',fontWeight:700}}>Você</span>}
                          </div>
                          <div style={{fontSize:11,color:'var(--texto-leve)'}}>{u.cargo || u.departamento || ''}</div>
                        </div>
                      </div>
                    </td>
                    {/* E-mail */}
                    <td style={{fontSize:13,color:'var(--texto-leve)'}}>{u.email}</td>
                    {/* Perfil (dropdown editável) */}
                    <td>
                      <select
                        value={u.perfil}
                        disabled={isMe || !!atualizando[`p${u.id}`]}
                        onChange={e => alterarPerfil(u, e.target.value)}
                        title={isMe ? 'Não é possível alterar o próprio perfil' : 'Alterar perfil'}
                        style={{
                          background: perfil.cor + '18',
                          color: perfil.cor,
                          border: `1px solid ${perfil.cor}55`,
                          borderRadius: 6,
                          padding: '4px 8px',
                          fontSize: 12,
                          fontWeight: 700,
                          cursor: isMe ? 'not-allowed' : 'pointer',
                          opacity: atualizando[`p${u.id}`] ? .5 : 1,
                          minWidth: 110,
                        }}
                      >
                        {PERFIS.map(p => <option key={p.valor} value={p.valor} style={{background:'#252540',color:'var(--texto)'}}>{p.label}</option>)}
                      </select>
                    </td>
                    {/* Último acesso */}
                    <td style={{fontSize:12,color:'var(--texto-leve)',whiteSpace:'nowrap'}}>
                      {u.ultimo_acesso
                        ? new Date(u.ultimo_acesso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
                        : <em>Nunca acessou</em>}
                    </td>
                    {/* Toggle Ativo */}
                    <td>
                      <button
                        onClick={() => toggleAtivo(u)}
                        disabled={isMe || !!atualizando[u.id]}
                        title={isMe ? 'Não é possível bloquear a própria conta' : (u.ativo ? 'Bloquear acesso' : 'Liberar acesso')}
                        style={{
                          display:'inline-flex',alignItems:'center',gap:5,
                          padding:'5px 12px',borderRadius:20,border:'none',
                          fontSize:12,fontWeight:700,cursor: isMe ? 'not-allowed' : 'pointer',
                          background: u.ativo ? '#16A34A22' : '#DC262622',
                          color: u.ativo ? '#22C55E' : '#FF5C5C',
                          transition:'all .2s',
                          opacity: atualizando[u.id] ? .5 : 1,
                        }}
                      >
                        {atualizando[u.id] ? '...' : (u.ativo ? '✅ Ativo' : '🚫 Bloqueado')}
                      </button>
                    </td>
                    {/* Ações */}
                    <td>
                      <button className="btn btn-secondary btn-sm" title="Redefinir senha"
                        onClick={() => setModalReset(u)}>
                        🔑 Senha
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {modalCriar && (
        <ModalCriarUsuario
          funcionarios={funcionarios}
          onSalvar={criarUsuario}
          onFechar={() => setModalCriar(false)}
        />
      )}
      {modalReset && (
        <ModalResetarSenha
          usuario={modalReset}
          onSalvar={resetarSenha}
          onFechar={() => setModalReset(null)}
        />
      )}
    </div>
  );
}

// ============================================================
// APP PRINCIPAL
// ============================================================
function App() {
  const [usuario, setUsuario] = useState(() => {
    try { return JSON.parse(localStorage.getItem('erp_usuario')); } catch { return null; }
  });
  const [pagina, setPagina] = useState('funcionarios');
  const toasts = useToast();

  function logout() {
    localStorage.removeItem('erp_token');
    localStorage.removeItem('erp_usuario');
    setUsuario(null);
  }

  if (!usuario) return <Login onLogin={u => setUsuario(u)} />;

  const navItems = [
    { id:'funcionarios', icon:'👥', label:'Funcionários' },
    { id:'financeiro',   icon:'💰', label:'Financeiro',         disabled:true },
    { id:'pedidos',      icon:'🛒', label:'Pedidos de Compra',  disabled:true },
    { id:'atletas',      icon:'⚽', label:'Contratos de Atletas',disabled:true },
    { id:'investidores', icon:'📈', label:'Investidores',       disabled:true },
    { id:'metas',        icon:'🎯', label:'Metas',              disabled:true },
    { id:'relatorios',   icon:'📊', label:'Relatórios',         disabled:true },
    ...(usuario?.perfil === 'admin' ? [{ id:'usuarios', icon:'🔐', label:'Usuários', separador:true }] : []),
  ];

  return (
    <div className="layout">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="icon">⚽</div>
          <div>
            <div className="title">Rio Branco SAF</div>
            <div className="sub">Sistema de Gestão</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-label">Módulos</div>
          {navItems.map(item => (
            <React.Fragment key={item.id}>
              {item.separador && (
                <div style={{margin:'10px 0 4px',borderTop:'1px solid rgba(255,255,255,.12)',paddingTop:10}}>
                  <div className="nav-label" style={{paddingTop:0}}>Administração</div>
                </div>
              )}
              <div
                className={`nav-item ${pagina===item.id?'ativo':''}` }
                style={item.disabled ? {opacity:.45,cursor:'not-allowed'} : {cursor:'pointer'}}
                onClick={() => !item.disabled && setPagina(item.id)}
                title={item.disabled ? 'Em breve' : ''}
              >
                <span className="icon">{item.icon}</span>
                <span>{item.label}</span>
                {item.disabled && <span style={{marginLeft:'auto',fontSize:10,opacity:.7}}>em breve</span>}
              </div>
            </React.Fragment>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="usuario-info">
            <div className="usuario-avatar">{iniciais(usuario.nome)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="usuario-nome" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{usuario.nome}</div>
              <div className="usuario-cargo">{usuario.cargo || usuario.perfil}</div>
            </div>
            <button onClick={logout} title="Sair" style={{background:'none',border:'none',color:'rgba(255,255,255,.6)',fontSize:16,cursor:'pointer'}}>⏻</button>
          </div>
        </div>
      </aside>

      {/* CONTEÚDO */}
      <main className="main">
        <div className="topbar">
          <span className="topbar-title">
            {navItems.find(n=>n.id===pagina)?.icon}{' '}
            {pagina === 'usuarios' ? 'Gestão de Usuários e Acessos' : navItems.find(n=>n.id===pagina)?.label}
          </span>
          <div className="topbar-actions">
            <span style={{fontSize:13,color:'var(--texto-leve)'}}>
              {new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
            </span>
          </div>
        </div>
        {pagina === 'funcionarios' && <ModuloFuncionarios usuario={usuario} />}
        {pagina === 'usuarios'    && <ModuloUsuarios    usuario={usuario} />}
      </main>

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
