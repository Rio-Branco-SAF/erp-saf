<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos de Compra — ERP SAF</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
    :root {
    --bg:          #141414;
    --sidebar-bg:  #1a1a1a;
    --card-bg:     #242424;
    --card-borda:  #363636;
    --input-bg:    #1f1f1f;
    --verde:       #22C55E;
    --verde-med:   #16A34A;
    --verde-dark:  #15803D;
    --vermelho:    #FF5C5C;
    --dourado:     #D4A017;
    --dourado-vivo:#F0B429;
    --azul:        #3B82F6;
    --azul-dark:   #1D4ED8;
    --texto:       #F0F0F0;
    --texto-leve:  #9CA3AF;
    --roxo:        #8B5CF6;
    --laranja:     #F97316;
    --cinza:       #2e2e2e;
    --danger:      #EF4444;
    --warning:     #F59E0B;
    --info:        #3B82F6;
    --verde-bg:    rgba(34,197,94,.1);
    --sombra:      0 2px 8px rgba(0,0,0,.4);
  }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background: var(--bg);color: var(--texto);display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--texto-leve);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:var(--card-bg);border-bottom:1px solid var(--card-borda);letter-spacing:-.3px}
.sidebar-logo span{color:#f59e0b}
.sidebar nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;transition:.15s;border-radius:0}
.nav-item:hover{background:var(--card-borda);color:var(--card-borda)}
.nav-item.active{background:var(--azul-dark);color:var(--card-bg)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--card-borda);font-size:12px}
.user-chip{display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;background:var(--azul-dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--card-bg)}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card-bg);border-bottom:1px solid var(--card-borda);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;color:var(--sidebar-bg)}
.topbar-sub{font-size:12px;color:#64748b;margin-top:2px}
.content{padding:24px 28px;flex:1}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card-bg);border-radius:12px;padding:18px 20px;border:1px solid var(--card-borda)}
.kpi-label{font-size:12px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:26px;font-weight:800;margin:6px 0 2px;color:var(--sidebar-bg)}
.kpi-sub{font-size:12px;color:var(--texto-leve)}
.kpi-card.urgente .kpi-value{color:#FF5C5C}
.kpi-card.alerta .kpi-value{color:#d97706}
.kpi-card.ok .kpi-value{color:#16a34a}

/* FILTERS */
.filters-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--azul-dark);color:var(--card-bg)}
.btn-primary:hover{background:#1e40af}
.btn-outline{background:var(--card-bg);color:#475569;border:1px solid var(--card-borda)}
.btn-outline:hover{background:var(--card-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-success{background:#16a34a;color:var(--card-bg)}
.btn-success:hover{background:#15803d}
.btn-danger{background:#FF5C5C;color:var(--card-bg)}
.btn-danger:hover{background:#b91c1c}
.btn-warning{background:#d97706;color:var(--card-bg)}
.btn-warning:hover{background:#b45309}
.btn-ghost{background:transparent;color:#64748b;border:none;font-size:13px;cursor:pointer;padding:4px 8px}
.btn-ghost:hover{color:var(--sidebar-bg)}
.search-input{padding:8px 12px;border:1px solid var(--card-borda);border-radius:8px;font-size:13px;width:220px;outline:none}
.search-input:focus{border-color:var(--azul-dark)}
select.filter-sel{padding:8px 12px;border:1px solid var(--card-borda);border-radius:8px;font-size:13px;background:var(--card-bg);outline:none;color:#475569;cursor:pointer}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600;white-space:nowrap}
.pill-rascunho{background:var(--bg);color:#64748b}
.pill-aguardando_cotacao{background:#fef9c3;color:#a16207}
.pill-em_cotacao{background:#dbeafe;color:var(--azul-dark)}
.pill-aguardando_aprovacao{background:#fed7aa;color:#c2410c}
.pill-aprovado{background:#dcfce7;color:#16a34a}
.pill-rejeitado{background:#fee2e2;color:#FF5C5C}
.pill-em_compra{background:#e0e7ff;color:#4338ca}
.pill-concluido{background:#d1fae5;color:#065f46}
.pill-cancelado{background:var(--bg);color:var(--texto-leve)}

.prio-urgente{color:#FF5C5C;font-weight:700;font-size:12px}
.prio-alta{color:#d97706;font-weight:700;font-size:12px}
.prio-normal{color:#64748b;font-size:12px}
.prio-baixa{color:var(--texto-leve);font-size:12px}

/* TABLE */
.table-wrap{background:var(--card-bg);border-radius:12px;border:1px solid var(--card-borda);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--card-bg)}
th{text-align:left;padding:11px 16px;font-size:11.5px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--card-borda)}
td{padding:12px 16px;font-size:13.5px;border-bottom:1px solid var(--bg);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--card-bg)}
.pedido-numero{font-family:monospace;font-size:12px;color:#64748b;font-weight:600}
.pedido-titulo{font-weight:600;color:var(--sidebar-bg);max-width:260px}
.pedido-titulo small{display:block;font-size:11.5px;color:var(--texto-leve);font-weight:400;margin-top:1px}
.valor-cell{font-weight:700;color:var(--sidebar-bg);white-space:nowrap}
.cotacoes-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--card-borda);font-size:11px;font-weight:700;color:#475569}
.cotacoes-badge.tem{background:#dbeafe;color:var(--azul-dark)}
.action-btn{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--bg);color:#475569;transition:.15s}
.action-btn:hover{background:var(--card-borda);color:var(--sidebar-bg)}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--bg)}
.pagination-info{font-size:12.5px;color:#64748b}
.pagination-btns{display:flex;gap:6px}
.page-btn{padding:6px 12px;border:1px solid var(--card-borda);background:var(--card-bg);border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;color:#475569}
.page-btn.active{background:var(--azul-dark);color:var(--card-bg);border-color:var(--azul-dark)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--card-bg);border-radius:16px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--card-borda);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card-bg);z-index:10}
.modal-header h2{font-size:17px;font-weight:700;color:var(--sidebar-bg)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--card-borda);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card-bg)}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--texto-leve);line-height:1}
.close-btn:hover{color:var(--sidebar-bg)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--card-borda);border-radius:8px;font-size:13.5px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--azul-dark);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.form-group textarea{resize:vertical;min-height:72px}

/* DETAIL MODAL */
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bg)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.detail-item label{display:block;font-size:11px;color:var(--texto-leve);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.detail-item span{font-size:14px;font-weight:600;color:var(--sidebar-bg)}

/* ITEMS TABLE */
.items-table{width:100%;border-collapse:collapse;font-size:13px}
.items-table th{background:var(--card-bg);padding:8px 12px;text-align:left;font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--card-borda)}
.items-table td{padding:8px 12px;border-bottom:1px solid var(--bg)}
.items-table tr:last-child td{border-bottom:none}
.items-table .total-row td{font-weight:700;background:var(--card-bg);color:var(--sidebar-bg)}

/* COTAÇÃO CARD */
.cotacao-card{border:1px solid var(--card-borda);border-radius:10px;padding:14px 16px;margin-bottom:10px;position:relative}
.cotacao-card.selecionada{border-color:#16a34a;background:#f0fdf4}
.cotacao-card.rejeitada{opacity:.6}
.cotacao-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cotacao-fornecedor{font-weight:700;color:var(--sidebar-bg);font-size:14px}
.cotacao-valor{font-size:18px;font-weight:800;color:var(--sidebar-bg)}
.cotacao-meta{font-size:12px;color:#64748b;margin-top:2px}
.badge-selecionada{position:absolute;top:10px;right:10px;background:#16a34a;color:var(--card-bg);padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700}

/* TIMELINE */
.timeline{list-style:none}
.timeline-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.timeline-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:22px;bottom:0;width:2px;background:var(--bg)}
.timeline-dot{width:22px;height:22px;border-radius:50%;background:var(--card-borda);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.timeline-dot.criou{background:#dbeafe;color:var(--azul-dark)}
.timeline-dot.aprovou{background:#dcfce7;color:#16a34a}
.timeline-dot.rejeitou{background:#fee2e2;color:#FF5C5C}
.timeline-dot.concluiu{background:#d1fae5;color:#065f46}
.timeline-content{flex:1}
.timeline-acao{font-size:13px;font-weight:600;color:var(--sidebar-bg);text-transform:capitalize}
.timeline-desc{font-size:12px;color:#64748b;margin-top:1px}
.timeline-data{font-size:11px;color:var(--texto-leve);margin-top:2px}

/* FLUXO STEPS */
.fluxo{display:flex;align-items:center;gap:0;margin-bottom:24px;padding:16px;background:var(--card-bg);border-radius:12px;border:1px solid var(--card-borda);overflow-x:auto}
.fluxo-step{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border-radius:8px;min-width:100px;cursor:default}
.fluxo-step.ativo{background:#dbeafe}
.fluxo-step.concluido-step{background:#dcfce7}
.fluxo-step .step-icon{font-size:20px}
.fluxo-step .step-label{font-size:10.5px;font-weight:600;color:#64748b;text-align:center}
.fluxo-step.ativo .step-label{color:var(--azul-dark)}
.fluxo-step.concluido-step .step-label{color:#16a34a}
.fluxo-arrow{color:#cbd5e1;font-size:16px;flex-shrink:0}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);width:100%}
.login-card{background:var(--card-bg);border-radius:16px;padding:40px;width:380px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h2{font-size:22px;font-weight:800;color:var(--sidebar-bg);margin-top:10px}
.login-logo p{font-size:14px;color:#64748b;margin-top:4px}
.login-err{background:#fee2e2;color:#FF5C5C;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.empty-state{text-align:center;padding:60px 20px;color:var(--texto-leve)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;width:fit-content;margin-bottom:20px}
.tab{padding:6px 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;color:#64748b;border:none;background:transparent;transition:.15s}
.tab.active{background:var(--card-bg);color:var(--sidebar-bg);box-shadow:0 1px 3px rgba(0,0,0,.1)}

.section-divider{border:none;border-top:1px solid var(--bg);margin:16px 0}

/* ITENS EDITOR */
.itens-editor{border:1px solid var(--card-borda);border-radius:8px;overflow:hidden}
.itens-editor-header{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 36px;gap:8px;padding:8px 12px;background:var(--card-bg);font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase}
.item-row{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 36px;gap:8px;padding:8px 12px;border-top:1px solid var(--bg);align-items:center}
.item-row input{padding:5px 8px;border:1px solid var(--card-borda);border-radius:6px;font-size:12.5px;width:100%;outline:none}
.item-row input:focus{border-color:var(--azul-dark)}
.add-item-btn{padding:8px 12px;width:100%;background:var(--card-bg);border:none;border-top:1px solid var(--bg);cursor:pointer;font-size:12.5px;color:#64748b;font-weight:600;text-align:center}
.add-item-btn:hover{background:var(--bg);color:var(--sidebar-bg)}
.remove-item-btn{background:none;border:none;cursor:pointer;color:var(--texto-leve);font-size:16px;line-height:1}
.remove-item-btn:hover{color:#FF5C5C}

.alert-box{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-warning{background:#fef9c3;border:1px solid #fde68a;color:#92400e}
.alert-danger{background:#fee2e2;border:1px solid #fecaca;color:#991b1b}
</style>
</head>

let TOKEN = localStorage.getItem('erp_access');
let USUARIO = null;
try { USUARIO = JSON.parse(localStorage.getItem('erp_user')); } catch(e){}

async function apiFetch(path, options = {}) {
    try {
        const headers = { 'Content-Type': 'application/json' };
        if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
        const res = await fetch(API_URL + path, { ...options, headers });
        if (res.status === 401) { TOKEN = null; localStorage.removeItem('erp_access'); window.location.reload(); }
        return await res.json();
    } catch(e) {
        return null;
    }
}

function fmt(valor) {
    if (!valor && valor !== 0) return '—';
    return 'R$ ' + Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
}

function fmtData(d) {
    if (!d) return '—';
    return new Date(d + (d.length === 10 ? 'T00:00:00' : '')).toLocaleDateString('pt-BR');
}

function fmtDataHora(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function Login({ onLogin }) {
    const [usuario, setUsuario] = useState('admin');
    const [senha, setSenha] = useState('admin123');
    const [erro, setErro] = useState('');
    const [loading, setLoading] = useState(false);

    async function handleLogin(e) {
        e.preventDefault();
        setLoading(true); setErro('');
        const data = await apiFetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ usuario, senha })
        });
        setLoading(false);
        if (data && data.token) {
            TOKEN = data.token;
            USUARIO = data.usuario;
            localStorage.setItem('erp_access', TOKEN);
            localStorage.setItem('erp_user', JSON.stringify(USUARIO));
            onLogin(data.usuario);
        } else {
            // DEMO: aceitar admin/admin123 offline
            if (usuario === 'admin' && senha === 'admin123') {
                USUARIO = { id: 1, nome: 'Administrador', perfil: 'admin' };
                localStorage.setItem('erp_user', JSON.stringify(USUARIO));
                onLogin(USUARIO);
            } else {
                setErro('Usuário ou senha incorretos.');
            }
        }
    }

    return (
        <div className="login-wrap">
            <div className="login-card">
                <div className="login-logo">
                    <div style={{fontSize:40}}>🏟️</div>
                    <h2>ERP SAF</h2>
                    <p>Pedidos de Compra</p>
                </div>
                {erro && <div className="login-err">{erro}</div>}
                <form onSubmit={handleLogin}>
                    <div className="form-group" style={{marginBottom:12}}>
                        <label>Usuário</label>
                        <input value={usuario} onChange={e => setUsuario(e.target.value)} required/>
                    </div>
                    <div className="form-group" style={{marginBottom:20}}>
                        <label>Senha</label>
                        <input type="password" value={senha} onChange={e => setSenha(e.target.value)} required/>
                    </div>
                    <button type="submit" className="btn btn-primary" style={{width:'100%',padding:'11px'}} disabled={loading}>

            const data = await apiFetch('/pedidos/' + pedidoLista.id);

                setDetalhe(data);

                // DEMO
                setDetalhe(DEMO_DETALHE[pedidoLista.id] || { ...pedidoLista, itens:[], cotacoes:[], historico:[] });

        setLoadingAcao(endpoint);
        const data = await apiFetch('/pedidos/' + pedidoLista.id + '/' + endpoint, {
            method: 'PATCH',
            body: JSON.stringify(payload)
        });
        setLoadingAcao('');
        if (data) { onAtualizar(); onClose(); }
        else {
            // DEMO: simula
            onAtualizar();
            onClose();
        }

                                    <div className="detail-item">
                                        <label>Solicitante</label>
                                        <span>{d.solicitante_nome || '—'}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Departamento</label>
                                        <span>{d.departamento_nome || '—'}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Prioridade</label>
                                        <span className={PRIO_CLASS[d.prioridade]}>{PRIO_LABEL[d.prioridade]}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Data de Necessidade</label>
                                        <span>{fmtData(d.data_necessidade)}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Centro de Custo</label>
                                        <span>{d.centro_custo_nome || '—'}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Categoria</label>
                                        <span>{d.categoria_nome || '—'}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Valor Estimado</label>
                                        <span style={{color:'var(--sidebar-bg)'}}>{fmt(d.valor_estimado)}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Valor Aprovado</label>
                                        <span style={{color:'#16a34a'}}>{fmt(d.valor_aprovado)}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Valor Final</label>
                                        <span style={{color:'var(--azul-dark)',fontWeight:700}}>{fmt(d.valor_final)}</span>
                                    </div>
                                </div>
                                {d.descricao && (
                                    <div style={{marginTop:14,padding:'12px 14px',background:'#f8fafc',borderRadius:8,fontSize:13.5,color:'#475569',lineHeight:1.6}}>
                                        {d.descricao}
                                    </div>
                                )}
                            </div>

                            {/* ITENS */}
                            {detalhe?.itens?.length > 0 && (
                                <div className="detail-section">
                                    <h3>📦 Itens do Pedido</h3>
                                    <table className="items-table">
                                        <thead>
                                            <tr>
                                                <th>Descrição</th>
                                                <th>Qtd</th>
                                                <th>Unid.</th>
                                                <th style={{textAlign:'right'}}>Valor Unit.</th>
                                                <th style={{textAlign:'right'}}>Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {detalhe.itens.map(item => (
                                                <tr key={item.id}>
                                                    <td>{item.descricao}</td>
                                                    <td>{item.quantidade}</td>
                                                    <td>{item.unidade}</td>
                                                    <td style={{textAlign:'right'}}>{fmt(item.valor_unitario_estimado)}</td>
                                                    <td style={{textAlign:'right',fontWeight:600}}>
                                                        {item.valor_unitario_estimado ? fmt(item.quantidade * item.valor_unitario_estimado) : '—'}
                                                    </td>
                                                </tr>
                                            ))}
                                            <tr className="total-row">
                                                <td colSpan={4} style={{textAlign:'right'}}>Total Estimado</td>
                                                <td style={{textAlign:'right'}}>
                                                    {fmt(detalhe.itens.reduce((s,i) => s + (i.quantidade * (i.valor_unitario_estimado||0)), 0))}
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </>
                    )}

                    {/* ABA COTAÇÕES */}
                    {aba === 'cotacoes' && (
                        <div className="detail-section">
                            <h3>💬 Cotações / Orçamentos</h3>
                            {detalhe?.cotacoes?.length === 0 && (
                                <div className="empty-state" style={{padding:'30px 0'}}>
                                    <div className="empty-icon">📋</div>
                                    <p>Nenhuma cotação registrada ainda.</p>
                                </div>
                            )}
                            {detalhe?.cotacoes?.map(cot => (
                                <div key={cot.id} className={'cotacao-card ' + cot.status}>
                                    {cot.status === 'selecionada' && <div className="badge-selecionada">✅ Selecionada</div>}
                                    <div className="cotacao-header">
                                        <div>
                                            <div className="cotacao-fornecedor">{cot.fornecedor_nome || 'Fornecedor'}</div>
                                            <div className="cotacao-meta">
                                                Nº {cot.numero_cotacao || '—'} · {fmtData(cot.data_cotacao)}
                                                {cot.prazo_entrega ? ' · Entrega: ' + cot.prazo_entrega + ' dias' : ''}
                                                {cot.condicoes_pagamento ? ' · ' + cot.condicoes_pagamento : ''}
                                            </div>
                                        </div>
                                        <div style={{textAlign:'right'}}>
                                            <div className="cotacao-valor">{fmt(cot.valor_total)}</div>
                                            {cot.validade_cotacao && <div style={{fontSize:11,color:'var(--texto-leve)'}}>válida até {fmtData(cot.validade_cotacao)}</div>}
                                        </div>
                                    </div>
                                    {cot.observacoes && <div style={{fontSize:12.5,color:'#64748b',marginBottom:8}}>{cot.observacoes}</div>}
                                    {cot.status !== 'selecionada' && ['aguardando_cotacao','em_cotacao','aguardando_aprovacao'].includes(d.status) && (
                                        <button className="btn btn-success btn-sm" onClick={() => selecionarCotacao(cot.id)}
                                            disabled={loadingAcao === 'sel-' + cot.id}>
                                            {loadingAcao === 'sel-' + cot.id ? 'Selecionando...' : '✅ Selecionar esta cotação'}
                                        </button>
                                    )}
                                </div>
                            ))}
                            {['aguardando_cotacao','em_cotacao'].includes(d.status) && (
                                <>
                                    {!showNovaCotacao ? (
                                        <button className="btn btn-outline" style={{width:'100%',marginTop:8}} onClick={() => setShowNovaCotacao(true)}>
                                            + Adicionar Cotação
                                        </button>
                                    ) : (
                                        <div style={{border:'1px solid var(--card-borda)',borderRadius:10,padding:16,marginTop:10}}>
                                            <div style={{fontWeight:700,marginBottom:12,color:'var(--sidebar-bg)'}}>Nova Cotação</div>
                                            <div className="form-grid">
                                                <div className="form-group">
                                                    <label>Fornecedor</label>
                                                    <select value={novaCot.fornecedor_id} onChange={e => setNovaCot(c => ({...c,fornecedor_id:e.target.value}))}>
                                                        <option value="">Selecione...</option>
                                                        {DEMO_FORNECEDORES.map(f => <option key={f.id} value={f.id}>{f.nome}</option>)}
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label>Valor Total (R$) *</label>
                                                    <input type="number" step="0.01" value={novaCot.valor_total} onChange={e => setNovaCot(c => ({...c,valor_total:e.target.value}))} placeholder="0,00"/>
                                                </div>
                                                <div className="form-group">
                                                    <label>Prazo de Entrega (dias)</label>
                                                    <input type="number" value={novaCot.prazo_entrega} onChange={e => setNovaCot(c => ({...c,prazo_entrega:e.target.value}))}/>
                                                </div>
                                                <div className="form-group">
                                                    <label>Válida até</label>
                                                    <input type="date" value={novaCot.validade_cotacao} onChange={e => setNovaCot(c => ({...c,validade_cotacao:e.target.value}))}/>
                                                </div>
                                                <div className="form-group">
                                                    <label>Condições de Pagamento</label>
                                                    <input placeholder="Ex: 30 dias, À vista..." value={novaCot.condicoes_pagamento} onChange={e => setNovaCot(c => ({...c,condicoes_pagamento:e.target.value}))}/>
                                                </div>
                                                <div className="form-group">
                                                    <label>Observações</label>
                                                    <input value={novaCot.observacoes} onChange={e => setNovaCot(c => ({...c,observacoes:e.target.value}))}/>
                                                </div>
                                            </div>
                                            <div style={{display:'flex',gap:8,marginTop:12}}>
                                                <button className="btn btn-primary btn-sm" onClick={adicionarCotacao}>Salvar Cotação</button>
                                                <button className="btn btn-outline btn-sm" onClick={() => setShowNovaCotacao(false)}>Cancelar</button>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    )}

                    {/* ABA HISTÓRICO */}
                    {aba === 'historico' && (
                        <div className="detail-section">
                            <h3>📅 Histórico de Ações</h3>
                            {detalhe?.historico?.length === 0 && (
                                <div className="empty-state" style={{padding:'20px 0'}}><p>Nenhum registro no histórico.</p></div>
                            )}
                            <ul className="timeline">
                                {detalhe?.historico?.map(h => (
                                    <li key={h.id} className="timeline-item">
                                        <div className={'timeline-dot ' + h.acao}>{h.acao[0].toUpperCase()}</div>
                                        <div className="timeline-content">
                                            <div className="timeline-acao">{h.acao.replace(/_/g,' ')}{h.usuario_nome ? ' · ' + h.usuario_nome : ''}</div>
                                            {h.descricao && <div className="timeline-desc">{h.descricao}</div>}
                                            <div className="timeline-data">{fmtDataHora(h.created_at)}</div>
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}

                    {/* REJEIÇÃO */}
                    {showRejeicao && (
                        <div style={{border:'1px solid #fecaca',borderRadius:10,padding:16,marginTop:10,background:'#fff5f5'}}>
                            <div style={{fontWeight:700,marginBottom:8,color:'#dc2626'}}>Motivo da Rejeição</div>
                            <textarea className="form-group" style={{width:'100%',padding:'8px 12px',border:'1px solid #fecaca',borderRadius:8,minHeight:80}}
                                placeholder="Explique o motivo da rejeição..."
                                value={motivoRejeicao} onChange={e => setMotivoRejeicao(e.target.value)}/>
                            <div style={{display:'flex',gap:8,marginTop:8}}>
                                <button className="btn btn-danger btn-sm" onClick={() => acao('rejeitar', { motivo: motivoRejeicao })}>
                                    Confirmar Rejeição
                                </button>
                                <button className="btn btn-outline btn-sm" onClick={() => setShowRejeicao(false)}>Cancelar</button>
                            </div>
                        </div>
                    )}
                </div>

                <div className="modal-footer">
                    {d.status === 'rascunho' && (
                        <button className="btn btn-primary" onClick={() => acao('enviar-cotacao')}
                            disabled={loadingAcao==='enviar-cotacao'}>
                            📋 Enviar para Cotação
                        </button>
                    )}
                    {['em_cotacao','aguardando_cotacao'].includes(d.status) && detalhe?.cotacoes?.some(c => c.status === 'selecionada') && (
                        <button className="btn btn-primary" onClick={() => acao('enviar-aprovacao')}
                            disabled={loadingAcao==='enviar-aprovacao'}>
                            ⏳ Enviar para Aprovação
                        </button>
                    )}
                    {d.status === 'aguardando_aprovacao' && canAprovar && (
                        <>
                            <button className="btn btn-success" onClick={() => acao('aprovar')}
                                disabled={loadingAcao==='aprovar'}>
                                ✅ Aprovar Pedido
                            </button>
                            <button className="btn btn-danger" onClick={() => setShowRejeicao(true)}>
                                ❌ Rejeitar
                            </button>
                        </>
                    )}
                    {['aprovado','em_compra'].includes(d.status) && (
                        <button className="btn btn-success" onClick={() => acao('concluir')}
                            disabled={loadingAcao==='concluir'}>
                            🏁 Marcar como Concluído
                        </button>
                    )}
                    <button className="btn btn-outline" onClick={onClose}>Fechar</button>
                </div>
            </div>
        </div>
    );
}

// ============================================================
// MÓDULO PRINCIPAL
// ============================================================
function ModuloPedidos({ usuario }) {
    const [pedidos, setPedidos] = useState([]);
    const [resumo, setResumo] = useState(DEMO_RESUMO);
    const [loading, setLoading] = useState(true);
    const [busca, setBusca] = useState('');
    const [filtroStatus, setFiltroStatus] = useState('');
    const [filtroPrio, setFiltroPrio] = useState('');
    const [pagina, setPagina] = useState(1);
    const [total, setTotal] = useState(0);
    const POR_PAGINA = 10;

    const [modalNovo, setModalNovo] = useState(false);
    const [modalDetalhe, setModalDetalhe] = useState(null);

    const carregar = useCallback(async () => {
        setLoading(true);
        const params = new URLSearchParams({ pagina, por_pagina: POR_PAGINA });
        if (busca) params.set('busca', busca);
        if (filtroStatus) params.set('status', filtroStatus);
        if (filtroPrio) params.set('prioridade', filtroPrio);

        const [dadosRes, resumoRes] = await Promise.all([
            apiFetch('/pedidos?' + params.toString()),
            apiFetch('/pedidos/resumo')
        ]);

        if (dadosRes && dadosRes.pedidos) {
            setPedidos(dadosRes.pedidos);
            setTotal(dadosRes.total);
        } else {
            // DEMO
            let filtrados = DEMO_PEDIDOS;
            if (busca) filtrados = filtrados.filter(p => p.titulo.toLowerCase().includes(busca.toLowerCase()) || p.numero.includes(busca));
            if (filtroStatus) filtrados = filtrados.filter(p => p.status === filtroStatus);
            if (filtroPrio) filtrados = filtrados.filter(p => p.prioridade === filtroPrio);
            setPedidos(filtrados.slice((pagina-1)*POR_PAGINA, pagina*POR_PAGINA));
            setTotal(filtrados.length);
        }

        if (resumoRes && resumoRes.em_aberto !== undefined) setResumo(resumoRes);
        setLoading(false);
    }, [busca, filtroStatus, filtroPrio, pagina]);

    useEffect(() => { carregar(); }, [carregar]);

    const totalPages = Math.ceil(total / POR_PAGINA);

    return (
        <>
            <div className="topbar">
                <div>
                    <h1>🛒 Pedidos de Compra</h1>
                    <div className="topbar-sub">Gestão de requisições, cotações e aprovações</div>
                </div>
                <button className="btn btn-primary" onClick={() => setModalNovo(true)}>+ Novo Pedido</button>
            </div>
            <div className="content">
                <KpiCards resumo={resumo}/>

                <div className="filters-row">
                    <input className="search-input" placeholder="Buscar por título ou número..." value={busca} onChange={e => { setBusca(e.target.value); setPagina(1); }}/>
                    <select className="filter-sel" value={filtroStatus} onChange={e => { setFiltroStatus(e.target.value); setPagina(1); }}>
                        <option value="">Todos os status</option>
                        {Object.entries(STATUS_LABEL).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                    </select>
                    <select className="filter-sel" value={filtroPrio} onChange={e => { setFiltroPrio(e.target.value); setPagina(1); }}>
                        <option value="">Todas as prioridades</option>
                        <option value="urgente">🔴 Urgente</option>
                        <option value="alta">🟠 Alta</option>
                        <option value="normal">🔵 Normal</option>
                        <option value="baixa">⚪ Baixa</option>
                    </select>
                    {(busca || filtroStatus || filtroPrio) && (
                        <button className="btn btn-ghost" onClick={() => { setBusca(''); setFiltroStatus(''); setFiltroPrio(''); setPagina(1); }}>
                            ✕ Limpar filtros
                        </button>
                    )}
                    <div style={{marginLeft:'auto',fontSize:13,color:'var(--texto-leve)'}}>{total} pedido{total !== 1 ? 's' : ''}</div>
                </div>

                <div className="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Pedido</th>
                                <th>Status</th>
                                <th>Prioridade</th>
                                <th>Solicitante</th>
                                <th>Necessidade</th>
                                <th style={{textAlign:'right'}}>Valor Est.</th>
                                <th style={{textAlign:'center'}}>Cotações</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            {loading ? (
                                <tr><td colSpan={8} style={{textAlign:'center',padding:'40px',color:'var(--texto-leve)'}}>Carregando...</td></tr>
                            ) : pedidos.length === 0 ? (
                                <tr><td colSpan={8}>
                                    <div className="empty-state">
                                        <div className="empty-icon">🔍</div>
                                        <p>Nenhum pedido encontrado.</p>
                                    </div>
                                </td></tr>
                            ) : pedidos.map(p => (
                                <tr key={p.id}>
                                    <td>
                                        <div className="pedido-numero">{p.numero}</div>
                                        <div className="pedido-titulo">
                                            {p.titulo}
                                            <small>{p.departamento_nome}{p.centro_custo_nome ? ' · ' + p.centro_custo_nome : ''}</small>
                                        </div>
                                    </td>
                                    <td><span className={'pill pill-' + p.status}>{STATUS_LABEL[p.status]}</span></td>
                                    <td><span className={PRIO_CLASS[p.prioridade]}>{PRIO_LABEL[p.prioridade]}</span></td>
                                    <td style={{fontSize:13,color:'#475569'}}>{p.solicitante_nome || '—'}</td>
                                    <td style={{fontSize:13,color:'#475569',whiteSpace:'nowrap'}}>{fmtData(p.data_necessidade)}</td>
                                    <td style={{textAlign:'right'}} className="valor-cell">
                                        {p.valor_final ? fmt(p.valor_final) : p.valor_aprovado ? fmt(p.valor_aprovado) : fmt(p.valor_estimado)}
                                    </td>
                                    <td style={{textAlign:'center'}}>
                                        <span className={'cotacoes-badge' + (p.total_cotacoes > 0 ? ' tem' : '')}>
                                            {p.total_cotacoes}
                                        </span>
                                    </td>
                                    <td>
                                        <button className="action-btn" onClick={() => setModalDetalhe(p)}>Ver →</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    {total > POR_PAGINA && (
                        <div className="pagination">
                            <div className="pagination-info">
                                {(pagina-1)*POR_PAGINA+1}–{Math.min(pagina*POR_PAGINA, total)} de {total} pedidos
                            </div>
                            <div className="pagination-btns">
                                <button className="page-btn" disabled={pagina===1} onClick={() => setPagina(p => p-1)}>‹ Ant.</button>
                                {Array.from({length: Math.min(totalPages, 5)}, (_,i) => i+1).map(n => (
                                    <button key={n} className={'page-btn' + (n===pagina?' active':'')} onClick={() => setPagina(n)}>{n}</button>
                                ))}
                                <button className="page-btn" disabled={pagina===totalPages} onClick={() => setPagina(p => p+1)}>Próx. ›</button>
                            </div>
                        </div>
                    )}
                </div>
            </div>

            {modalNovo && <ModalNovoPedido onClose={() => setModalNovo(false)} onSalvo={carregar}/>}
            {modalDetalhe && <ModalDetalhe pedido={modalDetalhe} onClose={() => setModalDetalhe(null)} onAtualizar={carregar} usuario={usuario}/>}
        </>
    );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
    const [usuario, setUsuario] = useState(USUARIO);

    function handleLogin(u) { setUsuario(u); }
    function handleLogout() {
        TOKEN = null; USUARIO = null;
        localStorage.removeItem('erp_access');
        localStorage.removeItem('erp_user');
        setUsuario(null);
    }

    if (!usuario) return <Login onLogin={handleLogin}/>;

    return (
        <>
            <Sidebar usuario={usuario} onLogout={handleLogout}/>
            <div className="main">
                <ModuloPedidos usuario={usuario}/>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
