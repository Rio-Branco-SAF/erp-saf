const _getAT=()=>localStorage.getItem('erp_access');
const _getRF=()=>localStorage.getItem('erp_refresh');
let USUARIO=null;
try{USUARIO=JSON.parse(localStorage.getItem('erp_user'));}catch(e){}

async function _refreshToken(){
  try{const rf=_getRF();if(!rf)return false;
    const r=await fetch(API_URL+'/api/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:rf})});
    if(!r.ok)return false;const data=await r.json();
    if(data.accessToken){localStorage.setItem('erp_access',data.accessToken);if(data.refreshToken)localStorage.setItem('erp_refresh',data.refreshToken);return true;}
    return false;}catch(e){return false;}}

async function apiFetch(path,options={}){
  try{let at=_getAT();
    if(at){try{const p=JSON.parse(atob(at.split('.')[1]));if((p.exp*1000)-Date.now()<30000){await _refreshToken();at=_getAT();}}catch(e){}}
    const headers={'Content-Type':'application/json'};if(at)headers['Authorization']='Bearer '+at;
    const res=await fetch(API_URL+path,{...options,headers});
    if(res.status===401){const ok=await _refreshToken();
      if(ok){at=_getAT();headers['Authorization']='Bearer '+at;const r2=await fetch(API_URL+path,{...options,headers});if(r2.status===401){localStorage.removeItem('erp_access');localStorage.removeItem('erp_refresh');localStorage.removeItem('erp_user');location.href='/login.html';return null;}return await r2.json();}
      localStorage.removeItem('erp_access');localStorage.removeItem('erp_refresh');localStorage.removeItem('erp_user');location.href='/login.html';return null;}
    return await res.json();}catch(e){return null;}}

function fmt(valor) {
    if (!valor && valor !== 0) return 'â€”';
    return 'R$ ' + Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
}

function fmtData(d) {
    if (!d) return 'â€”';
    return new Date(d + (d.length === 10 ? 'T00:00:00' : '')).toLocaleDateString('pt-BR');
}

function fmtDataHora(d) {
    if (!d) return 'â€”';
    return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ============================================================
// MÃ“DULO PRINCIPAL
// ============================================================
function ModuloPedidos({ usuario }) {
    const [pedidos, setPedidos] = useState([]);
    const [resumo, setResumo] = useState(DEMO_RESUMO);
    const [loading, setLoading] = useState(true);
    const [busca, setBusca] = useState('');
    const [filtroStatus, setFiltroStatus] = useState('');
    const [filtroPrio, setFiltroPrio] = useState('');
    const [pagina, setPagina] = useState(1);
    const [total, setTotal] = useState(0);
    const POR_PAGINA = 10;

    const [modalNovo, setModalNovo] = useState(false);
    const [modalDetalhe, setModalDetalhe] = useState(null);

    const carregar = useCallback(async () => {
        setLoading(true);
        const params = new URLSearchParams({ pagina, por_pagina: POR_PAGINA });
        if (busca) params.set('busca', busca);
        if (filtroStatus) params.set('status', filtroStatus);
        if (filtroPrio) params.set('prioridade', filtroPrio);

        const [dadosRes, resumoRes] = await Promise.all([
            apiFetch('/pedidos?' + params.toString()),
            apiFetch('/pedidos/resumo')
        ]);

        if (dadosRes && dadosRes.pedidos) {
            setPedidos(dadosRes.pedidos);
            setTotal(dadosRes.total);
        } else {
            // DEMO
            let filtrados = DEMO_PEDIDOS;
            if (busca) filtrados = filtrados.filter(p => p.titulo.toLowerCase().includes(busca.toLowerCase()) || p.numero.includes(busca));
            if (filtroStatus) filtrados = filtrados.filter(p => p.status === filtroStatus);
            if (filtroPrio) filtrados = filtrados.filter(p => p.prioridade === filtroPrio);
            setPedidos(filtrados.slice((pagina-1)*POR_PAGINA, pagina*POR_PAGINA));
            setTotal(filtrados.length);
        }

        if (resumoRes && resumoRes.em_aberto !== undefined) setResumo(resumoRes);
        setLoading(false);
    }, [busca, filtroStatus, filtroPrio, pagina]);

    useEffect(() => { carregar(); }, [carregar]);

    const totalPages = Math.ceil(total / POR_PAGINA);

    return (
        <>
            <div className="topbar">
                <div>
                    <h1>ðŸ›’ Pedidos de Compra</h1>
                    <div className="topbar-sub">GestÃ£o de requisiÃ§Ãµes, cotaÃ§Ãµes e aprovaÃ§Ãµes</div>
                </div>
                <button className="btn btn-primary" onClick={() => setModalNovo(true)}>+ Novo Pedido</button>
            </div>
            <div className="content">
                <KpiCards resumo={resumo}/>

                <div className="filters-row">
                    <input className="search-input" placeholder="Buscar por tÃ­tulo ou nÃºmero..." value={busca} onChange={e => { setBusca(e.target.value); setPagina(1); }}/>
                    <select className="filter-sel" value={filtroStatus} onChange={e => { setFiltroStatus(e.target.value); setPagina(1); }}>
                        <option value="">Todos os status</option>
                        {Object.entries(STATUS_LABEL).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                    </select>
                    <select className="filter-sel" value={filtroPrio} onChange={e => { setFiltroPrio(e.target.value); setPagina(1); }}>
                        <option value="">Todas as prioridades</option>
                        <option value="urgente">ðŸ”´ Urgente</option>
                        <option value="alta">ðŸŸ  Alta</option>
                        <option value="normal">ðŸ”µ Normal</option>
                        <option value="baixa">âšª Baixa</option>
                    </select>
                    {(busca || filtroStatus || filtroPrio) && (
                        <button className="btn btn-ghost" onClick={() => { setBusca(''); setFiltroStatus(''); setFiltroPrio(''); setPagina(1); }}>
                            âœ• Limpar filtros
                        </button>
                    )}
                    <div style={{marginLeft:'auto',fontSize:13,color:'#94a3b8'}}>{total} pedido{total !== 1 ? 's' : ''}</div>
                </div>

                <div className="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Pedido</th>
                                <th>Status</th>
                                <th>Prioridade</th>
                                <th>Solicitante</th>
                                <th>Necessidade</th>
                                <th style={{textAlign:'right'}}>Valor Est.</th>
                                <th style={{textAlign:'center'}}>CotaÃ§Ãµes</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            {loading ? (
                                <tr><td colSpan={8} style={{textAlign:'center',padding:'40px',color:'#94a3b8'}}>Carregando...</td></tr>
                            ) : pedidos.length === 0 ? (
                                <tr><td colSpan={8}>
                                    <div className="empty-state">
                                        <div className="empty-icon">ðŸ”</div>
                                        <p>Nenhum pedido encontrado.</p>
                                    </div>
                                </td></tr>
                            ) : pedidos.map(p => (
                                <tr key={p.id}>
                                    <td>
                                        <div className="pedido-numero">{p.numero}</div>
                                        <div className="pedido-titulo">
                                            {p.titulo}
                                            <small>{p.departamento_nome}{p.centro_custo_nome ? ' Â· ' + p.centro_custo_nome : ''}</small>
                                        </div>
                                    </td>
                                    <td><span className={'pill pill-' + p.status}>{STATUS_LABEL[p.status]}</span></td>
                                    <td><span className={PRIO_CLASS[p.prioridade]}>{PRIO_LABEL[p.prioridade]}</span></td>
                                    <td style={{fontSize:13,color:'#475569'}}>{p.solicitante_nome || 'â€”'}</td>
                                    <td style={{fontSize:13,color:'#475569',whiteSpace:'nowrap'}}>{fmtData(p.data_necessidade)}</td>
                                    <td style={{textAlign:'right'}} className="valor-cell">
                                        {p.valor_final ? fmt(p.valor_final) : p.valor_aprovado ? fmt(p.valor_aprovado) : fmt(p.valor_estimado)}
                                    </td>
                                    <td style={{textAlign:'center'}}>
                                        <span className={'cotacoes-badge' + (p.total_cotacoes > 0 ? ' tem' : '')}>
                                            {p.total_cotacoes}
                                        </span>
                                    </td>
                                    <td>
                                        <button className="action-btn" onClick={() => setModalDetalhe(p)}>Ver â†’</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    {total > POR_PAGINA && (
                        <div className="pagination">
                            <div className="pagination-info">
                                {(pagina-1)*POR_PAGINA+1}â€“{Math.min(pagina*POR_PAGINA, total)} de {total} pedidos
                            </div>
                            <div className="pagination-btns">
                                <button className="page-btn" disabled={pagina===1} onClick={() => setPagina(p => p-1)}>â€¹ Ant.</button>
                                {Array.from({length: Math.min(totalPages, 5)}, (_,i) => i+1).map(n => (
                                    <button key={n} className={'page-btn' + (n===pagina?' active':'')} onClick={() => setPagina(n)}>{n}</button>
                                ))}
                                <button className="page-btn" disabled={pagina===totalPages} onClick={() => setPagina(p => p+1)}>PrÃ³x. â€º</button>
                            </div>
                        </div>
                    )}
                </div>
            </div>

            {modalNovo && <ModalNovoPedido onClose={() => setModalNovo(false)} onSalvo={carregar}/>}
            {modalDetalhe && <ModalDetalhe pedido={modalDetalhe} onClose={() => setModalDetalhe(null)} onAtualizar={carregar} usuario={usuario}/>}
        </>
    );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
    const [usuario, setUsuario] = useState(USUARIO);

    function handleLogin(u) { setUsuario(u); }
    function handleLogout() {
        USUARIO = null;
        localStorage.removeItem('erp_access');
        localStorage.removeItem('erp_refresh');
        localStorage.removeItem('erp_user');
        setUsuario(null);
        location.href='/login.html';
    }

    if (!usuario) return <Login onLogin={handleLogin}/>;

    return (
        <>
            <Sidebar usuario={usuario} onLogout={handleLogout}/>
            <div className="main">
                <ModuloPedidos usuario={usuario}/>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
