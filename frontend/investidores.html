const _getAT=()=>localStorage.getItem('erp_access');
const _getRF=()=>localStorage.getItem('erp_refresh');
let USUARIO=null;
try{USUARIO=JSON.parse(localStorage.getItem('erp_user'));}catch(e){}

async function _refreshToken(){
  try{const rf=_getRF();if(!rf)return false;
    const r=await fetch(API_URL+'/api/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:rf})});
    if(!r.ok)return false;const data=await r.json();
    if(data.accessToken){localStorage.setItem('erp_access',data.accessToken);if(data.refreshToken)localStorage.setItem('erp_refresh',data.refreshToken);return true;}
    return false;}catch(e){return false;}}

async function apiFetch(path,options={}){
  try{let at=_getAT();
    if(at){try{const p=JSON.parse(atob(at.split('.')[1]));if((p.exp*1000)-Date.now()<30000){await _refreshToken();at=_getAT();}}catch(e){}}
    const headers={'Content-Type':'application/json'};if(at)headers['Authorization']='Bearer '+at;
    const res=await fetch(API_URL+path,{...options,headers});
    if(res.status===401){const ok=await _refreshToken();
      if(ok){at=_getAT();headers['Authorization']='Bearer '+at;const r2=await fetch(API_URL+path,{...options,headers});if(r2.status===401){localStorage.removeItem('erp_access');localStorage.removeItem('erp_refresh');localStorage.removeItem('erp_user');location.href='/login.html';return null;}return await r2.json();}
      localStorage.removeItem('erp_access');localStorage.removeItem('erp_refresh');localStorage.removeItem('erp_user');location.href='/login.html';return null;}

function fmtK(v) { if(!v&&v!==0) return 'â€”'; if(v>=1000000) return 'R$ '+(v/1000000).toFixed(1)+'M'; if(v>=1000) return 'R$ '+(v/1000).toFixed(0)+'k'; return fmt(v); }
function fmtData(d) { if(!d) return 'â€”'; return new Date(d+(d.length===10?'T00:00:00':'')).toLocaleDateString('pt-BR'); }

                <select className="filter-sel" value={filtroPerfil} onChange={e=>setFiltroPerfil(e.target.value)}>
                    <option value="">Todos os perfis</option>
                    <option value="socio">ðŸ›ï¸ SÃ³cios</option>
                    <option value="patrocinador">ðŸŽ½ Patrocinadores</option>
                    <option value="investidor">ðŸ“ˆ Investidores</option>
                    <option value="mecenatismo">â¤ï¸ Mecenas</option>
                </select>
                {(busca||filtroPerfil)&&<button className="btn-ghost" onClick={()=>{setBusca('');setFiltroPerfil('')}}>âœ• Limpar</button>}
                <div style={{marginLeft:'auto',fontSize:13,color:'#94a3b8'}}>{investidores.length} registros</div>
            </div>

            {/* CARDS */}
            {loading ? (
                <div style={{textAlign:'center',padding:'60px',color:'#94a3b8'}}>Carregando...</div>
            ) : investidores.length === 0 ? (
                <div className="empty-state"><div className="empty-icon">ðŸ”</div><p>Nenhum investidor encontrado.</p></div>
            ) : (
                <div className="inv-grid">
                    {investidores.map(inv => <div key={inv.id} className="inv-card" onClick={()=>setDetalhe(inv)}>
                        <div className="inv-card-header">
                            <div className="inv-avatar" style={{background:PERFIL_BG[inv.perfil],fontSize:20}}>
                                {PERFIL_EMOJI[inv.perfil]}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                                <div className="inv-nome">{inv.nome_fantasia || inv.nome}</div>
                                {inv.nome_fantasia && <div className="inv-sub">{inv.nome}</div>}
                                <div style={{display:'flex',gap:5,marginTop:5,flexWrap:'wrap'}}>
                                    <span className={'pill pill-'+inv.perfil}>{PERFIL_LABEL[inv.perfil]}</span>
                                    {inv.percentual_participacao>0 && <span className="equity-pill">{inv.percentual_participacao}%</span>}
                                </div>
                            </div>
                        </div>
                        <div className="inv-card-metrics">
                            <div className="metric-box">
                                <div className="metric-label">Total Aportado</div>
                                <div className="metric-value ok">{fmtK(inv.total_aportado)}</div>
                            </div>
                            <div className="metric-box">
                                <div className="metric-label">{inv.saldo_devedor>0 ? 'Saldo Devedor' : inv.retorno_pendente>0 ? 'Retorno Pendente' : 'PatrocÃ­nio'}</div>
                                <div className={'metric-value '+(inv.saldo_devedor>0?'alerta':inv.retorno_pendente>0?'amarelo':'')}>
                                    {fmtK(inv.saldo_devedor>0 ? inv.saldo_devedor : inv.retorno_pendente>0 ? inv.retorno_pendente : inv.total_patrocinio)}
                                </div>
                            </div>
                        </div>
                        <div className="inv-card-footer">
                            <span style={{fontSize:12,color:'#94a3b8'}}>{inv.qtd_aportes} aporte{inv.qtd_aportes!==1?'s':''}</span>
                            <span style={{fontSize:12,color:'#64748b',fontWeight:600}}>Ver detalhes â†’</span>
                        </div>
                    </div>)}
                </div>
            )}
        </div>

        {detalhe && <ModalInvestidor inv={detalhe} onClose={()=>setDetalhe(null)} onAtualizar={carregar}/>}
    </>;
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
    const [usuario, setUsuario] = useState(USUARIO);
    function logout() { TOKEN=null; USUARIO=null; localStorage.removeItem('erp_access'); localStorage.removeItem('erp_refresh'); localStorage.removeItem('erp_user'); setUsuario(null); location.href='/login.html'; }
    if (!usuario) return <Login onLogin={u=>setUsuario(u)}/>;
    return <><Sidebar usuario={usuario} onLogout={logout}/><div className="main"><ModuloInvestidores usuario={usuario}/></div></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
