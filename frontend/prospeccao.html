<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>
    :root {
      --bg:          #1C1C2E;
      --sidebar-bg:  #14142B;
      --card-bg:     #252540;
      --card-borda:  #3A3A5C;
      --input-bg:    #14142B;
      --verde:       #22C55E;
      --verde-med:   #16A34A;
      --verde-dark:  #15803D;
      --vermelho:    #FF5C5C;
      --dourado:     #F59E0B;
      --azul:        #3B82F6;
      --azul-dark:   #1D4ED8;
      --texto:       #3A3A5C;
      --texto-leve:  #94A3B8;
      --roxo:        #8B5CF6;
      --laranja:     #F97316;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    background: var(--bg); color: #3A3A5C; min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    

    /* LAYOUT */
    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; min-height: 100vh; background: var(--sidebar-bg);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
      border-right: 1px solid #3A3A5C;
    }
    .sidebar-logo {
      padding: 18px 16px; border-bottom: 1px solid #3A3A5C;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo .icon { font-size: 26px; }
    .sidebar-logo .title { color: #fff; font-size: 13px; font-weight: 700; }
    .sidebar-logo .sub   { color: rgba(255,255,255,.5); font-size: 10px; }
    .sidebar-nav { flex: 1; padding: 10px 0; }
    .nav-label {
      color: rgba(255,255,255,.35); font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; padding: 10px 14px 3px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 9px; padding: 9px 14px;
      color: rgba(255,255,255,.65); font-size: 12px; text-decoration: none;
      transition: all .15s; border-left: 3px solid transparent; cursor: pointer;
    }
    .nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .nav-item.ativo { background: rgba(59,130,246,.15); color: #60a5fa; border-left-color: #3b82f6; font-weight: 600; }
    .nav-item.disabled { opacity: .4; cursor: not-allowed; }
    .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }

    /* MAIN */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

    /* TOPBAR */
    .topbar {
      background: var(--card-bg); border-bottom: 1px solid var(--card-borda);
      padding: 0 24px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .topbar-title span { font-size: 18px; }

    /* CONTENT */
    .content { padding: 20px 24px; flex: 1; }

    /* KPI GRID */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card {
      background: var(--card-bg); border: 1px solid var(--card-borda); border-radius: 8px;
      padding: 14px 16px; border-top: 3px solid;
    }
    .kpi-card.azul    { border-top-color: #3b82f6; }
    .kpi-card.verde   { border-top-color: #22c55e; }
    .kpi-card.amarelo { border-top-color: #f59e0b; }
    .kpi-card.vermelho{ border-top-color: #ef4444; }
    .kpi-card.roxo    { border-top-color: #a78bfa; }
    .kpi-card.cinza   { border-top-color: #64748b; }
    .kpi-label  { font-size: 10px; color: var(--texto-leve); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .kpi-value  { font-size: 22px; font-weight: 800; color: #fff; }
    .kpi-sub    { font-size: 10px; color: var(--texto-leve); margin-top: 2px; }

    /* TOOLBAR */
    .toolbar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 200px; background: var(--card-bg); border: 1px solid var(--card-borda);
      border-radius: 6px; padding: 7px 12px; color: #fff; font-size: 13px; outline: none;
    }
    .search-box::placeholder { color: var(--texto-leve); }
    .search-box:focus { border-color: #3b82f6; }
    .filter-select {
      background: var(--card-bg); border: 1px solid var(--card-borda);
      border-radius: 6px; padding: 7px 10px; color: #fff; font-size: 12px; outline: none;
    }
    .filter-select:focus { border-color: #3b82f6; }
    .btn { padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-ghost { background: transparent; border: 1px solid var(--card-borda); color: var(--texto-leve); }

    .btn-danger { background: #FF5C5C; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* TABLE */

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      background: var(--sidebar-bg); color: var(--texto-leve); font-size: 10px;
      text-transform: uppercase; letter-spacing: .06em; padding: 10px 12px;
      text-align: left; border-bottom: 1px solid var(--card-borda); white-space: nowrap;
      cursor: pointer; user-select: none;

    thead th:hover { color: #60a5fa; }
    tbody tr { border-bottom: 1px solid #1a2f4a; transition: background .1s; cursor: pointer; }
    tbody tr:hover { background: rgba(59,130,246,.07); }
    tbody td { padding: 10px 12px; vertical-align: middle; }
    .player-nome strong { color: #fff; font-size: 13px; }
    .player-nome small  { color: var(--texto-leve); font-size: 10px; display: block; }

    .ab-3  { background: #b91c1c; }
    .ab-4  { background: #FF5C5C; }
    .ab-5  { background: #ef4444; }
    .ab-6  { background: #f87171; color: #1a1a1a; }
    .ab-7  { background: #ea580c; }
    .ab-8  { background: #f97316; }
    .ab-9  { background: #fb923c; }
    .ab-10 { background: #fdba74; color: #1a1a1a; }
    .ab-11 { background: #fcd34d; color: #1a1a1a; }
    .ab-12 { background: #fde68a; color: #1a1a1a; }
    .ab-13 { background: #bbf7d0; color: #1a1a1a; }
    .ab-14 { background: #86efac; color: #1a1a1a; }
    .ab-15 { background: #4ade80; color: #1a1a1a; }
    .ab-16 { background: #22c55e; color: #fff; }
    .ab-17 { background: #16a34a; }
    .ab-18 { background: #15803d; }
    .ab-19 { background: #166534; }
    .ab-20 { background: #14532d; border: 2px solid #4ade80; }

    /* STATUS BADGE */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .badge-obs      { background: #3A3A5C; color: #60a5fa; }
    .badge-interesse{ background: #1c3f2a; color: #4ade80; }
    .badge-neg      { background: #3b1f00; color: #fb923c; }
    .badge-proposta { background: #2d1a5f; color: #c4b5fd; }
    .badge-contratado{ background: #14532d; color: #86efac; }
    .badge-descartado{ background: #2d1414; color: #f87171; }

    /* PRIORITY */
    .prio { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .prio-alta   { background: #ef4444; }
    .prio-media  { background: #f59e0b; }
    .prio-baixa  { background: #64748b; }

    /* STARS */
    .stars { color: #f59e0b; font-size: 12px; letter-spacing: 1px; }

    /* POSITION BADGE */

    /* PLAYER MODAL */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 20px; overflow-y: auto;

    .modal {

    .modal-header {
      background: linear-gradient(135deg, #14142B 0%, #252540 100%);
      border-bottom: 1px solid var(--card-borda);
      padding: 20px 24px; display: flex; align-items: center; gap: 16px; position: relative;

    .player-avatar {
      width: 64px; height: 64px; border-radius: 8px; background: var(--card-bg);
      display: flex; align-items: center; justify-content: center; font-size: 28px;
      border: 2px solid var(--card-borda); flex-shrink: 0;

    .player-info-main h2 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .player-info-main .meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: var(--texto-leve); font-size: 22px; cursor: pointer;
    }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 20px 24px; }

    /* ATTR SECTION */
    .attr-section { margin-bottom: 20px; }
    .attr-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
      color: var(--texto-leve); margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--card-borda);
    }
    .attr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; }
    .attr-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--card-bg); border-radius: 6px; padding: 6px 10px;
    }
    .attr-name { flex: 1; font-size: 11px; color: var(--texto-leve); }
    .attr-bar-wrap { width: 60px; height: 4px; background: #3A3A5C; border-radius: 2px; overflow: hidden; }
    .attr-bar { height: 100%; border-radius: 2px; }

    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .form-full { grid-column: 1 / -1; }
    .form-label { font-size: 11px; color: var(--texto-leve); margin-bottom: 4px; display: block; }
    .form-input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--card-borda);
      border-radius: 6px; padding: 8px 10px; color: #fff; font-size: 13px; outline: none;
    }
    .form-input:focus { border-color: #3b82f6; }
    .form-input::placeholder { color: var(--texto-leve); }
    .form-section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: #60a5fa; margin: 18px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--card-borda);
    }
    .attr-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .attr-input-label { width: 130px; font-size: 11px; color: var(--texto-leve); flex-shrink: 0; }
    .attr-input-range { flex: 1; accent-color: #3b82f6; }
    .attr-input-val { width: 30px; text-align: center; font-weight: 800; font-size: 12px; }

    /* IMPORT */
    .import-zone {
      border: 2px dashed var(--card-borda); border-radius: 8px;
      padding: 32px; text-align: center; color: var(--texto-leve);
      cursor: pointer; transition: border-color .2s;
    }
    .import-zone:hover, .import-zone.drag { border-color: #3b82f6; color: #60a5fa; }
    .import-zone .icon { font-size: 36px; margin-bottom: 10px; }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid var(--card-borda); margin-bottom: 20px; }
    .tab-btn {
      background: none; border: none; color: var(--texto-leve); font-size: 12px;
      padding: 10px 16px; border-bottom: 2px solid transparent; cursor: pointer;
      font-weight: 600; transition: all .15s;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #3b82f6; }

    /* MISC */
    .card { background: var(--card-bg); border: 1px solid var(--card-borda); border-radius: 8px; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--texto-leve); gap: 10px; font-size: 14px; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 48px; color: var(--texto-leve); font-size: 14px; }
    .empty .icon { font-size: 40px; margin-bottom: 10px; }
    textarea.form-input { resize: vertical; min-height: 80px; }
    .divider { height: 1px; background: var(--card-borda); margin: 16px 0; }
    .text-green { color: #4ade80; }
    .text-red   { color: #f87171; }
    .flag { font-size: 18px; }
    .nota-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 6px; font-weight: 800; font-size: 13px;
      background: #3A3A5C; color: #60a5fa; border: 1px solid #2d5080;
    }
  </style>
</head>

const API = (window._ENV?.API_URL || '') + '/api';

async function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('erp_token');
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
    ...opts,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Helpers ─────────────────────────────────────────────────
const POSICOES = ['goleiro','zagueiro','lateral_direito','lateral_esquerdo','volante','meia','meia_ofensivo','atacante','ponta'];
const POSICAO_LABEL = { goleiro:'GOL', zagueiro:'ZAG', lateral_direito:'LD', lateral_esquerdo:'LE', volante:'VOL', meia:'MEI', meia_ofensivo:'MAO', atacante:'ATA', ponta:'PON' };

const STATUS_LABEL = { observacao:'Em Observação', interesse:'Interesse', negociando:'Negociando', proposta_enviada:'Proposta Enviada', contratado:'Contratado', descartado:'Descartado' };

const PRIO_LABEL   = { alta:'Alta', media:'Média', baixa:'Baixa' };

function idade(dob) {
  if (!dob) return '—';
  const d = new Date(dob); const hoje = new Date();
  let a = hoje.getFullYear() - d.getFullYear();
  if (hoje < new Date(hoje.getFullYear(), d.getMonth(), d.getDate())) a--;
  return a;
}
function fmtVal(n) {
  if (!n) return '—';
  const v = Number(n);
  if (v >= 1e6) return 'R$ ' + (v/1e6).toFixed(1).replace('.',',') + 'M';
  if (v >= 1e3) return 'R$ ' + (v/1e3).toFixed(0) + 'k';
  return 'R$ ' + v.toLocaleString('pt-BR');
}
function attrColor(v) {
  if (!v) return '#2d3748';
  if (v <= 5) return '#FF5C5C'; if (v <= 9) return '#ea580c';
  if (v <= 12) return '#f59e0b'; if (v <= 15) return '#22c55e';
  if (v <= 18) return '#16a34a'; return '#14532d';
}
function stars(n) {
  if (!n) return '—';
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR');
}

// ── AttrBadge ────────────────────────────────────────────────
function AB({ v, sm }) {
  if (!v) return <span className={`ab${sm?' sm':''} ab-0`} style={{background:'#1e2d3d',color:'#4a5568'}}>—</span>;
  return <span className={`ab${sm?' sm':''} ab-${v}`}>{v}</span>;
}

// ── AttrBar ──────────────────────────────────────────────────
function AttrRow({ label, value }) {
  const pct = value ? Math.round((value / 20) * 100) : 0;
  return (
    <div className="attr-row">
      <span className="attr-name">{label}</span>
      <AB v={value} sm />
      <div className="attr-bar-wrap">
        <div className="attr-bar" style={{ width: pct + '%', background: attrColor(value) }} />
      </div>
    </div>
  );
}

// ── AttrInputRow ─────────────────────────────────────────────
function AttrInput({ label, name, form, setForm }) {
  const v = form[name] || 0;
  return (
    <div className="attr-input-row">
      <span className="attr-input-label">{label}</span>
      <input type="range" min="0" max="20" value={v} className="attr-input-range"
        onChange={e => setForm(f => ({...f, [name]: parseInt(e.target.value)}))} />
      <AB v={v > 0 ? v : null} sm />
    </div>
  );
}

                  <input type="number" min="0" className="form-input" value={form.stats_clean_sheets} onChange={set('stats_clean_sheets')} />
                </div>
                <div>
                  <label className="form-label">Cartões Amarelos</label>
                  <input type="number" min="0" className="form-input" value={form.stats_amarelos} onChange={set('stats_amarelos')} />
                </div>
                <div>
                  <label className="form-label">Cartões Vermelhos</label>
                  <input type="number" min="0" className="form-input" value={form.stats_vermelhos} onChange={set('stats_vermelhos')} />
                </div>
              </div>
            </div>
          )}

          {tab === 'avaliacao' && (
            <div>
              <div className="form-grid">
                <div>
                  <label className="form-label">Nota do Olheiro (1-10)</label>
                  <input type="number" min="1" max="10" className="form-input" value={form.nota_olheiro} onChange={e => setForm(f => ({...f, nota_olheiro: parseInt(e.target.value)}))} />
                </div>
              </div>
              <div style={{marginTop:14}}>
                <label className="form-label">✅ Pontos Fortes</label>
                <textarea className="form-input" value={form.pontos_fortes} onChange={set('pontos_fortes')} placeholder="Descreva os pontos fortes..." />
              </div>
              <div style={{marginTop:12}}>
                <label className="form-label">⚠️ Pontos Fracos</label>
                <textarea className="form-input" value={form.pontos_fracos} onChange={set('pontos_fracos')} placeholder="Descreva os pontos fracos..." />
              </div>
              <div style={{marginTop:12}}>
                <label className="form-label">📝 Observações Gerais</label>
                <textarea className="form-input" value={form.observacoes} onChange={set('observacoes')} placeholder="Observações do scout, histórico de negociação, etc." style={{minHeight:100}} />
              </div>
            </div>
          )}

          <div className="divider" />
          <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={() => { if(!form.nome.trim()) { alert('Informe o nome do jogador.'); return; } onSave(form); }}>
              {initial ? '💾 Salvar Alterações' : '➕ Adicionar Jogador'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ImportModal ──────────────────────────────────────────────
function ImportModal({ onClose, onImport }) {
  const [rows, setRows] = useState([]);
  const [preview, setPreview] = useState(false);
  const fileRef = useRef();

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
    return lines.slice(1).map(line => {
      const vals = line.split(',');
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i]||'').trim(); });
      return obj;
    }).filter(r => r.nome);
  }

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const parsed = parseCSV(e.target.result);
      setRows(parsed); setPreview(true);
    };
    reader.readAsText(file, 'UTF-8');
  }

  const template = 'nome,nome_guerra,posicao,data_nascimento,nacionalidade,clube_atual,valor_mercado,prioridade\nJoão Silva,Joãozinho,atacante,1999-01-01,Brasil,Clube XYZ,2000000,alta\n';

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:700}}>
        <div className="modal-header">
          <h2 style={{color:'#fff',fontSize:16}}>📥 Importar Jogadores por Planilha</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {!preview ? (
            <>
              <div className="import-zone" onClick={() => fileRef.current.click()}
                onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag'); }}
                onDragLeave={e => e.currentTarget.classList.remove('drag')}
                onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); }}>
                <div className="icon">📄</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Clique ou arraste um arquivo CSV</div>
                <div style={{fontSize:12}}>Formatos suportados: .csv (separado por vírgula)</div>
              </div>
              <input type="file" accept=".csv" ref={fileRef} style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
              <div style={{marginTop:16}}>
                <div style={{fontSize:12,color:'var(--texto-leve)',marginBottom:8}}>📋 Modelo de planilha:</div>
                <pre style={{background:'var(--card-bg)',border:'1px solid var(--card-borda)',borderRadius:6,padding:12,fontSize:11,color:'#94a3b8',overflowX:'auto'}}>{template}</pre>
                <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={() => {
                  const a = document.createElement('a');
                  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(template);
                  a.download = 'modelo_prospeccao.csv'; a.click();
                }}>⬇️ Baixar modelo CSV</button>
              </div>
            </>
          ) : (
            <>
              <div style={{marginBottom:12,color:'#4ade80',fontSize:13}}>✅ {rows.length} jogador(es) encoutrado(s). Confirme para importar:</div>
              <div className="table-wrap" style={{maxHeight:300,overflowY:'auto'}}>
                <table>
                  <thead><tr><th>Nome</th><th>Posição</th><th>Clube</th><th>Prioridade</th></tr></thead>
                  <tbody>
                    {rows.map((r,i) => (
                      <tr key={i}><td>{r.nome}</td><td>{POSICAO_NOME[r.posicao]||r.posicao}</td><td>{r.clube_atual||'—'}</td><td>{r.prioridade||'media'}</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{display:'flex',gap:10,marginTop:16,justifyContent:'flex-end'}}>
                <button className="btn btn-ghost" onClick={() => setPreview(false)}>← Voltar</button>
                <button className="btn btn-success" onClick={() => onImport(rows)}>✅ Importar {rows.length} jogadores</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── App Principal ────────────────────────────────────────────
function App() {
  const [jogadores, setJogadores] = useState([]);
  const [resumo, setResumo]       = useState(null);
  const [loading, setLoading]     = useState(true);
  const [selected, setSelected]   = useState(null);
  const [showForm, setShowForm]   = useState(false);
  const [editing, setEditing]     = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [busca, setBusca]         = useState('');
  const [filStatus, setFilStatus] = useState('');
  const [filPosicao, setFilPosicao] = useState('');
  const [filPrioridade, setFilPrioridade] = useState('');
  const [sortKey, setSortKey]     = useState('prioridade');
  const [sortDir, setSortDir]     = useState('asc');

  const carregar = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (filStatus)    params.set('status', filStatus);
      if (filPosicao)   params.set('posicao', filPosicao);
      if (filPrioridade)params.set('prioridade', filPrioridade);
      if (busca)        params.set('busca', busca);
      const [data, res] = await Promise.all([
        apiFetch('/prospeccao?' + params),
        apiFetch('/prospeccao/resumo'),
      ]);
      setJogadores(data.jogadores || []);
      setResumo(res);
    } catch {
      setJogadores(DEMO.jogadores);
      setResumo(DEMO.resumo);
    } finally {
      setLoading(false);
    }
  }, [busca, filStatus, filPosicao, filPrioridade]);

  useEffect(() => { carregar(); }, [carregar]);

  async function salvar(form) {
    try {
      if (editing) {
        const updated = await apiFetch('/prospeccao/' + editing.id, { method: 'PUT', body: JSON.stringify(form) });
        setJogadores(js => js.map(j => j.id === editing.id ? updated : j));
      } else {
        const novo = await apiFetch('/prospeccao', { method: 'POST', body: JSON.stringify(form) });
        setJogadores(js => [novo, ...js]);
      }
    } catch {
      // demo mode: update local state
      if (editing) {
        const updated = { ...editing, ...form, id: editing.id };
        setJogadores(js => js.map(j => j.id === editing.id ? updated : j));
        if (selected?.id === editing.id) setSelected(updated);
      } else {
        const novo = { ...form, id: Date.now() };
        setJogadores(js => [novo, ...js]);
      }
    }
    setShowForm(false); setEditing(null);
  }

  async function remover(id) {
    try { await apiFetch('/prospeccao/' + id, { method: 'DELETE' }); } catch {}
    setJogadores(js => js.filter(j => j.id !== id));
    setSelected(null);
  }

  async function mudarStatus(id, status) {
    try { await apiFetch('/prospeccao/' + id + '/status', { method: 'PATCH', body: JSON.stringify({ status_prospeccao: status }) }); } catch {}
    setJogadores(js => js.map(j => j.id === id ? { ...j, status_prospeccao: status } : j));
    setSelected(s => s?.id === id ? { ...s, status_prospeccao: status } : s);
  }

  async function importar(rows) {
    for (const r of rows) {
      const form = { ...FORM_EMPTY, ...r,
        prioridade: r.prioridade || 'media',
        status_prospeccao: r.status_prospeccao || 'observacao',
        avaliacao_geral: parseInt(r.avaliacao_geral) || 3,
      };
      await salvar(form);
    }
    setShowImport(false);
  }

  // Sort & filter local
  const lista = [...jogadores].sort((a, b) => {
    let va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
    if (sortKey === 'prioridade') {
      const order = { alta: 1, media: 2, baixa: 3 };
      va = order[va] || 9; vb = order[vb] || 9;
    }
    if (sortKey === 'avaliacao_geral' || sortKey === 'nota_olheiro') { va = Number(va)||0; vb = Number(vb)||0; }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  function toggleSort(k) {
    if (sortKey === k) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(k); setSortDir('asc'); }
  }
  const sortIcon = k => sortKey === k ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

  const r = resumo || {};

  return (
    <div className="layout">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="icon">🔭</div>
          <div>
            <div className="title">ERP SAF</div>
            <div className="sub">Prospecção</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-label">Navegação</div>
          {[
            {href:'index.html',    icon:'👥', label:'Funcionários'},
            {href:'atletas.html',  icon:'⚽', label:'Atletas'},
            {href:'financeiro.html',icon:'💰',label:'Financeiro'},
            {href:'pedidos.html',  icon:'🛒', label:'Compras'},
            {href:'investidores.html',icon:'📈',label:'Investidores'},
            {href:'metas.html',    icon:'🎯', label:'Metas'},
            {href:'relatorios.html',icon:'📊',label:'Relatórios'},
            {href:'prospeccao.html',icon:'🔭',label:'Prospecção', ativo:true},
          ].map(item => (
            <a key={item.href} href={item.href} className={`nav-item${item.ativo?' ativo':''}`}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
            </a>
          ))}
        </nav>
      </aside>

      {/* MAIN */}
      <main className="main">
        <div className="topbar">
          <div className="topbar-title"><span>🔭</span> Prospecção de Jogadores</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={() => setShowImport(true)}>📥 Importar CSV</button>
            <button className="btn btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>➕ Novo Jogador</button>
          </div>
        </div>

        <div className="content">
          {/* KPIs */}
          <div className="kpi-grid">
            <div className="kpi-card azul">
              <div className="kpi-label">Total</div>
              <div className="kpi-value">{r.total||0}</div>
              <div className="kpi-sub">prospectados</div>
            </div>
            <div className="kpi-card vermelho">
              <div className="kpi-label">Alta Prior.</div>
              <div className="kpi-value">{r.alta_prioridade||0}</div>
              <div className="kpi-sub">🔴 urgentes</div>
            </div>
            <div className="kpi-card amarelo">
              <div className="kpi-label">Negociando</div>
              <div className="kpi-value">{(r.negociando||0)+(r.proposta_enviada||0)}</div>
              <div className="kpi-sub">em andamento</div>
            </div>
            <div className="kpi-card verde">
              <div className="kpi-label">Contratados</div>
              <div className="kpi-value">{r.contratado||0}</div>
              <div className="kpi-sub">✅ fechados</div>
            </div>
            <div className="kpi-card roxo">
              <div className="kpi-label">Interesse</div>
              <div className="kpi-value">{r.interesse||0}</div>
              <div className="kpi-sub">em avaliação</div>
            </div>
            <div className="kpi-card cinza">
              <div className="kpi-label">Observação</div>
              <div className="kpi-value">{r.observacao||0}</div>
              <div className="kpi-sub">monitorando</div>
            </div>
          </div>

          {/* TOOLBAR */}
          <div className="toolbar">
            <input className="search-box" placeholder="🔍 Buscar jogador ou clube..." value={busca}
              onChange={e => setBusca(e.target.value)} />
            <select className="filter-select" value={filStatus} onChange={e => setFilStatus(e.target.value)}>
              <option value="">Todos os status</option>
              {Object.entries(STATUS_LABEL).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
            </select>
            <select className="filter-select" value={filPosicao} onChange={e => setFilPosicao(e.target.value)}>
              <option value="">Todas posições</option>
              {POSICOES.map(p => <option key={p} value={p}>{POSICAO_NOME[p]}</option>)}
            </select>
            <select className="filter-select" value={filPrioridade} onChange={e => setFilPrioridade(e.target.value)}>
              <option value="">Toda prioridade</option>
              <option value="alta">🔴 Alta</option>
              <option value="media">🟡 Média</option>
              <option value="baixa">⚪ Baixa</option>
            </select>
          </div>

     0    {/* TABLE */}
          <div className="card">
            {loading ? (
              <div className="loading"><span className="spin">⏳</span> Carregando...</div>
            ) : lista.length === 0 ? (
              <div className="empty">
                <div className="icon">🔭</div>
                <div>Nenhum jogador prospectado ainda.</div>
                <button className="btn btn-primary" style={{marginTop:16}} onClick={() => setShowForm(true)}>➕ Adicionar primeiro jogador</button>
              </div>
            ) : (
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th onClick={() => toggleSort('prioridade')}>Prio{sortIcon('prioridade')}</th>
                      <th onClick={() => toggleSort('nome')}>Jogador{sortIcon('nome')}</th>
                      <th>Pos</th>
                      <th onClick={() => toggleSort('data_nascimento')}>Idade{sortIcon('data_nascimento')}</th>
                      <th>Clube</th>
                      <th>Contrato</th>
                      <th>Valor</th>
                      <th title="Velocidade">VEL</th>
                      <th title="Finalização">FIN</th>
                      <th title="Passe Curto">PAS</th>
                      <th title="Desarme">DES</th>
                      <th title="Visão">VIS</th>
                      <th onClick={() => toggleSort('avaliacao_geral')}>Aval{sortIcon('avaliacao_geral')}</th>
     0                <th onClick={() => toggleSort('nota_olheiro')}>Nota{sortIcon('nota_olheiro')}</th>
                      <th onClick={() => toggleSort('status_prospeccao')}>Status{sortIcon('status_prospeccao')}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {lista.map(j => (
                      <tr key={j.id} onClick={() => setSelected(j)}>
                        <td><span className={`prio prio-${j.prioridade||'media'}`} title={PRIO_LABEL[j.prioridade]} /></td>
                        <td className="player-nome">
                          <strong>{j.nome}</strong>
                          {j.nome_guerra && <small>"{j.nome_guerra}"</small>}
                        </td>
                        <td>{j.posicao && <span className="pos-badge">{POSICAO_LABEL[j.posicao]}</span>}</td>
                        <td style={{color:'var(--texto-leve)'}}>{idade(j.data_nascimento)}</td>
                        <td style={{color:'var(--texto-leve)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{j.clube_atual||'—'}</td>
            0           <td style={{color: j.contrato_ate && new Date(j.contrato_ate) < new Date(Date.now()+90*864e5) ? '#f87171' : 'var(--texto-leve)', fontSize:11}}>{fmtDate(j.contrato_ate)}</td>
                        <td style={{color:'#60a5fa',fontSize:11}}>{fmtVal(j.valor_mercado)}</td>
                        <td><AB v={j.attr_velocidade} sm /></td>
                        <td><AB f={j.attr_finalizacao} sm /></td>
                        <td><AB f={j.attr_passe_curto} sm /></td>
                        <td><AB f={j.attr_desarme} sm /></td>
                        <td><AB v={j.attr_visao} sm /></td>
                        <td><span className="stars" style={{fontSize:10}}>{stars(j.avaliacao_geral)}</span></td>
                        <td><span className="nota-badge" style={{width:24,height:24,fontSize:11}}>{j.nota_olheiro||'—'}</span></td>
                        <td><span className={`badge badge-${STATUS_CLS[j.status_prospeccao]}`}>{STATUS_LABEL[j.status_prospeccao]}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
          <div style={{fontSize:11,color:'var(--texto-leve)',marginTop:10,textAlign:'right'}}>
            {lista.length} jogador(es) | Clique em um jogador para ver detalhes
          </div>
        </div>
      </main>

      {selected && (
        <PlayerModal
          player={selected}
          onClose={() => setSelected(null)}
          onEdit={p => { setEditing(p); setSelected(null); setShowForm(true); }}
          onDelete={id => remover(id)}
          onStatusChange={(id, s) => mudarStatus(id, s)}
        />
      )}
      {showForm && (
        <FormModal
          initial={editing}
          onSave={salvar}
          onClose={() => { setShowForm(false); setEditing(null); }}
        />
      )}
      {showImport && (
        <ImportModal
          onClose={() => setShowImport(false)}
          onImport={importar}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
