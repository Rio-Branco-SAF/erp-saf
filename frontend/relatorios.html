const API_URL = (window.ERP_CONFIG && window.ERP_CONFIG.API_URL) || 'http://localhost:3001/api';
async function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('erp_access');
  const res = await fetch(API_URL + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(opts.headers || {}) }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro || 'Erro na API');
  return data;
}

  if (n >= 1_000)     return 'R$ ' + (n / 1_000).toFixed(1).replace('.', ',') + 'k';

function SparkBar({ dados, altKey, recKey, despKey, maxVal }) {
  const max = maxVal || Math.max(...dados.map(d => Math.max(d[recKey]||0, d[despKey]||0)));
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:3, height:60 }}>
      {dados.map((d, i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', gap:2, alignItems:'center' }}>
          <div style={{ width:'100%', display:'flex', gap:1, alignItems:'flex-end', height:50 }}>
            <div style={{ flex:1, background:'#00875a', borderRadius:'2px 2px 0 0', height: max > 0 ? `${(d[recKey]/max)*100}%` : '0%', minHeight:2 }} title={`Receita: R$ ${Number(d[recKey]).toLocaleString('pt-BR')}`}/>
            <div style={{ flex:1, background:'#de350b', borderRadius:'2px 2px 0 0', height: max > 0 ? `${(d[despKey]/max)*100}%` : '0%', minHeight:2 }} title={`Despesa: R$ ${Number(d[despKey]).toLocaleString('pt-BR')}`}/>

          <span style={{ fontSize:9, color:'#94a3b8', transform:'rotate(-45deg)', transformOrigin:'top center', display:'block', marginTop:4 }}>{d[altKey]}</span>

      ))}
    </div>
  );
}

            <div className="bar-track">
              <div className="bar-fill" style={{ width:`${pct}%`, background: color || CORES[i % CORES.length] }}>
                {pct > 25 && <span className="bar-val">{fmtK(v)}</span>}
              </div>
            </div>
            {pct <= 25 && <span className="bar-val-out">{fmtK(v)}</span>}
          </div>
        );
      })}
    </div>
  );
}

function EquityBar({ equity }) {
  const total = equity.reduce((s, e) => s + Number(e.percentual_participacao||0), 0);
  const clube = 100 - total;
  const all = clube > 0 ? [{ nome:'Clube', percentual_participacao:clube, perfil:'clube' }, ...equity] : equity;
  return (
    <div>
      <div className="equity-bar">
        {all.map((e, i) => (
          <div key={i} className="equity-seg"
               style={{ width:`${e.percentual_participacao}%`, background: CORES_EQUITY[e.perfil] || CORES[i%CORES.length] }}
               title={`${e.nome}: ${e.percentual_participacao}%`}>
            {e.percentual_participacao >= 10 && `${e.percentual_participacao}%`}
          </div>
        ))}
      </div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
        {all.map((e, i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:5, fontSize:11 }}>
            <div style={{ width:10, height:10, borderRadius:2, background: CORES_EQUITY[e.perfil] || CORES[i%CORES.length], flexShrink:0 }}/>
            <span style={{ color:'#64748b' }}>{e.nome} ({e.percentual_participacao}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TabFinanceiro() {

  const carregar = useCallback(() => {
    setLoading(true);
    const params = new URLSearchParams();
    if (filtro.ini) params.set('periodo_ini', filtro.ini);
    if (filtro.fim) params.set('periodo_fim', filtro.fim);
    apiFetch('/relatorios/financeiro?' + params).catch(() => ({
      evolucao: DEMO_EVOLUCAO,
      kpis: { receita_total:5200000, despesa_total:4380000, qtd_receitas:48, qtd_despesas:92 },
      por_categoria: [
        { categoria:'patrocinio',   tipo:'receita', qtd:6,  total:1250000 },
        { categoria:'bilheteria',   tipo:'receita', qtd:12, total:820000  },
        { categoria:'transferencias', tipo:'receita', qtd:3, total:960000 },
        { categoria:'folha_pagamento', tipo:'despesa', qtd:12, total:2376000 },
        { categoria:'manutencao',   tipo:'despesa', qtd:18, total:480000  },

      ],

    })).then(d => setDados(d)).finally(() => setLoading(false));

  const k = dados.kpis || {};

  return (

      {/* KPIs */}

        <div className={`kpi-card ${resultado >= 0 ? 'verde' : 'vermelho'}`}>
          <div className="kpi-label">Resultado</div>
          <div className="kpi-value">{fmtK(Math.abs(resultado))}</div>
          <div className="kpi-sub">{resultado >= 0 ? '▲ Superávit' : '▼ Déficit'}</div>
        </div>
        <div className="kpi-card azul">
          <div className="kpi-label">Margem</div>
          <div className="kpi-value">{k.receita_total > 0 ? ((resultado / Number(k.receita_total)) * 100).toFixed(1) : 0}%</div>
          <div className="kpi-sub">Resultado / Receita</div>
        </div>
      </div>

      <div className="grid-2">
        {/* Receitas por categoria */}
        <div className="card">
          <div className="card-title"><span>📈</span> Receitas por Categoria</div>
          <HorBar items={receitas} labelKey="categoria" valKey="total" color="#00875a"/>
        </div>
        {/* Despesas por categoria */}
        <div className="card">
          <div className="card-title"><span>📉</span> Despesas por Categoria</div>
          <HorBar items={despesas} labelKey="categoria" valKey="total" color="#de350b"/>
        </div>
      </div>

      {/* Evolução */}
      <div className="card" style={{ marginBottom:20 }}>
        <div className="card-title"><span>📊</span> Evolução Mensal</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Mês</th><th>Receita</th><th>Despesa</th><th>Resultado</th><th>Margem</th></tr></thead>
            <tbody>
              {(dados.evolucao || []).map((m, i) => {
                const res = Number(m.resultado);
                const mg = Number(m.receita) > 0 ? ((res / Number(m.receita)) * 100).toFixed(1) : '0.0';
                return (
                  <tr key={i}>
                    <td><strong>{m.mes_label}</strong></td>
                    <td className="pos">{fmtK(m.receita)}</td>
                    <td className="neg">{fmtK(m.despesa)}</td>
                    <td className={res >= 0 ? 'pos' : 'neg'}>{res >= 0 ? '+' : ''}{fmtK(res)}</td>
                    <td><span className={`badge badge-${res >= 0 ? 'verde' : 'vermelho'}`}>{mg}%</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

            {(dados.metas || []).map((m, i) => {
              const pct = Number(m.percentual) || 0;
              const cor = m.status === 'concluida' ? '#00875a' : pct >= 70 ? '#00875a' : pct >= 40 ? '#ff8b00' : '#de350b';
              return (
                <div key={i} style={{ padding:12, background:'#f8fafc', borderRadius:8, borderLeft:`3px solid ${cor}` }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                    <span style={{ fontWeight:600, fontSize:13 }}>{m.titulo}</span>
                    {m.status === 'concluida'
                      ? <span className="conquista">🏆 Atingida</span>
                      : <span style={{ fontWeight:700, color:cor }}>{pct}%</span>}
                  </div>
                  <div className="progress-wrap">
                    <div className="progress-bar" style={{ width:`${pct}%`, background:cor }}/>
                  </div>
                  <div style={{ fontSize:11, color:'#64748b', marginTop:4 }}>
                    {m.valor_atual} / {m.valor_meta}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Aba Investidores ────────────────────────────────────────────
function TabInvestidores() {
  const [dados, setDados] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/relatorios/investidores')
      .catch(() => DEMO_INVESTIDORES)
      .then(d => { setDados(d); setLoading(false); });
  }, []);

  if (loading) return <div className="loading"><span className="spin">⟳</span> Carregando...</div>;
  if (!dados) return null;

  const tot = dados.totais || {};

  return (
    <div>
      {/* KPIs */}
      <div className="kpi-grid">
        <div className="kpi-card azul"><div className="kpi-label">Capital Investido</div><div className="kpi-value">{fmtK(tot.total_capital)}</div><div className="kpi-sub">Aportes de capital</div></div>
        <div className="kpi-card verde"><div className="kpi-label">Patrocínios</div><div className="kpi-value">{fmtK(tot.total_patrocinio)}</div><div className="kpi-sub">Total contratos</div></div>
        <div className="kpi-card laranja"><div className="kpi-label">Empréstimos</div><div className="kpi-value">{fmtK(tot.total_emprestimo)}</div><div className="kpi-sub">Tomados</div></div>
        <div className="kpi-card roxo"><div className="kpi-label">Total Captado</div><div className="kpi-value">{fmtK(tot.total_geral)}</div><div className="kpi-sub">Todas as fontes</div></div>
      </div>

      {/* Equity */}
      <div className="card" style={{ marginBottom:20 }}>
        <div className="card-title"><span>🥧</span> Distribuição Societária</div>
        <EquityBar equity={dados.equity || []}/>
      </div>

      <div className="grid-2">
        {/* Tabela investidores */}
        <div className="card">
          <div className="card-title"><span>👥</span> Investidores</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Nome</th><th>Perfil</th><th>Aportado</th><th>Retornado</th><th>Participação</th></tr></thead>
              <tbody>
                {(dados.investidores || []).map((inv, i) => (
                  <tr key={i}>
                    <td><strong>{inv.nome}</strong></td>
                    <td><span className="badge badge-azul">{inv.perfil}</span></td>
                    <td className="pos">{fmtK(inv.total_aportado)}</td>
                    <td>{fmtK(inv.total_retornado)}</td>
                    <td>{inv.percentual_participacao > 0 ? <span className="stat-pill">{inv.percentual_participacao}%</span> : <span style={{ color:'#94a3b8' }}>—</span>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Retornos pendentes */}
        <div className="card">
          <div className="card-title"><span>⏳</span> Retornos Pendentes</div>
          {(dados.retornos_pendentes || []).length === 0
            ? <div style={{ color:'#64748b', textAlign:'center', padding:24 }}>Nenhum retorno pendente</div>
            : <div className="table-wrap">
                <table>
                  <thead><tr><th>Investidor</th><th>Tipo</th><th>Valor</th><th>Vencimento</th></tr></thead>
                  <tbody>
                    {(dados.retornos_pendentes || []).map((r, i) => (
                      <tr key={i}>
                        <td>{r.investidor_nome}</td>
                        <td><span className={`badge badge-${r.tipo === 'juros' ? 'laranja' : 'azul'}`}>{r.tipo}</span></td>
                        <td className="neg">{fmtK(r.valor)}</td>
                        <td>{r.data_prevista ? new Date(r.data_prevista).toLocaleDateString('pt-BR') : '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ─── Aba Compras ─────────────────────────────────────────────────
function TabCompras() {
  const [dados, setDados] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/relatorios/compras')
      .catch(() => DEMO_COMPRAS)
      .then(d => { setDados(d); setLoading(false); });
  }, []);

  if (loading) return <div className="loading"><span className="spin">⟳</span> Carregando...</div>;
  if (!dados) return null;

  const totalPedidos = (dados.por_status || []).reduce((s, x) => s + Number(x.qtd), 0);
  const totalValor   = (dados.por_status || []).reduce((s, x) => s + Number(x.valor_total || 0), 0);
  const concluidos   = (dados.por_status || []).find(x => x.status === 'concluido') || {};
  const abertos      = (dados.por_status || []).filter(x => !['concluido','cancelado'].includes(x.status));
  const valorAberto  = abertos.reduce((s, x) => s + Number(x.valor_total || 0), 0);

  return (
    <div>
      {/* KPIs */}
      <div className="kpi-grid">
        <div className="kpi-card azul"><div className="kpi-label">Total de Pedidos</div><div className="kpi-value">{totalPedidos}</div><div className="kpi-sub">Todos os status</div></div>
        <div className="kpi-card verde"><div className="kpi-label">Concluídos</div><div className="kpi-value">{concluidos.qtd || 0}</div><div className="kpi-sub">{fmtK(concluidos.valor_total)} em valor</div></div>
        <div className="kpi-card laranja"><div className="kpi-label">Em Andamento</div><div className="kpi-value">{abertos.reduce((s,x)=>s+Number(x.qtd),0)}</div><div className="kpi-sub">{fmtK(valorAberto)} em aberto</div></div>
        <div className="kpi-card roxo"><div className="kpi-label">Volume Total</div><div className="kpi-value">{fmtK(totalValor)}</div><div className="kpi-sub">Todos os pedidos</div></div>
      </div>

      <div className="grid-2">
        {/* Por status */}
        <div className="card">
          <div className="card-title"><span>📦</span> Pedidos por Status</div>
          <div className="bar-chart">
            {(dados.por_status || []).map((s, i) => {
              const max = Math.max(...(dados.por_status||[]).map(x => Number(x.qtd)));
              const pct = max > 0 ? Math.round((Number(s.qtd)/max)*100) : 0;
              const cor = { concluido:'#00875a', cancelado:'#de350b', em_aprovacao:'#ff8b00', em_cotacao:'#0052cc', rascunho:'#94a3b8' }[s.status] || CORES[i%CORES.length];
              return (
                <div className="bar-row" key={i}>
                  <span className="bar-label">{statusLabel(s.status)}</span>
                  <div className="bar-track">
                    <div className="bar-fill" style={{ width:`${pct}%`, background:cor }}>
                      {pct > 20 && <span className="bar-val">{s.qtd} pedidos</span>}
                    </div>
                  </div>
                  {pct <= 20 && <span className="bar-val-out">{s.qtd}</span>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Por departamento */}
        <div className="card">
          <div className="card-title"><span>🏢</span> Compras por Departamento</div>
          <HorBar items={dados.por_departamento || []} labelKey="departamento" valKey="valor_total"/>
        </div>
      </div>

      {/* Ranking fornecedores */}
      <div className="card">
        <div className="card-title"><span>🏅</span> Ranking de Fornecedores</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Fornecedor</th><th>Categoria</th><th>Pedidos</th><th>Concluídos</th><th>Volume Total</th><th>Taxa Conclusão</th></tr></thead>
            <tbody>
              {(dados.ranking_fornecedores || []).map((f, i) => {
                const taxa = f.total_pedidos > 0 ? Math.round((f.pedidos_concluidos / f.total_pedidos) * 100) : 0;
                return (
                  <tr key={i}>
                    <td><strong style={{ color: i === 0 ? '#ffa500' : '#64748b' }}>#{i + 1}</strong></td>
                    <td><strong>{f.nome}</strong></td>
                    <td><span className="badge badge-cinza">{f.categoria}</span></td>
                    <td>{f.total_pedidos}</td>
                    <td className="pos">{f.pedidos_concluidos}</td>
                    <td><strong>{fmtK(f.volume_total)}</strong></td>
                    <td>
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <div style={{ flex:1, background:'#f1f5f9', borderRadius:4, height:6, overflow:'hidden' }}>
                          <div style={{ height:'100%', background: taxa >= 80 ? '#00875a' : taxa >= 50 ? '#ff8b00' : '#de350b', width:`${taxa}%`, borderRadius:4 }}/>
                        </div>
                        <span style={{ fontSize:11, fontWeight:700, color: taxa >= 80 ? '#00875a' : taxa >= 50 ? '#ff8b00' : '#de350b' }}>{taxa}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── App Principal ───────────────────────────────────────────────
const TABS = [
  { id:'executivo',    label:'📊 Executivo',    component: TabExecutivo },
  { id:'financeiro',   label:'💰 Financeiro',   component: TabFinanceiro },
  { id:'folha',        label:'👥 Folha',         component: TabFolha },
  { id:'esportivo',    label:'⚽ Esportivo',     component: TabEsportivo },
  { id:'investidores', label:'📈 Investidores',  component: TabInvestidores },
  { id:'compras',      label:'📦 Compras',       component: TabCompras },
];

function App() {
  const [aba, setAba] = useState('executivo');
  const Tab = TABS.find(t => t.id === aba)?.component || TabExecutivo;

  return (
    <div className="container">
      <div className="page-header">
        <div className="page-title">Relatórios Gerenciais</div>
        <div className="page-subtitle">Visão consolidada de todos os módulos do ERP SAF</div>
      </div>

      <div className="tabs">
        {TABS.map(t => (
          <button key={t.id} className={`tab-btn ${aba === t.id ? 'active' : ''}`} onClick={() => setAba(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      <Tab/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
