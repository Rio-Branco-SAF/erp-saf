      --bg:          #1C1C2E;
      --sidebar-bg:  #14142B;
      --card-bg:     #252540;
      --card-borda:  #3A3A5C;
      --input-bg:    #14142B;
      --verde:       #22C55E;
      --verde-med:   #16A34A;
      --verde-dark:  #15803D;
      --vermelho:    #FF5C5C;
      --dourado:     #F59E0B;
      --azul:        #3B82F6;
      --azul-dark:   #1D4ED8;
      --texto:       #E2E8F0;
      --texto-leve:  #94A3B8;
      --roxo:        #8B5CF6;
      --laranja:     #F97316;
    }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background: var(--bg);color: var(--texto);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .navbar-brand{color:#252540;font-weight:700;font-size:18px;text-decoration:none;display:flex;align-items:center;gap:8px}
  .navbar-nav{display:flex;gap:4px}
  .nav-link{color:var(--muted);text-decoration:none;padding:8px 12px;border-radius:6px;font-size:13px;transition:.2s}
  .nav-link:hover,.nav-link.active{color:#252540;background:rgba(255,255,255,.08)}
  .container{max-width:1300px;margin:0 auto;padding:24px}
  .page-title{font-size:24px;font-weight:700;margin-bottom:4px}
  .page-subtitle{color:var(--muted);font-size:14px;margin-bottom:24px}

  /* Tabs */
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
  .tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);position:relative;transition:.2s}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--azul-text)}
  .tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--azul-text)}

  /* KPI Cards */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
  .kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  .kpi-value{font-size:22px;font-weight:700;line-height:1.2}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
  .kpi-card.verde .kpi-value{color:var(--verde-text)}
  .kpi-card.azul  .kpi-value{color:var(--azul-text)}
  .kpi-card.laranja .kpi-value{color:var(--laranja)}
  .kpi-card.vermelho .kpi-value{color:var(--vermelho)}
  .kpi-card.roxo .kpi-value{color:#bc8cff}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
  .card-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

  /* Jogo card */
  .jogo-list{display:flex;flex-direction:column;gap:10px}
  .jogo-card{background:var(--cinza2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .jogo-card:hover{border-color:var(--azul-text);background:#1c2230}
  .jogo-card .jogo-borda{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px}
  .jogo-header{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .jogo-adversario{font-size:16px;font-weight:700}
  .jogo-meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
  .jogo-placar{font-size:24px;font-weight:900;letter-spacing:2px}
  .placar-vitoria{color:var(--verde-text)}
  .placar-empate{color:var(--laranja)}
  .placar-derrota{color:var(--vermelho)}
  .jogo-footer{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

  /* Badges */
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-verde{background:var(--verde-light);color:var(--verde-text);border:1px solid var(--verde)}
  .badge-azul{background:var(--azul-light);color:var(--azul-text);border:1px solid var(--azul)}
  .badge-laranja{background:var(--laranja-light);color:var(--laranja);border:1px solid #6a4800}
  .badge-vermelho{background:var(--vermelho-light);color:#ff7b72;border:1px solid #6e2020}
  .badge-roxo{background:var(--roxo-light);color:#bc8cff;border:1px solid var(--roxo)}
  .badge-cinza{background:var(--cinza);color:var(--muted);border:1px solid #444}

  /* Tabelas */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#1C1C2E;padding:10px 12px;text-align:left;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
  tr:hover td{background:rgba(255,255,255,.03)}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:800px;margin:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
  .modal-title{font-size:18px;font-weight:700}
  .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:6px;transition:.2s}
  .modal-close:hover{background:var(--cinza);color:var(--text)}
  .modal-body{padding:24px}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

  /* Formulário */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  input,select,textarea{background:var(--cinza2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;transition:.2s;width:100%}

  textarea{resize:vertical;min-height:70px}
  input[type=checkbox]{width:auto}

  /* Botões */
  .btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px}

  .btn-primary:hover{background:#1158c7}
  .btn-success{background:var(--verde);color:#252540}
  .btn-success:hover{background:#196127}
  .btn-danger{background:var(--vermelho);color:#252540}
  .btn-danger:hover{background:#b91c1c}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn-outline:hover{background:var(--cinza)}
  .btn-sm{padding:5px 10px;font-size:12px}

  .progress-bar{height:100%;border-radius:6px;transition:width .5s}

  /* Grid */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

  /* Seção título */

  .orc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--cinza2);border-radius:6px;margin-bottom:6px}
  .orc-item-cat{font-size:10px;text-transform:uppercase;color:var(--muted);width:90px;flex-shrink:0}
  .orc-item-desc{flex:1;font-size:13px}
  .orc-item-val{font-size:13px;font-weight:700;color:var(--laranja);width:90px;text-align:right;flex-shrink:0}
  .orc-item-real{font-size:13px;font-weight:700;color:var(--verde-text);width:90px;text-align:right;flex-shrink:0}

  .rec-tipo{font-size:11px;color:var(--muted);width:130px;flex-shrink:0}
  .rec-desc{flex:1;font-size:13px}
  .rec-val{font-size:14px;font-weight:700;color:var(--verde-text)}
  .rec-est{color:var(--muted);font-size:11px;margin-left:4px}

  /* Gol item */
  .gol-item{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--cinza2);border-radius:6px;margin-bottom:5px}
  .gol-min{font-size:11px;color:var(--laranja);width:36px;flex-shrink:0;font-weight:700}
  .gol-nome{flex:1;font-size:13px;font-weight:600}
  .gol-tipo{font-size:11px;color:var(--muted)}

  /* Público */
  .publico-bar{height:24px;background:var(--cinza);border-radius:8px;overflow:hidden;margin:8px 0;position:relative}
  .publico-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--azul),#60A5FA);transition:width .8s ease}
  .publico-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#252540}

  /* Próximo jogo hero */
  .hero-jogo{background:linear-gradient(135deg,#1c2230,#1C1C2E);border:1px solid var(--azul);border-radius:12px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
  .hero-jogo::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(31,111,235,.3),transparent);border-radius:50%}
  .hero-tag{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--azul-text);margin-bottom:8px;font-weight:600}
  .hero-adversario{font-size:28px;font-weight:900;margin-bottom:6px}
  .hero-info{display:flex;gap:20px;color:var(--muted);font-size:13px;flex-wrap:wrap}
  .hero-info span{display:flex;align-items:center;gap:5px}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--muted);font-size:14px}
  .spin{animation:spin 1s linear infinite;margin-right:8px;font-size:20px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Status resultados visuais */
  .resultado-badge{font-size:18px;font-weight:900;padding:4px 12px;border-radius:8px}
  .res-V{background:var(--verde-light);color:var(--verde-text);border:1px solid var(--verde)}
  .res-E{background:var(--laranja-light);color:var(--laranja);border:1px solid #6a4800}
  .res-D{background:var(--vermelho-light);color:#ff7b72;border:1px solid #6e2020}

  .pos{color:var(--verde-text);font-weight:600}
  .neg{color:#ff7b72;font-weight:600}
  .neutral{color:var(--muted)}

async function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('erp_token');
  const res = await fetch(API_URL + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(opts.headers || {}) }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro || 'Erro na API');
  return data;
}

  const res = jogo.resultado;
  const placarColor = res === 'vitoria' ? 'placar-vitoria' : res === 'empate' ? 'placar-empate' : res === 'derrota' ? 'placar-derrota' : '';
  const borda = res === 'vitoria' ? '#238636' : res === 'empate' ? '#e3b341' : res === 'derrota' ? '#da3633' : jogo.tipo_jogo === 'mandante' ? '#1f6feb' : '#6e40c9';
  const margemJogo = jogo.status === 'realizado' && jogo.receita_total > 0
    ? Number(jogo.receita_total) - Number(jogo.custo_realizado || jogo.custo_estimado || 0)
    : null;

  return (
    <div className="jogo-card" onClick={() => onClick(jogo)}>
      <div className="jogo-borda" style={{ background: borda }}/>
      <div className="jogo-header">
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
            <span style={{ fontSize:12, color:'#58a6ff', fontWeight:600 }}>{jogo.competicao}</span>
            {jogo.rodada && <span style={{ fontSize:11, color:'#8b949e' }}>· {jogo.rodada}</span>}
          </div>
          <div className="jogo-adversario">
            {jogo.tipo_jogo === 'mandante' ? '🏠' : '✈️'} {jogo.adversario}
          </div>
          <div className="jogo-meta">
            <span>📅 {fmtDateTime(jogo.data_jogo)}</span>
            {jogo.local_jogo && <span>📍 {jogo.local_jogo}</span>}
          </div>
        </div>
        <div style={{ textAlign:'right', flexShrink:0 }}>
          {jogo.placar
            ? <div className={`jogo-placar ${placarColor}`}>{jogo.placar}</div>
            : <span className={`badge badge-${STATUS_COLORS[jogo.status]}`}>{STATUS_LABELS[jogo.status]}</span>
          }
          {jogo.resultado && (
            <div style={{ marginTop:4 }}>
              <span className={`badge badge-${res === 'vitoria' ? 'verde' : res === 'empate' ? 'laranja' : 'vermelho'}`}>
                {res === 'vitoria' ? '✓ Vitória' : res === 'empate' ? '= Empate' : '✗ Derrota'}
              </span>
            </div>
          )}
        </div>
      </div>
      <div className="jogo-footer">
        {jogo.tipo_jogo === 'mandante' && jogo.publico_total > 0 && (
          <span className="badge badge-cinza">👥 {Number(jogo.publico_total).toLocaleString('pt-BR')} pessoas</span>
        )}
        {jogo.receita_total > 0 && (
          <span className="badge badge-verde">💰 {fmtK(jogo.receita_total)}</span>
        )}
        {margemJogo !== null && (
          <span className={`badge badge-${margemJogo >= 0 ? 'verde' : 'vermelho'}`}>
            {margemJogo >= 0 ? '▲' : '▼'} Margem: {fmtK(Math.abs(margemJogo))}
          </span>
        )}
        {jogo.transmissao_tv && <span className="badge badge-roxo">📺 TV</span>}
        {jogo.transmissao_streaming && <span className="badge badge-azul">🔴 Streaming</span>}
        {jogo.orcamento_status && (
          <span className={`badge badge-${jogo.orcamento_status === 'aprovado' ? 'verde' : jogo.orcamento_status === 'realizado' ? 'cinza' : 'laranja'}`}>
            {jogo.orcamento_status === 'aprovado' ? '✓ Orç. Aprovado' : jogo.orcamento_status === 'realizado' ? 'Orç. Realizado' : '⏳ Orç. Rascunho'}
          </span>
        )}
      </div>
    </div>
  );
}

// ─── Modal Detalhe do Jogo ────────────────────────────────────
function ModalJogo({ jogoId, onClose }) {
  const [dados, setDados] = useState(null);
  const [abaModal, setAbaModal] = useState('resumo');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch(`/api/jogos/${jogoId}`)
      .catch(() => DEMO_DETALHE)
      .then(d => { setDados(d); setLoading(false); });
  }, [jogoId]);

  if (loading) return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="loading"><span className="spin">⟳</span> Carregando...</div>
      </div>
    </div>
  );
  if (!dados) return null;

  const { jogo, orcamento, receitas, gols } = dados;
  const totalEstimado  = (orcamento?.itens || []).reduce((s, i) => s + Number(i.valor_estimado||0), 0);
  const totalRealizado = (orcamento?.itens || []).filter(i => i.valor_realizado != null).reduce((s, i) => s + Number(i.valor_realizado||0), 0);
  const totalReceita   = receitas.reduce((s, r) => s + Number(r.valor_total||0), 0);
  const totalReceitaReal = receitas.filter(r => r.realizado).reduce((s, r) => s + Number(r.valor_total||0), 0);
  const margem = totalReceitaReal > 0 || totalRealizado > 0 ? totalReceitaReal - totalRealizado : null;

  const nosGols = gols.filter(g => g.time === 'nos');
  const advGols = gols.filter(g => g.time === 'adversario');
  const ocupacao = jogo.capacidade_estadio > 0 && jogo.publico_total > 0
    ? ((jogo.publico_total / jogo.capacidade_estadio) * 100).toFixed(1) : null;

  const tipoLabel = { bilheteria_inteira:'Inteira', bilheteria_meia:'Meia', bilheteria_socio:'Sócio', patrocinio_jogo:'Patrocínio', cota_tv:'Cota TV', streaming:'Streaming', merchandising:'Merchan.', alimentacao:'Alimentação', estacionamento:'Estacion.', outro:'Outro' };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div style={{ fontSize:12, color:'#58a6ff', marginBottom:4 }}>{jogo.competicao} · {jogo.rodada}</div>
            <div className="modal-title">
              {jogo.tipo_jogo === 'mandante' ? '🏠' : '✈️'} vs {jogo.adversario}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* Placar hero */}
        {jogo.status === 'realizado' && jogo.placar && (
          <div style={{ background:'#0d1117', padding:'16px 24px', display:'flex', alignItems:'center', gap:24, justifyContent:'center' }}>
            <div style={{ textAlign:'right', flex:1 }}>
              <div style={{ fontSize:12, color:'#8b949e', marginBottom:2 }}>Nosso clube</div>
              <div style={{ fontSize:36, fontWeight:900, color: jogo.gols_nos > jogo.gols_adversario ? '#3fb950' : '#8b949e' }}>{jogo.gols_nos}</div>
            </div>
            <div style={{ fontSize:18, color:'#8b949e', fontWeight:700 }}>×</div>
            <div style={{ textAlign:'left', flex:1 }}>
              <div style={{ fontSize:12, color:'#8b949e', marginBottom:2 }}>{jogo.adversario}</div>
              <div style={{ fontSize:36, fontWeight:900, color: jogo.gols_adversario > jogo.gols_nos ? '#ff7b72' : '#8b949e' }}>{jogo.gols_adversario}</div>
            </div>
            <div style={{ textAlign:'center' }}>
              {jogo.resultado === 'vitoria' && <span className="resultado-badge res-V">VITÓRIA</span>}
              {jogo.resultado === 'empate'  && <span className="resultado-badge res-E">EMPATE</span>}
              {jogo.resultado === 'derrota' && <span className="resultado-badge res-D">DERROTA</span>}
            </div>
          </div>
        )}

        {/* Abas internas */}
        <div style={{ borderBottom:'1px solid var(--border)', display:'flex' }}>
          {['resumo','orcamento','receitas','gols'].map(a => (
            <button key={a} className={`tab-btn ${abaModal===a?'active':''}`} onClick={() => setAbaModal(a)}
                    style={{ fontSize:12, padding:'10px 16px' }}>
              {a === 'resumo' ? '📋 Resumo(' : a === 'orcamento%' ? `💸 Orçamento` : a === 'receitas' ? `💰 Receitas` : `⚽ Gols`}
            </button>
          ))}
        </div>

        <div className="modal-body">
          {/* Resumo */}
          {abaModal === 'resumo' && (
            <div>
              <div className="grid-2" style={{ marginBottom:16 }}>
                <div style={{ background:'var(--cinza2)', borderRadius:8, padding:14 }}>
                  <div style={{ fontSize:11, color:'var(--muted)', marginBottom:6 }}>📅 DATA E LOCAL</div>
                  <div style={{ fontWeight:600 }}>{fmtDateTime(jogo.data_jogo)}</div>
                  <div style={{ color:'var(-mmuted)', fontSize:13, marginTop:2 }}>{jogo.local_jogo || '—'}</div>
                </div>
                <div style={{ background:'var(--cinza2)', borderRadius:8, padding:14 }}>
                  <div style={{ fontSize:11, color:'var(-mmuted)', marginBottom:6 }}>🎪 TIPO</div>
                  <div style={{ fontWeight:600 }}>{jogo.tipo_jogo === 'mandante' ? '🏠 Mandante' : '✈️ Visitante'}</div>
                  <div style={{ color:'var(--muted)', fontSize:13, marginTop:2 }}>
                    {jogo.transmissao_tv && '📺 TV '}{jogo.transmissao_streaming && '🔴 Streaming'}
                    {!jogo.transmissao_tv && !jogo.transmissao_streaming && 'Sem transmissão'}
                  </div>
                </div>
              </div>

              {/* Público */}
              {jogo.tipo_jogo === 'mandante' && (
                <div>
                  <div className="section-title">👥 Público</div>
                  {jogo.publico_total > 0 ? (
                    <div>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:13 }}>
                        <span>{Number(jogo.publico_total).toLocaleString('pt-BR')} pessoas</span>
                        <span style={{ color:'var(--muted)' }}>Cap.: {Number(jogo.capacidade_estadio||0).toLocaleString('pt-BR')}</span>
                      </div>
                      <div className="publico-bar">
                        <div className="publico-fill" style={{ width:`${Math.min(Number(ocupacao||0),100)}%` }}/>
                        <span className="publico-label">{ocupacao}% ocupação</span>
                      </div>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:10 }}>
                        <div style={{ background:'var(--cinza2)', borderRadius:6, padding:10, textAlign:'center' }}>
                          <div style={{ fontSize:11, color:'var(--muted)' }}>Pagante</div>
                          <div style={{ fontWeight:700, fontSize:18, color:'#3fb950' }}>{Number(jogo.publico_pagante||0).toLocaleString('pt-BR')}</div>
                        </div>
                        <div style={{ background:'var(--cinza2)', borderRadius:6, padding:10, textAlign:'center' }}>
                          <div style={{ fontSize:11, color:'var(--muted)' }}>Cortesias</div>
                          <div style={{ fontWeight:700, fontSize:18, color:'#58a6ff' }}>{Number(jogo.publico_cortesias||0).toLocaleString('pt-BR')}</div>
                        </div>
                      </div>
                    </div>
                  ) : <div style={{ color:'var(--muted)', fontSize:13, padding:'12px 0' }}>Público ainda não registrado.</div>}
                </div>
              )}

              {/* Financeiro resumo */}
              <div className="section-title">💰 Resultado Financeiro</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
                {[
                  { label:'Receita', val:totalReceitaReal || totalReceita, cor:'var(--verde-text)' },
                  { label:'Custo', val:totalRealizado || totalEstimado, cor:'#ff7b72' },
                  { label:'Margem', val:margem, cor: margem === null ? 'var(--muted)' : margem >= 0 ? 'var(--verde-text)' : '#ff7b72' },
                ].map((it,i) => (
                  <div key={i} style={{ background:'var(--cinza2)', borderRadius:8, padding:12, textAlign:'center' }}>
                    <div style={{ fontSize:11, color:'var(--muted)', marginBottom:4 }}>{it.label}</div>
                    <div style={{ fontWeight:700, color:it.cor, fontSize:16 }}>
                      {it.val !== null ? fmtK(Math.abs(it.val)) : '—'}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Orçamento */}
          {abaModal === 'orcamento' && (
            <div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                <div style={{ fontSize:13, color:'var(--muted)' }}>
                  Status: <span className={`badge badge-${orcamento?.status === 'aprovado' ? 'verde' : orcamento?.status === 'realizado' ? 'cinza' : 'laranja'}`}>{orcamento?.status || 'sem orçamento'}</span>
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <span style={{ fontSize:12, color:'var(--muted)' }}>Estimado: <strong style={{ color:'var(--laranja)' }}>{fmtK(totalEstimado)}</strong></span>
                  {totalRealizado > 0 && <span style={{ fontSize:12, color:'var(--muted)' }}>Realizado: <strong style={{ color:'#ff7b72' }}>{fmtK(totalRealizado)}</strong></span>}
                </div>
              </div>

              {(orcamento?.itens || []).filter(Boolean).map((item, i) => (
                <div key={i} className="orc-item">
                  <span className="orc-item-cat">{item.categoria}</span>
                  <span className="orc-item-desc">{item.descricao}</span>
                  <span className="orc-item-val">{fmtK(item.valor_estimado)}</span>
                  {item.valor_realizado != null
                    ? <span className="orc-item-real">{fmtK(item.valor_realizado)}</span>
                    : <span style={{ width:90 }}/>
                  }
                  <span className="orc-item-status">
                    {item.pago
                      ? <span className="badge badge-verde" style={{ fontSize:9 }}>Pago</span>
                      : <span className="badge badge-laranja" style={{ fontSize:9 }}>Pendente</span>
                    }
                  </span>
                </div>
              ))}

              {!orcamento && (
                <div style={{ textAlign:'penter', color:'var(--muted)', padding:'24px 0' }}>
                  Nenhum orçamento registrado para este jogo.
                </div>
              )}

              <div style={{ borderTop:'1px solid var(--border)', paddingTop:12, marginTop:8, display:'flex', justifyContent:'flex-end', gap:16 }}>
                <span style={{ fontSize:13, color:'var(--muted)' }}>Total estimado: <strong style={{ color:'var(--laranja)' }}>{fmtK(totalEstimado)}</strong></span>
                {totalRealizado > 0 && <span style={{ fontSize:13, color:'var(--muted)' }}>Total realizado: <strong style={{ color:'#ff7b72' }}>{fmtK(totalRealizado)}</strong></span>}
              </div>
            </div>
          )}

          {/* Receitas */}
          {abaModal === 'receitas' && (
            <div>
              <div style={{ marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:13, color:'var(--muted)' }}>
                  {receitas.filter(r=>r.realizado).length} receitas realizadas · {receitas.filter(r=>!r.realizado).length} estimadas
                </span>
                <span style={{ fontWeight:700, color:'var(--verde-text)', fontSize:14 }}>{fmtK(totalReceita)}</span>
              </div>

              {receitas.map((r, i) => (
                <div key={i} className="rec-item">
                  <span className="rec-tipo">{tipoLabel[r.tipo] || r.tipo}</span>
                  <span className="rec-desc">{r.descricao || '—'}{r.quantidade > 1 && <span style={{ color:'var(--muted)', fontSize:11 }}> ({r.quantidade}x {fmtK(r.valor_unitario)})</span>}</span>
                  <span className="rec-val">{fmtK(r.valor_total)}</span>
                  <span className="rec-est">{r.realizado ? '✓' : <span style={{ color:'var(--laranja)' }}>~est.</span>}</span>
                </div>
              ))}

              {receitas.length === 0 && (
                <div style={{ textAlign:'center', color:'var(--muted)', padding:'24px 0' }}>Nenhuma receita registrada.</div>
              )}

              <div style={{ borderTop:'1px solid var(--border)', paddingTop:12, marginTop:8, display:'flex', justifyContent:'space-between' }}>
                <span style={{ fontSize:13, color:'var(--muted)' }}>Total realizado: <strong className="pos">{fmtK(totalReceitaReal)}</strong></span>
                <span style={{ fontSize:13, color:'var(--muted)' }}>Total estimado: <strong style={{ color:'var(--laranja)' }}>{fmtK(totalReceita)}</strong></span>
              </div>
            </div>
          )}

          {/* Gols */}
          {abaModal === 'gols' && (
            <div>
              {nosGols.length > 0 && (
                <div>
                  <div className="section-title">⚽ Nossos Gols ({nosGols.length})</div>
                  {nosGols.map((g, i) => (
                    <div key={i} className="gol-item">
                      <span className="gol-min">{g.minuto}'</span>
                      <span className="gol-nome">{g.atleta_nome || 'Gol Contra'}</span>
                      <span className="gol-tipo">{g.tipo !== 'normal' ? g.tipo : ''}</span>
                      {g.assistente_nome && <span style={{ fontSize:11, color:'var(--muted)' }}>assist: {g.assistente_nome}</span>}
                    </div>
                  ))}
                </div>
              )}

              {advGols.length > 0 && (
                <div>
                  <div className="section-title" style={{ color:'#ff7b72' }}>Gols Sofridos ({advGols.length})</div>
                  {advGols.map((g, i) => (
                    <div key={i} className="gol-item" style={{ opacity:.7 }}>
                      <span className="gol-min" style={{ color:'#ff7b72' }}>{g.minuto}'</span>
                      <span className="gol-nome" style={{ color:'var(--muted)' }}>{jogo.adversario}</span>
                      <span className="gol-tipo">{g.tipo !== 'normal' ? g.tipo : ''}</span>
                    </div>
                  ))}
                </div>
              )}

              {gols.length === 0 && (
                <div style={{ textAlign:'center', color:'var(--muted)', padding:'24px 0' }}>Nenhum gol registrado.</div>
              )}
            </div>
          )}
        </div>

        <div className="modal-footer">
          <button className="btn btn-outline btn-sm" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

// ─── Modal Novo Jogo ────────────────────────────────────────────
function ModalNovoJogo({ onClose, onSave }) {
  const [form, setForm] = useState({
    competicao:'Série B', rodada:'', adversario:'', data_jogo:'', local_jogo:'',
    tipo_jogo:'mandante', capacidade_estadio:'18000', transmissao_tv:false,
    transmissao_streaming:false, observacoes:'', gerar_orcamento_automatico:true
  });
  const [saving, setSaving] = useState(false);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const salvar = async () => {
    if (!form.adversario || !form.data_jogo) return;
    setSaving(true);
    try {
      await apiFetch('/api/jogos', { method:'POST', body: JSON.stringify(form) });
      onSave();
    } catch(e) {
      // demo: simula sucesso
      onSave();
    } finally { setSaving(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ maxWidth:620 }} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">🗓️ Novo Jogo</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group">
              <label>Competição">
              <select value={form.competicao} onChange={e => set('competicao', e.target.value)}>
                <option>Série B</option>
                <option>Copa do Brasil</option>
                <option>Copa do Nordeste</option>
                <option>Estadual</option>
                <option>Amistoso</option>
              </select>
            </div>
            <div className="form-group">
              <label>EřiRodada / Fase</label>
              <input value={form.rodada} onChange={e => set('rodada', e.target.value)} placeholder="Ex: Rodada 12, Oitavas"/>
            </div>
            <div className="form-group full">
              <label>Adversário *</label>
              <input value={form.adversario} onChange={e => set('adversario', e.target.value)} placeholder="Nome do clube adversário"/>
            </div>
            <div className="form-group">
              <label>Data e Hora *</label>
              <input type="datetime-local" value={form.data_jogo} onChange={e => set('data_jogo', e.target.value)}/>
            </div>
            <div className="form-group">
              <label>Tipo</label>
              <select value={form.tipo_jogo} onChange={e => set('tipo_jogo', e.target.value)}>
                <option value="mandante">🏠 Mandate</option>
                <option value="visitante">✈️ Visitante</option>
                <option value="neutro">⚖️ Campo Neutro</option>
              </select>
            </div>
            <div className="form-group full">
              <label>Estádio / Local</label>
              <input value={form.local_jogo} onChange={e => set('local_jogo', e.target.value)} placeholder="Nome do estádio ou arena"/>
            </div>
            <div className="form-group">
              <label>Capacidade do Estádio</label>
              <input type="number" value={form.capacidade_estadio} onChange={e => set('capacidade_estadio', e.target.value)}/>
            </div>
            <div className="form-group" style={{ justifyContent:'center', paddingTop:20 }}>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                <label style={{ display:'flex', gap:8, alignItems:'center', cursor:'pointer' }}>
                  <input type="checkbox" checked={form.transmissao_tv} onChange={e => set('transmissao_tv', e.target.checked)}/> 📺 Transmissão TV
                </label>
                <label style={{ display:'flex', gap:8, alignItems:'center', cursor:'pointer' }}>
                  <input type="checkbox" checked={form.transmissao_streaming} onChange={e => set('transmissao_streaming', e.target.checked)}/> 🔴 Streaming
                </label>
              </div>
            </div>
            <div className="form-group full" style={{ background:'#1c2230', border:'1px solid var(--azul)', borderRadius:8, padding:12 }}>
              <label style={{ display:'flex', gap:8, alignItems:'center', cursor:'pointer', color:'var(--azul-text)' }}>
                <input type="checkbox" checked={form.gerar_orcamento_automatico} onChange={e => set('gerar_orcamento_automatico', e.target.checked)}/>
                ✨ Gerar orçamento automático com base no template ({form.tipo_jogo} · {form.competicao})
              </label>
              <div style={{ fontSize:11, color:'var(--muted)', marginTop:4, paddingLeft:20 }}>
                O sistema irá pré-preencher os itens de custo padrão que podem ser ajustados depois.
              </div>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary btn-sm" onClick={salvar} disabled={saving}>
            {saving ? '⟳ Salvando...' : '+ Cadastrar Jogo'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App Principal ────────────────────────────────────────────
function App() {
  const [resumo, setResumo] = useState(null);
  const [jogos, setJogos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filtroStatus, setFiltroStatus] = useState('');
  const [filtroComp, setFiltroComp] = useState('');
  const [busca, setBusca] = useState('');
  const [jogoSel, setJogoSel] = useState(null);
  const [novoJogo, setNovoJogo] = useState(false);

  const carregar = useCallback(() => {
    setLoading(true);
    const params = new URLSearchParams();
    if (filtroStatus) params.set('status', filtroStatus);
    if (filtroComp)   params.set('competicao', filtroComp);
    if (busca)        params.set('busca', busca);

    Promise.all([
      apiFetch('/api/jogos/resumo').catch(() => ({ dados: DEMO_RESUMO })),
      apiFetch('/api/jogos?' + params).catch(() => ({ dados: DEMO_JOGOS }))
    ]).then(([r, j]) => {
      setResumo(r.dados || DEMO_RESUMO);
      setJogos(j.dados || DEMO_JOGOS);
    }).finally(() => setLoading(false));
  }, [filtroStatus, filtroComp, busca]);

  useEffect(() => { carregar(); }, [filtroStatus, filtroComp]);

  const res = resumo || DEMO_RESUMO;
  const prox = res.proximo_jogo;

  return (
    <div className="container">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:4 }}>
        <div>
          <div className="page-title">⚽ Agenda de Jogos</div>
          <div className="page-subtitle">Calendário, orçamentos e controle de público e receita por partida</div>
        </div>
        <button className="btn btn-primary" onClick={() => setNovoJogo(true)}>+ Novo Jogo</button>
      </div>

      {/* Próximo jogo hero */}
      {prox && (
        <div className="hero-jogo">
          <div className="hero-tag">⏱ Próximo Jogo</div>
          <div className="hero-adversario">{prox.tipo_jogo === 'mandante' ? '🏠' : '✈️'} vs {prox.adversario}</div>
          <div className="hero-info">
            <span>📅 {fmtDateTime(prox.data_jogo)}</span>
            <span>📍 {prox.local_jogo}</span>
            <span>🏆 {prox.competicao} · {prox.rodada}</span>
            {prox.capacidade_estadio && <span>🏟️ Cap. {Number(prox.capacidade_estadio).toLocaleString('pt-BR')}</span>}
            {prox.receita_total > 0 && <span>💰 Rec. est.: {fmtK(prox.receita_total)}</span>}
            {prox.custo_estimado > 0 && <span>💸 Custo est.: {fmtK(prox.custo_estimado)}</span>}
          </div>
        </div>
      )}

      {/* KPIs */}
      <div className="kpi-grid">
        <div className="kpi-card azul"><div className="kpi-label">Total de Jogos</div><div className="kpi-value">{res.total_jogos}</div><div className="kpi-sub">{res.realizados} realizados</div></div>
        <div className="kpi-card verde"><div className="kpi-label">Vitórias</div><div className="kpi-value">{res.vitorias}</div><div className="kpi-sub">{res.aproveitamento}% aproveit.</div></div>
        <div className="kpi-card laranja"><div className="kpi-label">Empates</div><div className="kpi-value">{res.empates}</div><div className="kpi-sub">&nbsp;</div></div>
        <div className="kpi-card vermelho"><div className="kpi-label">Derrotas</div><div className="kpi-value">{res.derrotas}</div><div className="kpi-sub">&nbsp;</div></div>
        <div className="kpi-card azul"><div className="kpi-label">Gols Marcados</div><div className="kpi-value">{res.gols_marcados}</div><div className="kpi-sub">vs {res.gols_sofridos} sofridos</div></div>
        <div className="kpi-card roxo"><div className="kpi-label">Público Médio</div><div className="kpi-value">{Math.round(Number(res.media_publico||0)).toLocaleString('pt-BR')}</div><div className="kpi-sub">por jogo em casa</div></div>
        <div className="kpi-card verde"><div className="kpi-label">Receita Total</div><div className="kpi-value">{fmtK(res.receita_total)}</div><div className="kpi-sub">jogos realizados</div></div>
        <div className="kpi-card azul"><div className="kpi-label">Próximos"><div className="kpi-value">{res.proximos}</div><div className="kpi-sub">jogos na agenda</div></div>
      </div>

      {/* Filtros */}
      <div className="filter-row">
        <select value={filtroStatus} onChange={e => setFiltroStatus(e.target.value)}>
          <option value="">Todos os status</option>
          <option value="agendado">Agendado</option>
          <option value="confirmado">Confirmado</option>
          <option value="realizado">Realizado</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <select value={filtroComp} onChange={e => setFiltroComp(e.target.value)}>
          <option value="">Todas competições</option>
          <option value="Série B">Série B</option>
          <option value="Copa do Brasil">Copa do Brasil</option>
          <option value="Estadual">Estadual</option>
        </select>
        <input value={busca} onChange={e => setBusca(e.target.value)}
               onKeyDown={e => e.key === 'Enter' && carregar()}
               placeholder="🔍 Buscar adversário..." style={{ maxWidth:220 }}/>
        <button className="btn btn-outline btn-sm" onClick={carregar}>Buscar</button>
      </div>

      {/* Lista de jogos */}
      {loading
        ? <div className="loading"><span className="spin">⟳</span> Carregando...</div>
        : (
          <div className="jogo-list">
            {jogos.map(j => <JogoCard key={j.id} jogo={j} onClick={jg => setJogoSel(jg.id)}/>)}
            {jogos.length === 0 && (
              <div style={{ textAlign:'center', color:'var(--muted)', padding:48 }}>Nenhum jogo encontrado.</div>
            )}
          </div>
        )
      }

      {jogoSel && <ModalJogo jogoId={jogoSel} onClose={() => setJogoSel(null)}/>}
      {novoJogo && <ModalNovoJogo onClose={() => setNovoJogo(false)} onSave={() => { setNovoJogo(false); carregar(); }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
