<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atletas — ERP SAF</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;display:flex;min-height:100vh}
.sidebar{width:220px;background:#0f172a;color:#94a3b8;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:#fff;border-bottom:1px solid #1e293b;letter-spacing:-.3px}
.sidebar-logo span{color:#f59e0b}
.sidebar nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;transition:.15s}
.nav-item:hover{background:#1e293b;color:#e2e8f0}
.nav-item.active{background:#1d4ed8;color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid #1e293b;font-size:12px}
.user-chip{display:flex;align-items:center;gap:8px}
.user-avatar-sb{width:30px;height:30px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;color:#0f172a}
.topbar-sub{font-size:12px;color:#64748b;margin-top:2px}
.content{padding:24px 28px;flex:1}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-primary:hover{background:#1e40af}
.btn-outline{background:#fff;color:#475569;border:1px solid #e2e8f0}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-success{background:#16a34a;color:#fff}
.btn-ghost{background:transparent;color:#64748b;border:none;font-size:13px;cursor:pointer;padding:4px 8px}
.btn-ghost:hover{color:#0f172a}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e2e8f0}
.kpi-label{font-size:11.5px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:24px;font-weight:800;margin:5px 0 2px;color:#0f172a}
.kpi-sub{font-size:11.5px;color:#94a3b8}
.kpi-card.urgente .kpi-value{color:#dc2626}
.kpi-card.alerta .kpi-value{color:#d97706}
.kpi-card.ok .kpi-value{color:#16a34a}

/* FILTERS */
.filters-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:220px;outline:none}
.search-input:focus{border-color:#1d4ed8}
select.filter-sel{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;outline:none;color:#475569;cursor:pointer}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#475569;transition:.15s}
.filter-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600;white-space:nowrap}
.pill-ativo{background:#dcfce7;color:#16a34a}
.pill-lesionado{background:#fee2e2;color:#dc2626}
.pill-suspenso{background:#fed7aa;color:#c2410c}
.pill-emprestado{background:#dbeafe;color:#1d4ed8}
.pill-inativo{background:#f1f5f9;color:#94a3b8}

/* CARDS DE ATLETAS */
.atletas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.atleta-card{background:#fff;border-lid #f1f5f9;padding:12px 14px;gap:8px}
.stat-box{text-align:center}
.stat-value{font-size:16px;font-weight:800;color:#0f172a;line-height:1.2}
.stat-label{font-size:10px;color:#94a3b8;font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.atleta-card-footer{padding:10px 14px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.salario-info{font-size:12px;color:#64748b}
.salario-valor{font-size:13px;font-weight:700;color:#0f172a}

/* POSIÇÃO CORES */
.pos-goleiro{background:#1d4ed8}
.pos-lateral{background:#0891b2}
.pos-zagueiro{background:#0369a1}
.pos-volante{background:#7c3aed}
.pos-meia{background:#be185d}
.pos-atacante{background:#dc2626}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:950px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
.modal-header{padding:20px 26px 16px;4a3b8;margin:0 4px}
.hist-de{text-decoration:line-through;color:#94a3b8;font-size:13px}
.hist-para{font-size:14px;font-weight:700;color:#16a34a}
.hist-motivo{font-size:12px;color:#64748b;flex:1}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{padding:8px 11px;border:1px solid #e2e8f0;border-radius:8px;font-size:13.5px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.form-group textarea{resize:vertical;min-height:64px}
.form-divider{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;padding:14px 0 8px;grid-column:1/-1;border-bottom:1px solid #f1f5f9;margin-bottom:4px;ETA EDITOR */
.meta-editor{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-top:8px}
.meta-editor-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 32px;gap:8px;padding:8px 12px;border-top:1px solid #f1f5f9;align-items:center}
.meta-editor-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 32px;gap:8px;padding:8px 12px;background:#f8fafc;font-size:10.5px;color:#64748b;font-weight:700;text-transform:uppercase}
.meta-editor-row input,.meta-editor-row select{padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;width:100%;outline:none}
.add-meta-btn{width:100%;padding:8px;background:#f8fafc;border:none;border-top:1px solid #f1f5f9;cursor:pointer;font-size:12.5px;color:#64748b;font-weight:600}
.add-meta-btn:hover{background:#f1f5f9}

.artilharia-section{background:#fff;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:24px;overflow:hidden}
.artilharia-header{padding:16px 20px;border-bottom:1px solid #f1f5f9;font-size:14px;font-weight:700;color:#0f172a}
