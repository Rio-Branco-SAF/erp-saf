<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atletas — ERP SAF</title>
<link rel="preconnect" href="https://unpkg.com">
  <script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script defer src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="config.js"></script>
<style>
    :root {
      --bg:          #141414;
      --sidebar-bg:  #1a1a1a;
      --card-bg:     #242424;
      --card-borda:  #363636;
      --input-bg:    #1f1f1f;
      --verde:       #22C55E;
      --verde-med:   #16A34A;
      --verde-dark:  #15803D;
      --vermelho:    #FF5C5C;
      --dourado:     #D4A017;
      --dourado-vivo:#F0B429;
      --azul:        #3B82F6;
      --azul-dark:   #1D4ED8;
      --texto:       #F0F0F0;
      --texto-leve:  #9CA3AF;
      --roxo:        #8B5CF6;
      --laranja:     #F97316;
      --cinza:       #2e2e2e;
      --danger:      #EF4444;
      --warning:     #F59E0B;
      --info:        #3B82F6;
      --verde-bg:    rgba(34,197,94,.1);
      --sombra:      0 2px 8px rgba(0,0,0,.4);
    }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background: var(--bg);color: var(--texto);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--texto-leve);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:var(--texto);border-bottom:1px solid var(--card-borda);letter-spacing:-.3px}
.sidebar-logo span{color:var(--dourado-vivo)}
.sidebar nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;transition:.15s}
.nav-item:hover{background:rgba(212,160,23,.08);color:var(--texto)}
.nav-item.active{background:rgba(212,160,23,.12);color:var(--dourado-vivo)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--card-borda);font-size:12px}
.user-chip{display:flex;align-items:center;gap:8px}
.user-avatar-sb{width:30px;height:30px;background:var(--dourado);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--texto)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#252540;border-bottom:1px solid #3A3A5C;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;color:#0f172a}
.topbar-sub{font-size:12px;color:#64748b;margin-top:2px}
.content{padding:24px 28px;flex:1}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:#1d4ed8;color:#252540}
.btn-primary:hover{background:#1e40af}
.btn-outline{background:#252540;color:#475569;border:1px solid #3A3A5C}
.btn-outline:hover{background:#252540}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-success{background:#16a34a;color:#252540}
.btn-ghost{background:transparent;color:#64748b;border:none;font-size:13px;cursor:pointer;padding:4px 8px}
.btn-ghost:hover{color:#0f172a}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:#252540;border-radius:12px;padding:16px 18px;border:1px solid #3A3A5C}
.kpi-label{font-size:11.5px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:24px;font-weight:800;margin:5px 0 2px;color:#0f172a}
.kpi-sub{font-size:11.5px;color:#94a3b8}
.kpi-card.urgente .kpi-value{color:#FF5C5C}
.kpi-card.alerta .kpi-value{color:#d97706}
.kpi-card.ok .kpi-value{color:#16a34a}

/* FILTERS */
.filters-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{padding:8px 12px;border:1px solid #3A3A5C;border-radius:8px;font-size:13px;width:220px;outline:none}
.search-input:focus{border-color:#1d4ed8}
select.filter-sel{padding:8px 12px;border:1px solid #3A3A5C;border-radius:8px;font-size:13px;background:#252540;outline:none;color:#475569;cursor:pointer}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid #3A3A5C;background:#252540;color:#475569;transition:.15s}
.filter-btn.active{background:#1d4ed8;color:#252540;border-color:#1d4ed8}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600;white-space:nowrap}
.pill-ativo{background:#dcfce7;color:#16a34a}
.pill-lesionado{background:#fee2e2;color:#FF5C5C}
.pill-suspenso{background:#fed7aa;color:#c2410c}
.pill-emprestado{background:#dbeafe;color:#1d4ed8}
.pill-inativo{background:#1C1C2E;color:#94a3b8}

/* CARDS DE ATLETAS */
.atletas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.atleta-card{background:#252540;border-radius:14px;border:1px solid #3A3A5C;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.atleta-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.1);border-color:#c7d2fe}
.atleta-card-header{padding:18px 18px 14px;display:flex;align-items:flex-start;gap:12px}
.atleta-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0;color:#252540}
.atleta-info{flex:1;min-width:0}
.atleta-nome{font-size:14.5px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.atleta-nome-guerra{font-size:12px;color:#64748b;margin-top:1px}
.atleta-posicao{font-size:11.5px;color:#94a3b8;margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.contrato-vencendo{position:absolute;top:12px;right:12px;background:#fef9c3;color:#a16207;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:100px}
.atleta-card-stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #1C1C2E;padding:12px 14px;gap:8px}
.stat-box{text-align:center}
.stat-value{font-size:16px;font-weight:800;color:#0f172a;line-height:1.2}
.stat-label{font-size:10px;color:#94a3b8;font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.atleta-card-footer{padding:10px 14px;border-top:1px solid #1C1C2E;display:flex;align-items:center;justify-content:space-between}
.salario-info{font-size:12px;color:#64748b}
.salario-valor{font-size:13px;font-weight:700;color:#0f172a}

/* POSIÇÃO CORES */
.pos-goleiro{background:#1d4ed8}
.pos-lateral{background:#0891b2}
.pos-zagueiro{background:#0369a1}
.pos-volante{background:#7c3aed}
.pos-meia{background:#be185d}
.pos-atacante{background:#FF5C5C}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#252540;border-radius:16px;width:100%;max-width:950px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
.modal-header{padding:20px 26px 16px;border-bottom:1px solid #3A3A5C;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#252540;z-index:10}
.modal-header h2{font-size:18px;font-weight:800;color:#0f172a}
.modal-body{padding:26px}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1}
.close-btn:hover{color:#0f172a}

/* PERFIL DO ATLETA */
.atleta-perfil{display:flex;gap:20px;margin-bottom:24px;align-items:flex-start}
.atleta-avatar-lg{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:#252540;flex-shrink:0}
.atleta-header-info h2{font-size:22px;font-weight:800;color:#0f172a}
.atleta-header-info .nome-guerra{font-size:15px;color:#64748b;font-style:italic;margin-top:2px}
.atleta-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* TABS */
.tabs{display:flex;gap:2px;background:#1C1C2E;border-radius:8px;padding:3px;width:fit-content;margin-bottom:22px}
.tab{padding:6px 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;color:#64748b;border:none;background:transparent;transition:.15s}
.tab.active{background:#252540;color:#0f172a;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* DETAIL SECTIONS */
.detail-section{margin-bottom:22px}
.detail-section h3{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1C1C2E}
.detail-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.detail-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.detail-item label{display:block;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.detail-item span{font-size:14px;font-weight:600;color:#0f172a;display:block}
.detail-item .secondary{font-size:12px;color:#64748b;font-weight:400}

/* CONTRATO CARD */
.contrato-box{border:1px solid #3A3A5C;border-radius:12px;padding:18px;margin-bottom:12px}
.contrato-box.ativo-box{border-color:#16a34a;background:#f0fdf4}
.contrato-titulo{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.contrato-salarios{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.sal-item{text-align:center;background:#252540;border-radius:8px;padding:10px 8px}
.sal-label{font-size:10.5px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.sal-value{font-size:16px;font-weight:800;color:#0f172a;margin-top:3px}
.sal-value.destaque{color:#16a34a}
.vencimento-bar{background:#1C1C2E;border-radius:8px;padding:10px 12px;font-size:13px;color:#475569;display:flex;align-items:center;justify-content:space-between}
.dias-count{font-size:18px;font-weight:800;color:#0f172a}
.dias-count.urgent{color:#FF5C5C}
.dias-count.warning{color:#d97706}
.dias-count.ok{color:#16a34a}

/* METAS CARDS */
.metas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.meta-card{border:1px solid #3A3A5C;border-radius:10px;padding:12px 14px}
.meta-card.bonus-card{border-left:4px solid #16a34a}
.meta-card.desconto-card{border-left:4px solid #FF5C5C}
.meta-tipo{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.meta-desc{font-size:13px;font-weight:600;color:#0f172a;margin-top:3px}
.meta-valor{font-size:16px;font-weight:800;margin-top:6px}
.meta-valor.pos{color:#16a34a}
.meta-valor.neg{color:#FF5C5C}
.meta-detalhe{font-size:11.5px;color:#94a3b8;margin-top:3px}

/* STATS TABLE */
.stats-table{width:100%;border-collapse:collapse;font-size:13px}
.stats-table th{background:#252540;padding:9px 12px;text-align:center;font-size:10.5px;color:#64748b;font-weight:700;text-transform:uppercase;border-bottom:1px solid #3A3A5C}
.stats-table th:first-child{text-align:left}
.stats-table td{padding:10px 12px;border-bottom:1px solid #1C1C2E;text-align:center;vertical-align:middle}
.stats-table td:first-child{text-align:left;font-weight:600;color:#0f172a}
.stats-table tr:last-child td{border-bottom:none}
.stat-highlight{font-weight:800;color:#1d4ed8;font-size:15px}
.stat-zero{color:#d1d5db}

/* BONIFICAÇÕES TABLE */
.bonus-table{width:100%;border-collapse:collapse;font-size:13px}
.bonus-table th{background:#252540;padding:8px 12px;text-align:left;font-size:10.5px;color:#64748b;font-weight:700;text-transform:uppercase;border-bottom:1px solid #3A3A5C}
.bonus-table td{padding:10px 12px;border-bottom:1px solid #1C1C2E}
.bonus-table tr:last-child td{border-bottom:none}
.valor-bonus{font-weight:700;color:#16a34a}
.valor-desconto{font-weight:700;color:#FF5C5C}
.pill-pago{background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
.pill-pendente{background:#fef9c3;color:#a16207;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
.pill-cancelado{background:#1C1C2E;color:#94a3b8;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}

/* HIST SALÁRIO */
.hist-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1C1C2E}
.hist-item:last-child{border:none}
.hist-data{font-size:12px;color:#64748b;white-space:nowrap;width:90px}
.hist-arrow{font-size:12px;color:#94a3b8;margin:0 4px}
.hist-de{text-decoration:line-through;color:#94a3b8;font-size:13px}
.hist-para{font-size:14px;font-weight:700;color:#16a34a}
.hist-motivo{font-size:12px;color:#64748b;flex:1}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{padding:8px 11px;border:1px solid #3A3A5C;border-radius:8px;font-size:13.5px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.form-group textarea{resize:vertical;min-height:64px}
.form-divider{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;padding:14px 0 8px;grid-column:1/-1;border-bottom:1px solid #1C1C2E;margin-bottom:4px}

/* META EDITOR */
.meta-editor{border:1px solid #3A3A5C;border-radius:8px;overflow:hidden;margin-top:8px}
.meta-editor-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 32px;gap:8px;padding:8px 12px;border-top:1px solid #1C1C2E;align-items:center}
.meta-editor-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 32px;gap:8px;padding:8px 12px;background:#252540;font-size:10.5px;color:#64748b;font-weight:700;text-transform:uppercase}
.meta-editor-row input,.meta-editor-row select{padding:5px 8px;border:1px solid #3A3A5C;border-radius:6px;font-size:12px;width:100%;outline:none}
.add-meta-btn{width:100%;padding:8px;background:#252540;border:none;border-top:1px solid #1C1C2E;cursor:pointer;font-size:12.5px;color:#64748b;font-weight:600}
.add-meta-btn:hover{background:#1C1C2E}

.artilharia-section{background:#252540;border-radius:14px;border:1px solid #3A3A5C;margin-bottom:24px;overflow:hidden}
.artilharia-header{padding:16px 20px;border-bottom:1px solid #1C1C2E;font-size:14px;font-weight:700;color:#0f172a}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1C1C2E;width:100%}
.login-card{background:#252540;border-radius:16px;padding:40px;width:380px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h2{font-size:22px;font-weight:800;color:#0f172a;margin-top:10px}
.login-err{background:#fee2e2;color:#FF5C5C;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.empty-state{text-align:center;padding:48px 20px;color:#94a3b8}
.empty-icon{font-size:44px;margin-bottom:12px}
.modal-footer{padding:16px 26px;border-top:1px solid #3A3A5C;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#252540}
.alert-warning{background:#fef9c3;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a"><div style="color:#64748b;font-size:15px;font-family:sans-serif;letter-spacing:.5px">Carregando ERP SAF…</div></div></div>

let TOKEN = localStorage.getItem('erp_access');
let USUARIO = null;
try { USUARIO = JSON.parse(localStorage.getItem('erp_user')); } catch(e){}

async function apiFetch(path, options={}) {
    try {
        const headers = { 'Content-Type': 'application/json' };
        const hadToken = !!TOKEN;
        if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
        const res = await fetch(API_URL + path, { ...options, headers });
        if (res.status === 401 && hadToken) { TOKEN=null; localStorage.removeItem('erp_access'); localStorage.removeItem('erp_user'); window.location.href = 'login.html'; }
        return await res.json();
    } catch(e) { return null; }
}

function fmt(v) { if (!v && v!==0) return '—'; return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function fmtData(d) { if(!d) return '—'; return new Date(d+(d.length===10?'T00:00:00':'')).toLocaleDateString('pt-BR'); }
function calcIdade(dt) { if(!dt) return null; const n=new Date(), b=new Date(dt); return Math.floor((n-b)/31557600000); }

function getAvatarBg(posicao) {
    const map = { goleiro:'#1d4ed8', lateral_direito:'#0891b2', lateral_esquerdo:'#0891b2', zagueiro:'#0369a1', volante:'#7c3aed', meia_central:'#be185d', meia_atacante:'#be185d', ponta_direita:'#dc2626', ponta_esquerda:'#dc2626', centroavante:'#dc2626' };
    return map[posicao]||'#64748b';
}

function Login({ onLogin }) {
    const [usuario, setUsuario] = useState('admin');
    const [senha, setSenha] = useState('admin123');
    const [erro, setErro] = useState('');
    const [loading, setLoading] = useState(false);
    async function handleLogin(e) {
        e.preventDefault(); setLoading(true); setErro('');
        const data = await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({usuario,senha})});
        setLoading(false);
        if (data?.token) { TOKEN=data.token; USUARIO=data.usuario; localStorage.setItem('erp_access',TOKEN); localStorage.setItem('erp_user',JSON.stringify(USUARIO)); onLogin(data.usuario); }
        else if (usuario==='admin'&&senha==='admin123') { USUARIO={id:1,nome:'Administrador',perfil:'admin'}; localStorage.setItem('erp_user',JSON.stringify(USUARIO)); onLogin(USUARIO); }
        else setErro('Usuario ou senha incorretos.');
    }
    return <div className="login-wrap"><div className="login-card">
        <div className="login-logo"><div style={{fontSize:40}}>🏟️</div><h2>ERP SAF</h2><p>Gestão de Atletas</p></div>
        {erro&&<div className="login-err">{erro}</div>}
        <form onSubmit={handleLogin}>
            <div className="form-group" style={{marginBottom:12}}><label>Usuário</label><input value={usuario} onChange={e=>setUsuario(e.target.value)} required/></div>
            <div className="form-group" style={{marginBottom:20}}><label>Senha</label><input type="password" value={senha} onChange={e=>setSenha(e.target.value)} required/></div>
            <button type="submit" className="btn btn-primary" style={{width:'100%',padding:'11px'}} disabled={loading}>{loading?'Entrando...':'Entrar'}</button>
        </form>
        <div style={{textAlign:'center',marginTop:16,fontSize:12,color:'#94a3b8'}}>Demo: admin / admin123</div>
    </div></div>;
}

    useEffect(() => {
        async function buscar() {
            const data = await apiFetch('/atletas/' + at.id);
            if (data?.id) setDetalhe(data);
            else setDetalhe(at.id === 15 ? DEMO_DETALHE_15 : { ...at, contratos:[], estatisticas:[], bonificacoes:[], historico_salario:[] });

    }, [at.id]);

    const d = detalhe || at;
    const contratoAtivo = d.contratos?.find(c => c.status === 'ativo');
    const diasVenc = contratoAtivo ? Math.floor((new Date(contratoAtivo.data_fim) - new Date()) / 86400000) : null;
    const diasClass = diasVenc === null ? '' : diasVenc < 0 ? 'urgent' : diasVenc < 60 ? 'urgent' : diasVenc < 120 ? 'warning' : 'ok';

                        {d.observacoes && <div style={{marginTop:12,padding:'10px 12px',background:'#f8fafc',borderRadius:8,fontSize:13,color:'#475569'}}>{d.observacoes}</div>}
                    </div>
                </div>}

                {/* CONTRATO & METAS */}
                {aba === 'contrato' && <div>
                    {!contratoAtivo && <div className="alert-warning">⚠️ Nenhum contrato ativo encontrado para este atleta.</div>}
                    {contratoAtivo && <div className="contrato-box ativo-box">
                        <div className="contrato-titulo">
                            📄 Contrato {contratoAtivo.numero_contrato || '#'+contratoAtivo.id}
                            <span style={{background:'#dcfce7',color:'#16a34a',padding:'2px 8px',borderRadius:100,fontSize:11,fontWeight:700}}>ATIVO</span>
                            <span style={{background:'#f1f5f9',color:'#475569',padding:'2px 8px',borderRadius:100,fontSize:11,fontWeight:600,textTransform:'capitalize'}}>{contratoAtivo.tipo}</span>
                        </div>

                        {/* VIGÊNCIA */}
                        <div className="vencimento-bar" style={{marginBottom:14}}>
                            <div>
                                <div style={{fontSize:11.5,color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>Vigência</div>
                                <div style={{fontWeight:700,color:'#0f172a',marginTop:2}}>{fmtData(contratoAtivo.data_inicio)} → {fmtData(contratoAtivo.data_fim)}</div>
                            </div>
                            <div style={{textAlign:'right'}}>
                                <div style={{fontSize:11.5,color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>{diasVenc < 0 ? 'Vencido há' : 'Vence em'}</div>
                                <div className={'dias-count '+diasClass}>{Math.abs(diasVenc)} dias</div>
                            </div>
                        </div>

                        {/* COMPOSIÇÃO SALARIAL */}
                        <div style={{marginBottom:12}}>
                            <div style={{fontSize:11,color:'#64748b',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Composição Salarial</div>
                            <div className="contrato-salarios">
                                <div className="sal-item">
                                    <div className="sal-label">Salário Total</div>
                                    <div className="sal-value destaque">{fmt(contratoAtivo.salario_bruto)}</div>
                                </div>
                                <div className="sal-item">
                                    <div className="sal-label">Na Carteira (CLT)</div>
                                    <div className="sal-value">{fmt(contratoAtivo.salario_carteira)}</div>
                                </div>
                                <div className="sal-item">
                                    <div className="sal-label">Direitos de Imagem (PJ)</div>
                                    <div className="sal-value">{fmt(contratoAtivo.direitos_imagem)}</div>
                                </div>
                                <div className="sal-item">
                                    <div className="sal-label">Luvas (Assinatura)</div>
                                    <div className="sal-value">{contratoAtivo.luvas > 0 ? fmt(contratoAtivo.luvas) : '—'}</div>
                                </div>
                            </div>
                        </div>

                        {contratoAtivo.clausula_rescisoria > 0 && (
                            <div style={{background:'#fff7ed',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#92400e',border:'1px solid #fed7aa',marginBottom:12}}>
                                🔒 Cláusula rescisória: <strong>{fmt(contratoAtivo.clausula_rescisoria)}</strong>
                            </div>
                        )}
                        {contratoAtivo.clube_cedente && (
                            <div style={{background:'#eff6ff',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#1d4ed8',border:'1px solid #bfdbfe',marginBottom:12}}>
                                🔄 Emprestado por: <strong>{contratoAtivo.clube_cedente}</strong>
                            </div>
                        )}
                        {contratoAtivo.observacoes && <div style={{fontSize:12.5,color:'#64748b',fontStyle:'italic'}}>{contratoAtivo.observacoes}</div>}
                    </div>}

                    {/* METAS */}
                    {contratoAtivo?.metas?.length > 0 && <div className="detail-section" style={{marginTop:20}}>
                        <h3>🎯 Metas e Bonificações Contratuais</h3>
                        <div className="metas-grid">
                            {contratoAtivo.metas.map(m => {
                                const isDesconto = m.valor_bonus < 0 || ['cartao_amarelo','cartao_vermelho'].includes(m.tipo);
                                return <div key={m.id} className={'meta-card '+(isDesconto?'desconto-card':'bonus-card')}>
                                    <div className="meta-tipo">{TIPO_META_LABEL[m.tipo]||m.tipo}</div>
                                    <div className="meta-desc">{m.descricao}</div>
                                    <div className={'meta-valor '+(isDesconto?'neg':'pos')}>
                                        {isDesconto ? '-' : '+'}{fmt(Math.abs(m.valor_bonus))}
                                        <span style={{fontSize:11,fontWeight:400,color:'#94a3b8'}}>{m.meta_quantidade > 1 ? ' a cada '+m.meta_quantidade : ' / ocorrência'}</span>
                                    </div>
                                    {m.competicao && <div className="meta-detalhe">📋 Apenas em: {m.competicao}</div>}
                                    {m.tipo_calculo === 'total_periodo' && <div className="meta-detalhe">🏁 Pago ao final da competição</div>}
                                </div>;
                            })}
                        </div>
                    </div>}

                    {/* HISTÓRICO SALARIAL */}
                    {d.historico_salario?.length > 0 && <div className="detail-section" style={{marginTop:20}}>
                        <h3>📈 Histórico Salarial</h3>
                        {d.historico_salario.map(h => <div key={h.id} className="hist-item">
                            <div className="hist-data">{fmtData(h.data_alteracao)}</div>
                            <div style={{flex:1}}>
                                <div style={{display:'flex',alignItems:'center',gap:8}}>
                                    {h.salario_anterior && <><span className="hist-de">{fmt(h.salario_anterior)}</span><span className="hist-arrow">→</span></>}
                                    <span className="hist-para">{fmt(h.salario_novo)}</span>
                                </div>
                                <div className="hist-motivo">{h.motivo||'—'}</div>
                            </div>
                        </div>)}
                    </div>}
                </div>}

                {/* ESTATÍSTICAS */}
                {aba === 'stats' && <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                        <div style={{fontSize:14,fontWeight:700,color:'#0f172a'}}>Estatísticas por Competição</div>
                        <button className="btn btn-outline btn-sm" onClick={() => setEditStats(!editStats)}>
                            {editStats ? '✕ Cancelar' : '✏️ Atualizar Estatísticas'}
                        </button>
                    </div>

                    {editStats && <div style={{border:'1px solid #dbeafe',borderRadius:10,padding:16,background:'#eff6ff',marginBottom:16}}>
                        <div style={{fontWeight:700,marginBottom:12,color:'#1d4ed8'}}>Atualizar / Adicionar Estatísticas</div>
                        <div className="form-grid three" style={{marginBottom:12}}>
                            <div className="form-group"><label>Temporada</label><input value={statsForm.temporada} onChange={e=>setStatsForm(s=>({...s,temporada:e.target.value}))}/></div>
                            <div className="form-group"><label>Competição</label>
                                <select value={statsForm.competicao} onChange={e=>setStatsForm(s=>({...s,competicao:e.target.value}))}>
                                    <option>Série B</option><option>Copa do Brasil</option><option>Estadual</option><option>Amistoso</option>
                                </select>
                            </div>
                            <div className="form-group"><label>Jogos Disputados</label><input type="number" value={statsForm.jogos_disputados} onChange={e=>setStatsForm(s=>({...s,jogos_disputados:+e.target.value}))}/></div>
                            <div className="form-group"><label>Jogos Titular</label><input type="number" value={statsForm.jogos_titular} onChange={e=>setStatsForm(s=>({...s,jogos_titular:+e.target.value}))}/></div>
                            <div className="form-group"><label>Minutos Jogados</label><input type="number" value={statsForm.minutos_jogados} onChange={e=>setStatsForm(s=>({...s,minutos_jogados:+e.target.value}))}/></div>
                            <div className="form-group"><label>Gols</label><input type="number" value={statsForm.gols} onChange={e=>setStatsForm(s=>({...s,gols:+e.target.value}))}/></div>
                            <div className="form-group"><label>Assistências</label><input type="number" value={statsForm.assistencias} onChange={e=>setStatsForm(s=>({...s,assistencias:+e.target.value}))}/></div>
                            <div className="form-group"><label>Clean Sheets</label><input type="number" value={statsForm.jogos_sem_sofrer_gol} onChange={e=>setStatsForm(s=>({...s,jogos_sem_sofrer_gol:+e.target.value}))}/></div>
                            <div className="form-group"><label>🟨 Amarelos</label><input type="number" value={statsForm.cartoes_amarelos} onChange={e=>setStatsForm(s=>({...s,cartoes_amarelos:+e.target.value}))}/></div>
                            <div className="form-group"><label>🟥 Vermelhos</label><input type="number" value={statsForm.cartoes_vermelhos} onChange={e=>setStatsForm(s=>({...s,cartoes_vermelhos:+e.target.value}))}/></div>
                        </div>
                        <button className="btn btn-primary btn-sm" onClick={salvarStats}>💾 Salvar Estatísticas</button>
                    </div>}

                    {d.estatisticas?.length === 0 ? (
                        <div className="empty-state"><div className="empty-icon">📊</div><p>Nenhuma estatística registrada.</p></div>
                    ) : (
                        d.estatisticas?.reduce((acc, e) => {
                            const t = acc.find(x=>x.temporada===e.temporada);
                            if(!t) acc.push({temporada:e.temporada,rows:[e]}); else t.rows.push(e);
                            return acc;
                        },[]).map(grupo => <div key={grupo.temporada} style={{marginBottom:16}}>
                            <div style={{fontSize:13,fontWeight:700,color:'#1d4ed8',marginBottom:8}}>⏱️ Temporada {grupo.temporada}</div>
                            <table className="stats-table">
                                <thead><tr>
                                    <th>Competição</th><th>Jogos</th><th>Titular</th><th>Min.</th>
                                    <th>⚽ Gols</th><th>🅰️ Assist.</th><th>🧤 C.Sheet</th><th>🟨</th><th>🟥</th>
                                </tr></thead>
                                <tbody>
                                    {grupo.rows.map(e=><tr key={e.id}>
                                        <td>{e.competicao}</td>
                                        <td>{e.jogos_disputados||0}</td><td>{e.jogos_titular||0}</td>
                                        <td>{e.minutos_jogados||0}'</td>
                                        <td><span className={e.gols>0?'stat-highlight':'stat-zero'}>{e.gols||0}</span></td>
                                        <td><span className={e.assistencias>0?'stat-highlight':'stat-zero'}>{e.assistencias||0}</span></td>
                                        <td><span className={e.jogos_sem_sofrer_gol>0?'stat-highlight':'stat-zero'}>{e.jogos_sem_sofrer_gol||0}</span></td>
                                        <td style={{color:e.cartoes_amarelos>0?'#d97706':'#d1d5db',fontWeight:700}}>{e.cartoes_amarelos||0}</td>
                                        <td style={{color:e.cartoes_vermelhos>0?'#dc2626':'#d1d5db',fontWeight:700}}>{e.cartoes_vermelhos||0}</td>
                                    </tr>)}
                                    {grupo.rows.length > 1 && <tr style={{background:'#f8fafc',fontWeight:700}}>
                                        <td>TOTAL</td>
                                        <td>{grupo.rows.reduce((s,e)=>s+(e.jogos_disputados||0),0)}</td>
                                        <td>{grupo.rows.reduce((s,e)=>s+(e.jogos_titular||0),0)}</td>
                                        <td>{grupo.rows.reduce((s,e)=>s+(e.minutos_jogados||0),0)}'</td>
                                        <td style={{color:'#1d4ed8',fontWeight:800}}>{grupo.rows.reduce((s,e)=>s+(e.gols||0),0)}</td>
                                        <td style={{color:'#1d4ed8',fontWeight:800}}>{grupo.rows.reduce((s,e)=>s+(e.assistencias||0),0)}</td>
                                        <td style={{color:'#1d4ed8',fontWeight:800}}>{grupo.rows.reduce((s,e)=>s+(e.jogos_sem_sofrer_gol||0),0)}</td>
                                        <td style={{color:'#d97706',fontWeight:700}}>{grupo.rows.reduce((s,e)=>s+(e.cartoes_amarelos||0),0)}</td>
                                        <td style={{color:'#dc2626',fontWeight:700}}>{grupo.rows.reduce((s,e)=>s+(e.cartoes_vermelhos||0),0)}</td>
                                    </tr>}
                                </tbody>
                            </table>
                        </div>)
                    )}
                </div>}

                {/* BONIFICAÇÕES */}
                {aba === 'bonus' && <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#0f172a',marginBottom:14}}>💰 Bonificações e Descontos</div>
                    {d.bonificacoes?.length === 0 ? (
                        <div className="empty-state"><div className="empty-icon">💰</div><p>Nenhuma bonificação registrada.</p></div>
                    ) : (
                        <table className="bonus-table">
                            <thead><tr><th>Competência</th><th>Descrição</th><th>Valor</th><th>Status</th></tr></thead>
                            <tbody>
                                {d.bonificacoes?.map(b=><tr key={b.id}>
                                    <td style={{whiteSpace:'nowrap'}}>{fmtData(b.competencia)}</td>
                                    <td>{b.descricao}</td>
                                    <td>
                                        <span className={b.tipo==='desconto'?'valor-desconto':'valor-bonus'}>
                                            {b.tipo==='desconto'?'- ':'+ '}{fmt(b.valor)}
                                        </span>
                                    </td>
                                    <td>
                                        <span className={'pill-'+b.status}>{b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span>
                                    </td>
                                </tr>)}
                            </tbody>
                        </table>
                    )}

                    {/* RESUMO */}
                    {d.bonificacoes?.length > 0 && <div style={{display:'flex',gap:16,marginTop:14}}>
                        {[
                            { label:'Total Bônus', val:d.bonificacoes.filter(b=>b.tipo==='bonus').reduce((s,b)=>s+parseFloat(b.valor),0), color:'#16a34a' },
                            { label:'Total Descontos', val:d.bonificacoes.filter(b=>b.tipo==='desconto').reduce((s,b)=>s+parseFloat(b.valor),0), color:'#dc2626' },
                            { label:'Pendente a Pagar', val:d.bonificacoes.filter(b=>b.status==='pendente'&&b.tipo==='bonus').reduce((s,b)=>s+parseFloat(b.valor),0), color:'#d97706' },
                        ].map((r,i)=><div key={i} style={{flex:1,background:'#f8fafc',borderRadius:10,padding:'12px 14px',textAlign:'center'}}>
                            <div style={{fontSize:11,color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>{r.label}</div>
                            <div style={{fontSize:18,fontWeight:800,color:r.color,marginTop:4}}>{fmt(r.val)}</div>
                        </div>)}
                    </div>}
                </div>}
            </div>

            <div className="modal-footer">
                <button className="btn btn-outline" onClick={onClose}>Fechar</button>
            </div>
        </div>
    </div>;
}

// ============================================================
// MÓDULO PRINCIPAL
// ============================================================
function ModuloAtletas({ usuario }) {
    const [atletas, setAtletas] = useState([]);
    const [resumo, setResumo] = useState(DEMO_RESUMO);
    const [loading, setLoading] = useState(true);
    const [busca, setBusca] = useState('');
    const [filtroStatus, setFiltroStatus] = useState('');
    const [filtroPosicao, setFiltroPosicao] = useState('');
    const [detalhe, setDetalhe] = useState(null);
    const [total, setTotal] = useState(0);
    const [modalCadastro, setModalCadastro] = useState(false);
    const [salvandoAtleta, setSalvandoAtleta] = useState(false);
    const [formAtleta, setFormAtleta] = useState({
        nome:'', nome_guerra:'', posicao:'', data_nascimento:'',
        nacionalidade:'Brasileira', pe_dominante:'direito',
        altura_cm:'', peso_kg:'', agente:'', observacoes:''
    });

    const salvarAtleta = async () => {
        if (!formAtleta.nome || !formAtleta.posicao) { alert('Nome e posição são obrigatórios.'); return; }
        setSalvandoAtleta(true);
        try {
            const payload = { ...formAtleta,
                altura_cm: formAtleta.altura_cm ? Number(formAtleta.altura_cm) : null,
                peso_kg:   formAtleta.peso_kg   ? Number(formAtleta.peso_kg)   : null };
            await apiFetch('/atletas', { method:'POST', body: JSON.stringify(payload) });
            setModalCadastro(false);
            setFormAtleta({ nome:'', nome_guerra:'', posicao:'', data_nascimento:'',
                nacionalidade:'Brasileira', pe_dominante:'direito', altura_cm:'', peso_kg:'', agente:'', observacoes:'' });
            await carregar();
        } catch(e) { alert('Erro ao cadastrar: ' + (e.message||'verifique a conexão')); }
        finally { setSalvandoAtleta(false); }
    };

    const carregar = useCallback(async () => {
        if(!TOKEN) return;
        setLoading(true);
        const params = new URLSearchParams({ pagina:1, por_pagina:50 });
        if (busca) params.set('busca', busca);
        if (filtroStatus) params.set('status', filtroStatus);
        if (filtroPosicao) params.set('posicao', filtroPosicao);

        const [listData, resumoData] = await Promise.all([
            apiFetch('/atletas?'+params.toString()),
            apiFetch('/atletas/resumo')
        ]);

        if (listData?.atletas) {
            setAtletas(listData.atletas); setTotal(listData.total);
            localStorage.setItem('erp_atletas', JSON.stringify(listData.atletas));
        } else {
            // Salva lista completa no localStorage para integração com módulo Financeiro
            localStorage.setItem('erp_atletas', JSON.stringify(DEMO_ATLETAS));
            let f = DEMO_ATLETAS;
            if (busca) f = f.filter(a => a.nome.toLowerCase().includes(busca.toLowerCase()) || (a.nome_guerra||'').toLowerCase().includes(busca.toLowerCase()));
            if (filtroStatus) f = f.filter(a => a.status === filtroStatus);
            if (filtroPosicao) f = f.filter(a => a.posicao === filtroPosicao);
            setAtletas(f); setTotal(f.length);
        }
        if (resumoData?.ativos !== undefined) setResumo(resumoData);
        setLoading(false);
    }, [busca, filtroStatus, filtroPosicao]);

    useEffect(() => { carregar(); }, [carregar]);

    const folhaFormatada = 'R$ '+Number(resumo.folha_total||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});

    return <>
        <div className="topbar">
            <div><h1>⚽ Atletas</h1><div className="topbar-sub">Elenco, contratos, estatísticas e metas de performance</div></div>
            <button className="btn btn-primary" onClick={()=>setModalCadastro(true)}>+ Cadastrar Atleta</button>
        </div>
        <div className="content">
            {/* KPIs */}
            <div className="kpi-grid">
                <div className="kpi-card ok"><div className="kpi-label">Ativos</div><div className="kpi-value">{resumo.ativos}</div><div className="kpi-sub">no elenco</div></div>
                <div className="kpi-card urgente"><div className="kpi-label">Lesionados</div><div className="kpi-value">{resumo.lesionados}</div><div className="kpi-sub">fora de campo</div></div>
                <div className="kpi-card alerta"><div className="kpi-label">Suspensos</div><div className="kpi-value">{resumo.suspensos}</div><div className="kpi-sub">cumprindo suspensão</div></div>
                <div className="kpi-card"><div className="kpi-label">Emprestados</div><div className="kpi-value">{resumo.emprestados}</div><div className="kpi-sub">de outros clubes</div></div>
                <div className="kpi-card alerta"><div className="kpi-label">Contratos Vencendo</div><div className="kpi-value">{resumo.contratos_vencendo}</div><div className="kpi-sub">nos próximos 90 dias</div></div>
            </div>

            {/* Folha */}
            <div style={{background:'#fff',borderRadius:12,padding:'14px 20px',border:'1px solid #e2e8f0',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div><div style={{fontSize:11.5,color:'#64748b',fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px'}}>Folha Total de Atletas (mensal)</div>
                <div style={{fontSize:24,fontWeight:800,color:'#0f172a',marginTop:3}}>{folhaFormatada}</div></div>
                <div style={{fontSize:13,color:'#94a3b8'}}>{atletas.length} atletas no elenco</div>
            </div>

            {/* FILTROS */}
            <div className="filters-row">
                <input className="search-input" placeholder="Buscar por nome..." value={busca} onChange={e => setBusca(e.target.value)}/>
                <select className="filter-sel" value={filtroStatus} onChange={e => setFiltroStatus(e.target.value)}>
                    <option value="">Todos os status</option>
                    <option value="ativo">✅ Ativo</option>
                    <option value="lesionado">🏥 Lesionado</option>
                    <option value="suspenso">🟨 Suspenso</option>
                    <option value="emprestado">🔄 Emprestado</option>
                    <option value="inativo">⛔ Inativo</option>
                </select>
                <select className="filter-sel" value={filtroPosicao} onChange={e => setFiltroPosicao(e.target.value)}>
                    <option value="">Todas as posições</option>
                    {Object.entries(POSICAO_LABEL).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                </select>
                {(busca||filtroStatus||filtroPosicao) && <button className="btn-ghost" onClick={()=>{setBusca('');setFiltroStatus('');setFiltroPosicao('')}}>✕ Limpar</button>}
                <div style={{marginLeft:'auto',fontSize:13,color:'#94a3b8'}}>{total} atleta{total!==1?'s':''}</div>
            </div>

            {/* GRID DE CARDS */}
            {!TOKEN ? (
                <div style={{textAlign:'center',padding:'80px 20px',color:'#94a3b8'}}>
                  <div style={{fontSize:'48px',marginBottom:'12px'}}>🔒</div>
                  <div style={{fontSize:'18px',fontWeight:'600',marginBottom:'8px',color:'#e2e8f0'}}>Elenco requer autenticação</div>
                  <div style={{fontSize:'14px',marginBottom:'24px'}}>Faça login para acessar e gerenciar o elenco do Rio Branco</div>
                  <a href="login.html" style={{display:'inline-block',background:'#3b82f6',color:'#fff',padding:'10px 28px',borderRadius:'8px',textDecoration:'none',fontWeight:'600',fontSize:'15px'}}>Fazer Login →</a>
                </div>
            ) : loading ? (
                <div style={{textAlign:'center',padding:'60px',color:'#94a3b8',fontSize:14}}>Carregando elenco...</div>
            ) : atletas.length === 0 ? (
                <div className="empty-state"><div className="empty-icon">🔍</div><p>Nenhum atleta encontrado.</p></div>
            ) : (
                <div className="atletas-grid">
                    {atletas.map(a => {
                        const diasVenc = a.dias_ate_vencimento;
                        const vencendoAlert = diasVenc !== null && diasVenc < 90 && diasVenc > 0;
                        const vencido = diasVenc !== null && diasVenc < 0;
                        return <div key={a.id} className="atleta-card" onClick={() => setDetalhe(a)}>
                            {(vencendoAlert||vencido) && <div className="contrato-vencendo">{vencido?'⚠️ Contrato vencido':'⏰ '+diasVenc+' dias'}</div>}

                  </select></div>
                <div><label style={{fontSize:12,color:'var(--texto-leve)',marginBottom:4,display:'block'}}>Nacionalidade</label>

                <div><label style={{fontSize:12,color:'var(--texto-leve)',marginBottom:4,display:'block'}}>Altura (cm)</label>
                  <input className="form-input" type="number" value={formAtleta.altura_cm} onChange={e=>setFormAtleta(p=>({...p,altura_cm:e.target.value}))} placeholder="182"/></div>
                <div><label style={{fontSize:12,color:'var(--texto-leve)',marginBottom:4,display:'block'}}>Peso (kg)</label>
                  <input className="form-input" type="number" value={formAtleta.peso_kg} onChange={e=>setFormAtleta(p=>({...p,peso_kg:e.target.value}))} placeholder="76"/></div>

                <div style={{gridColumn:'1/-1'}}><label style={{fontSize:12,color:'var(--texto-leve)',marginBottom:4,display:'block'}}>Observações</label>
                  <textarea className="form-input" rows={3} value={formAtleta.observacoes} onChange={e=>setFormAtleta(p=>({...p,observacoes:e.target.value}))} style={{resize:'vertical'}}/></div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setModalCadastro(false)}>Cancelar</button>

            </div>
          </div>
        </div>}
    </>;
}

  const [j, setJ] = useState(jogador);

    try {
      const r = await fetch(`${API}/scout/${j.id}`, {method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},body:JSON.stringify({status:novoStatus})});
      const d = await r.json();
      setJ(d.jogador); onUpdate();

    try {

function NovoJogadorForm({onClose, onSalvo}) {
  const [form, setForm] = useState({posicao_principal:'centroavante',status:'monitorando',prioridade:'normal',temporada:'2025/26',pe_dominante:'direito'});
  const [salvando, setSalvando] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  async function salvar(e) {
    e.preventDefault(); setSalvando(true);
    try {
      const r = await fetch(`${API}/scout`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},body:JSON.stringify(form)});
      if (!r.ok){ const d=await r.json(); throw new Error(d.erro||'Erro'); }
      onSalva(); onClose();
    } catch(e){ alert(e.message); setSalvando(false); }
  }
  const inp = (label,key,type='text',opts={}) => (
    <div style={{display:'flex',flexDirection:'column',gap:3}}>
      <label style={{fontSize:11,fontWeight:600,color:'#64748b'}}>{label}</label>
      <input type={type} value={form[key]||''} onChange={e=>set(key,e.target.value)} {...opts}
        style={{border:'1px solid #e2e8f0',borderRadius:7,padding:'6px 10px',fontSize:13,outline:'none'}}/>
    </div>
  );
  const sel = (label,key,options) => (
    <div style={{display:'flex',flexDirection:'column',gap:3}}>
      <label style={{fontSize:11,fontWeight:600,color:'#64748b'}}>{label}</label>
      <select value={form[key]||''} onChange={e=>set(key,e.target.value)} style={{border:'1px solid #e2e8f0',borderRadius:7,padding:'6px 10px',fontSize:13,outline:'none'}}>
        {options.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
      </select>
    </div>
  );
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'20px',overflowY:'auto'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#fff',borderRadius:16,width:'100%',maxWidth:680,padding:28}}>
        <h3 style={{margin:'0 0 20px',color:'#0f172a'}}>➕ Adicionar Jogador ao Scout</h3>
        <form onSubmit={salvar}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <div style={{gridColumn:'1/-1'}}>{inp('Nome *','nome','text',{required:true,placeholder:'Nome completo'})}</div>
            {sel('Posição Principal *','posicao_principal',POSICOES_SCOUT.map(p=>({v:p,l:p.replace(/_/g,' ')})))}
            {sel('Posição Secundária','posicao_secundaria',POSICOES_SCOUT.map(p=>({v:p,l:p.replace(/_/g,' ')})))}
            {inp('Clube Atual','clube_atual')}
            {inp('Liga','liga')}
            {inp('País do Clube','pais_clube')}
            {inp('Data Nasc.','data_nascimento','date')}
            {inp('Nacionalidade','nacionalidade')}
            {sel('Pé Dominante','pe_dominante',[{v:'direito',l:'Direito'},{v:'esquerdo',l:'Esquerdo'},{v:'ambidestro',l:'Ambidestro'}])}
            {inp('Altura (cm)','altura_cm','number',{min:150,max:220})}
            {inp('Peso (kg)','peso_kg','number',{min:50,max:120,step:0.1})}
            {inp('Contrato até','contrato_fim','date')}
            {inp('Salário Estimado (â¬/mês)','salario_estimado','number')}
            {inp('Temporada','temporada','text',{placeholder:'2025/26'})}
            {inp('Jogos','jogos','number',{min:0})}
            {inp('Gols','gols','number',{min:0})}
            {inp('Assistências','assistencias','number',{min:0})}
            {inp('Min. Jogados','minutos_jogados','number',{min:0})}
            {inp('Nota SofaScore','nota_sofascore','number',{min:0,max:10,step:0.1})}
            {inp('Nota WhoScored','nota_whoscored','number',{min:0,max:10,step:0.1})}
            {inp('Nota Scout (1-10)','nota_scout','number',{min:1,max:10})}
            {inp('Orçamento Máx (â¬)','orcamento_max','number')}
            {sel('Status','status',Object.entries(STATUS_SCOUT).map(([v,o])=>({v,l:o.label})))}
            {sel('Prioridade','prioridade',Object.entries(PRIORIDADE_SCOUT).map(([v,o])=>({v,l:o.label})))}
            <div style={{gridColumn:'1/-1',display:'flex',flexDirection:'column',gap:3}}>
              <label style={{fontSize:11,fontWeight:600,color:'#64748b'}}>Pontos Fortes</label>
              <textarea value={form.pontos_fortes||''} onChange={e=>set('pontos_fortes',e.target.value)} rows={2} style={{border:'1px solid #e2e8f0',borderRadius:7,padding:'6px 10px',fontSize:13,resize:'vertical'}} placeholder="Finalização, velocidade, visão de jogo..."/>
            </div>
            <div style={{gridColumn:'1/-1',display:'flex',flexDirection:'column',gap:3}}>
              <label style={{fontSize:11,fontWeight:600,color:'#64748b'}}>Pontos a Melhorar</label>
              <textarea value={form.pontos_fracos||''} onChange={e=>set('pontos_fracos',e.target.value)} rows={2} style={{border:'1px solid #e2e8f0',borderRadius:7,padding:'6px 10px',fontSize:13,resize:'vertical'}}/>
            </div>
            <div style={{gridColumn:'1/-1',display:'flex',flexDirection:'column',gap:3}}>
              <label style={{fontSize:11,fontWeight:600,color:'#64748b'}}>Observações do Scout</label>
              <textarea value={form.observacoes||''} onChange={e=>set('observacoes',e.target.value)} rows={3} style={{border:'1px solid #e2e8f0',borderRadius:7,padding:'6px 10px',fontSize:13,resize:'vertical'}}/>
            </div>
            {inp('Vídeo URL 1','video_url_1','url',{placeholder:'https://youtube.com/...'})}
            {inp('Vídeo URL 2','video_url_2','url',{placeholder:'https://youtube.com/...'})}
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button type="button" onClick={onClose} style={{padding:'8px 20px',borderRadius:8,border:'1px solid #e2e8f0',background:'#fff',cursor:'pointer',fontSize:13}}>Cancelar</button>
            <button type="submit" disabled={salvando} style={{padding:'8px 20px',borderRadius:8,border:'none',background:'#1e3a5f',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>
              {salvando?'Salvando...':'Adicionar'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function ModuloScout({usuario, onIrParaElenco}) {
  const [jogadores, setJogadores] = useState([]);
  const [resumo, setResumo] = useState({});
  const [filtroStatus, setFiltroStatus] = useState('');
  const [filtroPos, setFiltroPos] = useState('');
  const [busca, setBusca] = useState('');
  const [selecionado, setSelecionado] = useState(null);
  const [modalNovo, setModalNovo] = useState(false);
  const [carregando, setCarregando] = useState(true);
const [naoAutorizado, setNaoAutorizado] = React.useState(false);

  async function carregar() {
    setCarregando(true);
    try {
      const params = new URLSearchParams();
      if (filtroStatus) params.set('status', filtroStatus);
      if (filtroPos) params.set('posicao', filtroPos);
      if (busca) params.set('busca', busca);
      const [rj, rr] = await Promise.all([
        fetch(`${API}/scout?${params}`, {headers:{'Authorization':`Bearer ${TOKEN}`}}).then(r=>r.json()),
        fetch(`${API}/scout/stats/resumo`, {headers:{'Authorization':`Bearer ${TOKEN}`}}).then(r=>r.json()),
       ]);
      setJogadores(rj.jogadores || []);
      setResumo(rr);
    } catch(e){ console.error(e); }
    finally { setCarregando(false); setNaoAutorizado(true); }
  }
  useEffect(()=>{ if(!TOKEN){ setCarregando(false); return; } carregar(); }, [filtroStatus, filtroPos, busca]);

  const jogadoresFiltrados = jogadores;

  return <>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div>
        <h2 style={{margin:0,fontSize:20,color:'#0f172a'}}>🔭 Banco de Talentos</h2>
        <p style={{margin:0,fontSize:13,color:'#64748b'}}>Prospecção e acompanhamento de atletas de interesse</p>
      </div>
      <button onClick={()=>setModalNovo(true)} style={{padding:'8px 18px',background:'#1e3a5f',color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:13}}>
        + Adicionar Jogador
      </button>
    </div>

    {/* Resumo por status */}
    <div style={{display:'flex',gap:10,marginBottom:20,overflowX:'auto',paddingBottom:4}}>
      {Object.entries(STATUS_SCOUT).map(([k,v])=>(
        <div key={k} onClick={()=>{ if(k==='contratado'&&onIrParaElenco){onIrParaElenco();return;} setFiltroStatus(filtroStatus===k?'':k); }} style={{background:filtroStatus===k?v.bg:'#fff',border:`1px solid ${filtroStatus===k?v.cor:'#e2e8f0'}`,borderRadius:10,padding:'10px 16px',cursor:'pointer',whiteSpace:'nowrap',minWidth:90,textAlign:'center',transition:'all .15s'}}>
          <div style={{fontSize:18,fontWeight:800,color:filtroStatus===k?v.cor:'#0f172a'}}>{resumo[k]||0}</div>
          <div style={{fontSize:11,color:filtroStatus===k?v.cor:'#64748b',fontWeight:600}}>{v.label}</div>
        </div>
      ))}
    </div>

    {/* Filtros */}
    <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar por nome ou clube..." style={{flex:1,minWidth:200,border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 12px',fontSize:13,outline:'none'}}/>
      <select value={filtroPos} onChange={e=>setFiltroPos(e.target.value)} style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 12px',fontSize:13,outline:'none'}}>
        <option value="">Todas as posições</option>
        {POSICOES_SCOUT.map(p=><option key={p} value={p}>{p.replace(/_/g,' ')}</option>)}
      </select>
    </div>

    {/* Cards */}
    {carregando ? (
      <div style={{textAlign:'center',padding:60,color:'#94a3b8'}}>Carregando...</div>
    ) : (naoAutorizado || !TOKEN) ? (
      <div style={{textAlign:'center',padding:'80px 20px',color:'#94a3b8'}}>
        <div style={{fontSize:'48px',marginBottom:'12px'}}>🔒</div>
        <div style={{fontSize:'18px',fontWeight:'600',marginBottom:'8px',color:'#e2e8f0'}}>Scout requer autenticação</div>
        <div style={{fontSize:'14px',marginBottom:'24px'}}>Faça login para acessar e gerenciar o banco de talentos do Rio Branco</div>
        <a href="login.html" style={{display:'inline-block',background:'#3b82f6',color:'#fff',padding:'10px 28px',borderRadius:'8px',textDecoration:'none',fontWeight:'600',fontSize:'15px'}}>Fazer Login →</a>
      </div>
    ) : jogadoresFiltrados.length === 0 ? (
      <div style={{textAlign:'center',padding:60,color:'#94a3b8'}}>
        <div style={{fontSize:40,marginBottom:10}}>🔭</div>
        <div>Nenhum jogador encontrado.</div>
        <button onClick={()=>setModalNovo(true)} style={{marginTop:12,padding:'8px 18px',background:'#1e3a5f',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}}>Adicionar primeiro jogador</button>
      </div>
    ) : (
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
        {jogadoresFiltrados.map(j=>(
          <CardJogador key={j.id} j={j} onClick={()=>setSelecionado(j)}/>
        ))}
      </div>
    )}

    {selecionado && <PerfilScout jogador={selecionado} onClose={()=>setSelecionado(null)} onUpdate={()=>{carregar();setSelecionado(null);}} usuario={usuario}/>}
    {modalNovo && <NovoJogadorForm onClose={()=>setModalNovo(false)} onSalvo={carregar}/>}
  </>;
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
    const [usuario, setUsuario] = useState(USUARIO);
    const [aba, setAba] = useState('elenco');
    function handleLogout() { TOKEN=null; USUARIO=null; localStorage.removeItem('erp_access'); localStorage.removeItem('erp_user'); setUsuario(null); }
    if (!usuario) return <Login onLogin={u=>setUsuario(u)}/>;
    return <>
        <Sidebar usuario={usuario} onLogout={handleLogout}/>
        <div className="main">
          <div style={{display:'flex',gap:0,marginBottom:24,borderBottom:'2px solid #e2e8f0'}}>
            {[['elenco','👥 Elenco'],['scout','🔭 Scout']].map(([id,lb])=>(
              <button key={id} onClick={()=>setAba(id)} style={{padding:'10px 24px',border:'none',background:'transparent',cursor:'pointer',fontSize:14,fontWeight:aba===id?700:500,color:aba===id?'#1e3a5f':'#64748b',borderBottom:aba===id?'2px solid #1e3a5f':'2px solid transparent',marginBottom:-2,transition:'all .15s'}}>
                {lb}
              </button>
            ))}
          </div>
          {aba==='elenco' ? <ModuloAtletas usuario={usuario}/> : <ModuloScout usuario={usuario} onIrParaElenco={()=>setAba('elenco')}/>}
        </div>
    </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
