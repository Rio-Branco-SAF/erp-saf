<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP SAF √É¬Ę√Ę¬ā¬¨√Ę¬Ä¬Ě Financeiro</title>
  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --bg:          #1C1C2E;
      --sidebar-bg:  #14142B;
      --card-bg:     #252540;
      --card-borda:  #3A3A5C;
      --input-bg:    #14142B;
      --verde:       #22C55E;
      --verde-med:   #16A34A;
      --verde-dark:  #15803D;
      --vermelho:    #FF5C5C;
      --dourado:     #F59E0B;
      --azul:        #3B82F6;
      --azul-dark:   #1D4ED8;
      --texto:       #3A3A5C;
      --texto-leve:  #94A3B8;
      --roxo:        #8B5CF6;
      --laranja:     #F97316;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    background: var(--bg); color: #E2E8F0; min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    

    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: 240px; min-height: 100vh; background: var(--verde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,.15); display: flex; align-items: center; gap: 10px; }
    .sidebar-logo .icon { font-size: 28px; }
    .sidebar-logo .title { color: #fff; font-size: 14px; font-weight: 700; line-height: 1.3; }
    .sidebar-logo .sub { color: rgba(255,255,255,.7); font-size: 11px; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-label { color: rgba(255,255,255,.5); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 12px 16px 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: rgba(255,255,255,.8); font-size: 13px; text-decoration: none; transition: all .15s; border-left: 3px solid transparent; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,.1); color: #fff; }
    .nav-item.ativo { background: rgba(255,255,255,.15); color: #fff; border-left-color: #fff; font-weight: 600; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.15); }
    .usuario-info { display: flex; align-items: center; gap: 8px; }
    .usuario-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
    .usuario-nome { color: #fff; font-size: 12px; font-weight: 600; }
    .usuario-cargo { color: rgba(255,255,255,.6); font-size: 11px; }

    /* MAIN */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .topbar { background: #fff; border-bottom: 1px solid var(--cinza-borda); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--sombra); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; color: var(--texto); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; transition: all .15s; line-height: 1; }
    .btn-primary { background: var(--verde-med); color: #fff; }
    .btn-primary:hover { background: var(--verde); }
    .btn-receita { background: #16A34A; color: #22C55E; }
    .btn-receita:hover { background: #c3e6cb; }
    .btn-despesa { background: #f8d7da; color: #721c24; }
    .btn-despesa:hover { background: #f5c6cb; }
    .btn-secondary { background: #fff; color: var(--texto); border: 1px solid var(--cinza-borda); }
    .btn-secondary:hover { background: var(--cinza); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-link { background: none; border: none; color: var(--verde-med); font-size: 13px; padding: 4px; text-decoration: underline; }

    /* PAGE */
    .page { padding: 24px; flex: 1; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-titulo { font-size: 22px; font-weight: 700; color: var(--texto); }
    .page-sub { font-size: 13px; color: var(--texto-leve); margin-top: 2px; }
    .page-header-actions { display: flex; gap: 10px; }

    /* CARDS RESUMO */
    .cards-resumo { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: var(--sombra); }
    .card-kpi { display: flex; align-items: flex-start; justify-content: space-between; }
    .card-kpi .icon { font-size: 28px; }
    .card-kpi .valor { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .card-kpi .label { font-size: 12px; color: var(--texto-leve); font-weight: 500; margin-top: 2px; }
    .card-kpi .variacao { font-size: 11px; margin-top: 4px; font-weight: 600; }
    .positivo { color: var(--receita); }
    .negativo { color: var(--despesa); }
    .card.borda-verde  { border-left: 4px solid var(--receita); }
    .card.borda-vermelho { border-left: 4px solid var(--despesa); }
    .card.borda-azul   { border-left: 4px solid var(--info); }
    .card.borda-laranja { border-left: 4px solid var(--warning); }

    /* GR√É¬É√ā¬ĀFICO DE BARRAS */
    .grafico-wrap { background: #fff; border-radius: 10px; padding: 20px; box-shadow: var(--sombra); margin-bottom: 20px; }
    .grafico-titulo { font-size: 15px; font-weight: 700; color: var(--texto); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .grafico-legenda { display: flex; gap: 16px; font-size: 12px; }
    .legenda-item { display: flex; align-items: center; gap: 5px; }
    .legenda-dot { width: 10px; height: 10px; border-radius: 50%; }
    .barras { display: flex; gap: 12px; align-items: flex-end; height: 180px; }
    .barra-grupo { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .barra-container { display: flex; gap: 3px; align-items: flex-end; width: 100%; height: 160px; }
    .barra { border-radius: 4px 4px 0 0; flex: 1; min-width: 0; transition: opacity .2s; position: relative; }
    .barra:hover { opacity: .8; }
    .barra-receita { background: #16A34A; }
    .barra-despesa { background: #c0392b; }
    .barra-label { font-size: 10px; color: var(--texto-leve); text-align: center; white-space: nowrap; }
    .barra-valor { font-size: 9px; color: #fff; text-align: center; padding: 2px; word-break: break-all; }
    .saldo-linha { display: flex; gap: 12px; margin-top: 8px; }
    .saldo-mes { flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 3px; border-radius: 4px; }
    .saldo-positivo { background: #16A34A; color: #22C55E; }
    .saldo-negativo { background: #f8d7da; color: #721c24; }

    /* FILTROS */
    .filtros { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: var(--sombra); margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filtros input, .filtros select { padding: 7px 11px; border: 1px solid var(--cinza-borda); border-radius: 6px; font-size: 13px; color: var(--texto); background: #fff; outline: none; }
    .filtros input:focus, .filtros select:focus { border-color: var(--verde-med); }
    .filtros input[type=search] { width: 220px; }
    .filtros input[type=date]   { width: 145px; }
    .filtros select { min-width: 140px; }
    .filtro-tipo-btns { display: flex; gap: 4px; }
    .filtro-tipo-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--cinza-borda); font-size: 12px; font-weight: 600; background: #fff; color: var(--texto-leve); }
    .filtro-tipo-btn.ativo-receita { background: #16A34A; color: #22C55E; border-color: #16A34A; }
    .filtro-tipo-btn.ativo-despesa { background: #f8d7da; color: #721c24; border-color: #c0392b; }
    .filtro-tipo-btn.ativo-todos   { background: var(--cinza); color: var(--texto); border-color: var(--cinza-borda); }

    /* TABELA */
    .tabela-wrap { background: #fff; border-radius: 10px; box-shadow: var(--sombra); overflow: hidden; }
    .tabela-header { padding: 14px 18px; border-bottom: 1px solid var(--cinza-borda); display: flex; align-items: center; justify-content: space-between; }
    .tabela-header-titulo { font-size: 14px; font-weight: 700; color: var(--texto); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f7f9fc; }
    th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--texto-leve); border-bottom: 1px solid var(--cinza-borda); white-space: nowrap; }
    td { padding: 12px 14px; font-size: 13px; color: var(--texto); border-bottom: 1px solid #1C1C2E; vertical-align: middle; }
    tr:hover td { background: #fafbff; }
    tr:last-child td { border-bottom: none; }
    .valor-receita { color: var(--receita); font-weight: 700; }
    .valor-despesa { color: var(--despesa); font-weight: 700; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-realizado { background: #16A34A; color: #22C55E; }
    .badge-previsto  { background: #fff3cd; color: #856404; }
    .badge-cancelado { background: #e2e3e5; color: #495057; text-decoration: line-through; }
    .cat-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

    /* PAGINA√É¬É√Ę¬Ä¬°√É¬É√Ü¬íO */
    .paginacao { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-top: 1px solid var(--cinza-borda); font-size: 13px; color: var(--texto-leve); }
    .paginacao-btns { display: flex; gap: 5px; }
    .paginacao-btns button { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--cinza-borda); background: #fff; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .paginacao-btns button.ativo { background: var(--verde-med); color: #fff; border-color: var(--verde-med); }
    .paginacao-btns button:hover:not(.ativo):not(:disabled) { background: var(--cinza); }
    .paginacao-btns button:disabled { opacity: .4; cursor: not-allowed; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal { background: #fff; border-radius: 12px; width: 100%; max-width: 620px; max-height: 92vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--cinza-borda); display: flex; align-items: center; justify-content: space-between; }
    .modal-titulo { font-size: 16px; font-weight: 700; color: var(--texto); }
    .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid var(--cinza-borda); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-fechar { width: 28px; height: 28px; border-radius: 6px; border: none; background: #f0f0f0; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #888; }
    .btn-fechar:hover { background: #ddd; }

    /* FORM */
    .tipo-selector { display: flex; gap: 10px; margin-bottom: 18px; }
    .tipo-btn { flex: 1; padding: 14px; border-radius: 8px; border: 2px solid var(--cinza-borda); background: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; }
    .tipo-btn.sel-receita { border-color: #16A34A; background: #16A34A; color: #22C55E; }
    .tipo-btn.sel-despesa { border-color: #c0392b; background: #f8d7da; color: #721c24; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grupo { display: flex; flex-direction: column; gap: 5px; }
    .form-grupo.span-2 { grid-column: span 2; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--texto-leve); text-transform: uppercase; letter-spacing: .04em; }
    .form-label .obrig { color: var(--danger); }
    .form-input, .form-select, .form-textarea { padding: 9px 12px; border: 1px solid var(--cinza-borda); border-radius: 6px; font-size: 13px; color: var(--texto); outline: none; width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--verde-med); box-shadow: 0 0 0 3px rgba(30,132,73,.1); }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-section-titulo { font-size: 11px; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 10px; padding-bottom: 5px; border-bottom: 2px solid #16A34A; }

    /* LOADING / EMPTY */
    .loading { display: flex; align-items: center; justify-content: center; padding: 50px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--cinza-borda); border-top-color: var(--verde-med); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vazio { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; color: var(--texto-leve); gap: 10px; }
    .vazio .icon { font-size: 44px; }

    /* TOAST */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 11px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.15); max-width: 340px; animation: slideIn .2s ease; }
    .toast.sucesso { background: #22C55E; color: #fff; }
    .toast.erro    { background: #721c24; color: #fff; }
    @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0d4f1e 0%, #16A34A 100%); }
    .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--verde); margin-top: 8px; }
    .login-logo p { font-size: 13px; color: var(--texto-leve); }
    .login-grupo { margin-bottom: 14px; }
    .login-label { display: block; font-size: 11px; font-weight: 700; color: var(--texto-leve); margin-bottom: 5px; text-transform: uppercase; }
    .login-input { width: 100%; padding: 9px 13px; border: 1.5px solid var(--cinza-borda); border-radius: 7px; font-size: 14px; outline: none; }
    .login-input:focus { border-color: var(--verde-med); }
    .login-btn { width: 100%; padding: 11px; background: var(--verde-med); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; margin-top: 6px; }
    .login-btn:hover { background: var(--verde); }
    .login-erro { background: #f8d7da; color: #721c24; border-radius: 6px; padding: 9px 12px; font-size: 13px; margin-bottom: 12px; }

    /* DETALHE MODAL */
    .detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detalhe-item { padding: 10px 14px; background: #252540; border-radius: 7px; border: 1px solid var(--cinza-borda); }
    .detalhe-item-label { font-size: 10px; font-weight: 700; color: var(--texto-leve); text-transform: uppercase; margin-bottom: 3px; }
    .detalhe-item-valor { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API = (window.ERP_CONFIG && window.ERP_CONFIG.API_URL) || 'http://localhost:3001/api';

// √É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨ helpers √É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨√É¬Ę√Ę¬Ä¬Ě√Ę¬ā¬¨
function fmtMoeda(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); }
function fmtData(d)  { if(!d)return'√É¬Ę√Ę¬ā¬¨√Ę¬Ä¬Ě'; return new Date(d+'T00:00:00').toLocaleDateString('pt-BR'); }
function iniciais(n) { return (n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase(); }

async function apiFetch(path, opts={}) {
  // Auto-refresh se token expirado
  let tok = localStorage.getItem('erp_access');
  try {
    const pl = tok ? JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))) : null;
    if (!tok || (pl && pl.exp * 1000 < Date.now() + 30000)) {
      const ref = localStorage.getItem('erp_refresh');
      if (!ref) { localStorage.clear(); location.href='/login.html'; return; }
      const rr = await fetch(API+'/api/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:ref})});
      if (!rr.ok) { localStorage.clear(); location.href='/login.html'; return; }
      const rd = await rr.json();
      localStorage.setItem('erp_access', rd.access_token);
      if (rd.refresh_token) localStorage.setItem('erp_refresh', rd.refresh_token);
      tok = rd.access_token;
    }
  } catch(e) { localStorage.clear(); location.href='/login.html'; return; }
  const res = await fetch(API+path,{
    headers:{'Content-Type':'application/json',...(tok?{Authorization:'Bearer '+tok}:{})},
    ...opts, body:opts.body?JSON.stringify(opts.body):undefined,
  });
  if(res.status===401){ localStorage.clear(); location.href='/login.html'; return; }
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||data.erro||'Erro desconhecido');
  return data;
}

let _setToasts=null;
function Toast({toasts}){ return <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.tipo}`}>{t.msg}</div>)}</div>; }
function useToast(){ const [toasts,setToasts]=useState([]); _setToasts=setToasts; return toasts; }
function toast(msg,tipo='sucesso'){ if(!_setToasts)return; const id=Date.now(); _setToasts(p=>[...p,{id,msg,tipo}]); setTimeout(()=>_setToasts(p=>p.filter(t=>t.id!==id)),4000); }

function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  const [erro,setErro]=useState('');
  const [loading,setLoading]=useState(false);
  async function submit(e){ e.preventDefault(); setErro(''); setLoading(true);
    try{
      if(email&&senha){
        const r = await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
        const data = await r.json();
        if(!r.ok) throw new Error(data.error||'Credenciais inv√°lidas.');
        localStorage.setItem('erp_access', data.access_token);
        localStorage.setItem('erp_refresh', data.refresh_token);
        localStorage.setItem('erp_user', JSON.stringify(data.usuario));
        onLogin(data.usuario);
      } else setErro('Preencha e-mail e senha.');
    }catch(err){setErro(err.message);}finally{setLoading(false);}
  }
  return <div className="login-wrap"><div className="login-card">
    <div className="login-logo"><div style={{fontSize:48}}>√É¬Ę√Ö¬°√ā¬Ĺ</div><h1>ERP SAF</h1><p>M√É¬É√ā¬≥dulo Financeiro</p></div>
    {erro&&<div className="login-erro">√É¬Ę√Ö¬°√ā¬†√É¬Į√ā¬ł√ā¬Ź {erro}</div>}
    <form onSubmit={submit}>
      <div className="login-grupo"><label className="login-label">E-mail</label><input className="login-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
      <div className="login-grupo"><label className="login-label">Senha</label><input className="login-input" type="password" value={senha} onChange={e=>setSenha(e.target.value)} required/></div>
      <button className="login-btn" disabled={loading}>{loading?'Entrando...':'Entrar'}</button>
    </form>
  </div></div>;
}

function GraficoFluxo({dados}){
  if(!dados.length) return null;
  const maxVal = Math.max(...dados.flatMap(d=>[d.receitas,d.despesas]),1);
  const pct = v => Math.max(4, Math.round((v/maxVal)*140));
  const fmtK = v => v>=1000000 ? (v/1000000).toFixed(1)+'M' : v>=1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0);
  return(
    <div className="grafico-wrap">
      <div className="grafico-titulo">
        Fluxo de Caixa √É¬Ę√Ę¬ā¬¨√Ę¬Ä¬Ě √É¬É√Ö¬°ltimos 6 Meses
        <div className="grafico-legenda">
          <span className="legenda-item"><span className="legenda-dot" style={{background:'#16A34A'}}/> Receitas</span>
          <span className="legenda-item"><span className="legenda-dot" style={{background:'#c0392b'}}/> Despesas</span>
        </div>
      </div>
      <div className="barras">
        {dados.map(d=>(
          <div className="barra-grupo" key={d.mes}>
            <div className="barra-container">
              <div className="barra barra-receita" style={{height:pct(d.receitas)+'px'}} title={fmtMoeda(d.receitas)}>
                <div className="barra-valor">{fmtK(d.receitas)}</div>
              </div>
              <div className="barra barra-despesa" style={{height:pct(d.despesas)+'px'}} title={fmtMoeda(d.despesas)}>
                <div className="barra-valor">{fmtK(d.despesas)}</div>
              </div>
            </div>
            <div className="barra-label">{d.label}</div>
          </div>
        ))}
      </div>
      <div className="saldo-linha">
        {dados.map(d=>(
          <div key={d.mes} className={`saldo-mes ${d.saldo>=0?'saldo-positivo':'saldo-negativo'}`}>
            {d.saldo>=0?'+':''}{fmtK(d.saldo)}
          </div>
        ))}
      </div>
    </div>
  );
}

function ModuloFinanceiro(){
  const [lancamentos, setLancamentos] = useState(DEMO_LANCAMENTOS);
  const [resumo]    = useState(DEMO_RESUMO);
  const [fluxo]     = useState(DEMO_FLUXO);
  const [categorias]= useState(DEMO_CATEGORIAS);
  const [centros]   = useState(DEMO_CENTROS);
  const [contas]    = useState(DEMO_CONTAS);

  const [filtroTipo,   setFiltroTipo]   = useState('');
  const [filtroStatus, setFiltroStatus] = useState('');
  const [filtroCat,    setFiltroCat]    = useState('');
  const [busca,        setBusca]        = useState('');
  const [pagina,       setPagina]       = useState(1);
  const [modalForm,    setModalForm]    = useState(null);
  const [modalDetalhe, setModalDetalhe] = useState(null);
  const LIMITE = 10;

  const filtrados = lancamentos.filter(l=>{
    const okBusca  = !busca        || l.descricao.toLowerCase().includes(busca.toLowerCase());
    const okTipo   = !filtroTipo   || l.tipo===filtroTipo;
    const okStatus = !filtroStatus || l.status===filtroStatus;
    const okCat    = !filtroCat    || l.categoria===categorias.find(c=>c.id==filtroCat)?.nome;
    return okBusca&&okTipo&&okStatus&&okCat;
  }).sort((a,b)=>b.data_competencia.localeCompare(a.data_competencia));

  const totalPags = Math.ceil(filtrados.length/LIMITE);
  const paginados = filtrados.slice((pagina-1)*LIMITE, pagina*LIMITE);

  function salvar(payload, editando){
    const cat = categorias.find(c=>c.id==payload.categoria_id)||{};
    if(editando){
      setLancamentos(prev=>prev.map(l=>l.id===payload.id?{...l,...payload,categoria:cat.nome,categoria_icone:cat.icone,categoria_cor:cat.cor}:l));
    } else {
      const novo={...payload,id:Date.now(),categoria:cat.nome,categoria_icone:cat.icone,categoria_cor:cat.cor,centro_custo:centros.find(c=>c.id==payload.centro_custo_id)?.nome||'',conta_bancaria:contas.find(c=>c.id==payload.conta_bancaria_id)?.nome||''};
      setLancamentos(prev=>[novo,...prev]);
    }
  }

  function realizarLancamento(lanc){
    setLancamentos(prev=>prev.map(l=>l.id===lanc.id?{...l,status:'realizado',data_pagamento:new Date().toISOString().slice(0,10)}:l));
    setModalDetalhe(null);
    toast('Lan√É¬É√ā¬ßamento confirmado como realizado!');
  }

  const varReceitas = resumo.mes_atual.receitas - resumo.mes_anterior.receitas;
  const varDespesas = resumo.mes_atual.despesas - resumo.mes_anterior.despesas;
  const pct = (v,ref) => ref===0?0:((v-ref)/ref*100).toFixed(1);

  return(
    <div className="page">
      <div className="page-header">
        <div>
