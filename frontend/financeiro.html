<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP SAF — Financeiro</title>
  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:          #141414;
      --sidebar-bg:  #1a1a1a;
      --card-bg:     #242424;
      --card-borda:  #363636;
      --input-bg:    #1f1f1f;
      --verde:       #22C55E;
      --verde-med:   #16A34A;
      --verde-dark:  #15803D;
      --vermelho:    #FF5C5C;
      --dourado:     #D4A017;
      --dourado-vivo:#F0B429;
      --azul:        #3B82F6;
      --azul-dark:   #1D4ED8;
      --texto:       #F0F0F0;
      --texto-leve:  #9CA3AF;
      --roxo:        #8B5CF6;
      --laranja:     #F97316;
      --cinza:       #2e2e2e;
      --danger:      #EF4444;
      --warning:     #F59E0B;
      --info:        #3B82F6;
      --verde-bg:    rgba(34,197,94,.1);
      --sombra:      0 2px 8px rgba(0,0,0,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: 240px; min-height: 100vh; background: var(--sidebar-bg); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,.15); display: flex; align-items: center; gap: 10px; }
    .sidebar-logo .icon { font-size: 28px; }
    .sidebar-logo .title { color: var(--texto); font-size: 14px; font-weight: 700; line-height: 1.3; }
    .sidebar-logo .sub { color: rgba(255,255,255,.7); font-size: 11px; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-label { color: rgba(255,255,255,.5); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 12px 16px 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: rgba(255,255,255,.8); font-size: 13px; text-decoration: none; transition: all .15s; border-left: 3px solid transparent; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,.1); color: var(--texto); }
    .nav-item.ativo { background: rgba(255,255,255,.15); color: var(--texto); border-left-color: var(--texto); font-weight: 600; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.15); }
    .usuario-info { display: flex; align-items: center; gap: 8px; }
    .usuario-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--texto); }
    .usuario-nome { color: var(--texto); font-size: 12px; font-weight: 600; }
    .usuario-cargo { color: rgba(255,255,255,.6); font-size: 11px; }

    /* MAIN */
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .topbar { background: var(--texto); border-bottom: 1px solid var(--cinza-borda); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--sombra); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; color: var(--texto); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; transition: all .15s; line-height: 1; }
    .btn-primary { background: var(--verde-med); color: var(--texto); }
    .btn-primary:hover { background: var(--verde); }
    .btn-receita { background: #16A34A; color: #22C55E; }
    .btn-receita:hover { background: #c3e6cb; }
    .btn-despesa { background: #f8d7da; color: #721c24; }
    .btn-despesa:hover { background: #f5c6cb; }
    .btn-secondary { background: var(--texto); color: var(--texto); border: 1px solid var(--cinza-borda); }
    .btn-secondary:hover { background: var(--cinza); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-link { background: none; border: none; color: var(--verde-med); font-size: 13px; padding: 4px; text-decoration: underline; }

    /* PAGE */
    .page { padding: 24px; flex: 1; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-titulo { font-size: 22px; font-weight: 700; color: var(--texto); }
    .page-sub { font-size: 13px; color: var(--texto-leve); margin-top: 2px; }
    .page-header-actions { display: flex; gap: 10px; }

    /* CARDS RESUMO */
    .cards-resumo { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .card { background: var(--card-bg); border-radius: 10px; padding: 18px 20px; box-shadow: var(--sombra); }
    .card-kpi { display: flex; align-items: flex-start; justify-content: space-between; }
    .card-kpi .icon { font-size: 28px; }
    .card-kpi .valor { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .card-kpi .label { font-size: 12px; color: var(--texto-leve); font-weight: 500; margin-top: 2px; }
    .card-kpi .variacao { font-size: 11px; margin-top: 4px; font-weight: 600; }
    .positivo { color: var(--receita); }
    .negativo { color: var(--despesa); }
    .card.borda-verde  { border-left: 4px solid var(--receita); }
    .card.borda-vermelho { border-left: 4px solid var(--despesa); }
    .card.borda-azul   { border-left: 4px solid var(--info); }
    .card.borda-laranja { border-left: 4px solid var(--warning); }

    /* GRÁFICO DE BARRAS */
    .grafico-wrap { background: #252540; border-radius: 10px; padding: 20px; box-shadow: var(--sombra); margin-bottom: 20px; }
    .grafico-titulo { font-size: 15px; font-weight: 700; color: var(--texto); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .grafico-legenda { display: flex; gap: 16px; font-size: 12px; }
    .legenda-item { display: flex; align-items: center; gap: 5px; }
    .legenda-dot { width: 10px; height: 10px; border-radius: 50%; }
    .barras { display: flex; gap: 12px; align-items: flex-end; height: 180px; }
    .barra-grupo { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .barra-container { display: flex; gap: 3px; align-items: flex-end; width: 100%; height: 160px; }
    .barra { border-radius: 4px 4px 0 0; flex: 1; min-width: 0; transition: opacity .2s; position: relative; }
    .barra:hover { opacity: .8; }
    .barra-receita { background: #16A34A; }
    .barra-despesa { background: #c0392b; }
    .barra-label { font-size: 10px; color: var(--texto-leve); text-align: center; white-space: nowrap; }
    .barra-valor { font-size: 9px; color: #252540; text-align: center; padding: 2px; word-break: break-all; }
    .saldo-linha { display: flex; gap: 12px; margin-top: 8px; }
    .saldo-mes { flex: 1; text-align: center; font-size: 11px; font-weight: 700; padding: 3px; border-radius: 4px; }
    .saldo-positivo { background: #16A34A; color: #22C55E; }
    .saldo-negativo { background: #f8d7da; color: #721c24; }

    /* FILTROS */
    .filtros { background: #252540; border-radius: 10px; padding: 14px 18px; box-shadow: var(--sombra); margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filtros input, .filtros select { padding: 7px 11px; border: 1px solid var(--cinza-borda); border-radius: 6px; font-size: 13px; color: var(--texto); background: #252540; outline: none; }
    .filtros input:focus, .filtros select:focus { border-color: var(--verde-med); }
    .filtros input[type=search] { width: 220px; }
    .filtros input[type=date]   { width: 145px; }
    .filtros select { min-width: 140px; }
    .filtro-tipo-btns { display: flex; gap: 4px; }
    .filtro-tipo-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--cinza-borda); font-size: 12px; font-weight: 600; background: #252540; color: var(--texto-leve); }
    .filtro-tipo-btn.ativo-receita { background: #16A34A; color: #22C55E; border-color: #16A34A; }
    .filtro-tipo-btn.ativo-despesa { background: #f8d7da; color: #721c24; border-color: #c0392b; }
    .filtro-tipo-btn.ativo-todos   { background: var(--cinza); color: var(--texto); border-color: var(--cinza-borda); }

    /* TABELA */
    .tabela-wrap { background: #252540; border-radius: 10px; box-shadow: var(--sombra); overflow: hidden; }
    .tabela-header { padding: 14px 18px; border-bottom: 1px solid var(--cinza-borda); display: flex; align-items: center; justify-content: space-between; }
    .tabela-header-titulo { font-size: 14px; font-weight: 700; color: var(--texto); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f7f9fc; }
    th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--texto-leve); border-bottom: 1px solid var(--cinza-borda); white-space: nowrap; }
    td { padding: 12px 14px; font-size: 13px; color: var(--texto); border-bottom: 1px solid #1C1C2E; vertical-align: middle; }
    tr:hover td { background: #fafbff; }
    tr:last-child td { border-bottom: none; }
    .valor-receita { color: var(--receita); font-weight: 700; }
    .valor-despesa { color: var(--despesa); font-weight: 700; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-realizado { background: #16A34A; color: #22C55E; }
    .badge-previsto  { background: #2525403cd; color: #856404; }
    .badge-cancelado { background: #e2e3e5; color: #495057; text-decoration: line-through; }
    .cat-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

    /* PAGINAÇÃO */
    .paginacao { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-top: 1px solid var(--cinza-borda); font-size: 13px; color: var(--texto-leve); }
    .paginacao-btns { display: flex; gap: 5px; }
    .paginacao-btns button { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--cinza-borda); background: #252540; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .paginacao-btns button.ativo { background: var(--verde-med); color: #252540; border-color: var(--verde-med); }
    .paginacao-btns button:hover:not(.ativo):not(:disabled) { background: var(--cinza); }
    .paginacao-btns button:disabled { opacity: .4; cursor: not-allowed; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .btn-import { background: var(--card-bg); border: 1px solid var(--card-borda); color: var(--texto); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
    .btn-import:hover { background: var(--card-borda); }
    .btn-template { background: transparent; border: 1px solid var(--dourado); color: var(--dourado); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
    .btn-template:hover { background: rgba(245,158,11,.12); }
    .import-drop { border: 2px dashed var(--card-borda); border-radius: 10px; padding: 32px 20px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; background: var(--bg); }
    .import-drop:hover, .import-drop.drag-over { border-color: var(--verde); background: rgba(34,197,94,.06); }
    .import-drop input { display: none; }
    .import-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .import-table th { background: var(--card-borda); color: var(--texto-leve); padding: 7px 10px; text-align: left; font-weight: 600; }
    .import-table td { padding: 6px 10px; border-bottom: 1px solid var(--card-borda); color: var(--texto); }
    .import-table tr.erro td { color: var(--vermelho); background: rgba(255,92,92,.07); }
    .import-table tr.receita td:first-child { color: var(--verde); font-weight: 700; }
    .import-table tr.despesa td:first-child { color: var(--vermelho); font-weight: 700; }
    .import-resumo { display: flex; gap: 12px; margin-bottom: 14px; }
    .import-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .import-badge.ok { background: rgba(34,197,94,.15); color: var(--verde); }
    .import-badge.err { background: rgba(255,92,92,.15); color: var(--vermelho); }
    .modal-import { max-width: 860px; }
    .modal { background: #252540; border-radius: 12px; width: 100%; max-width: 620px; max-height: 92vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .modal-header { padding: 18px 22px; border-bottom: 1px solid var(--cinza-borda); display: flex; align-items: center; justify-content: space-between; }
    .modal-titulo { font-size: 16px; font-weight: 700; color: var(--texto); }
    .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid var(--cinza-borda); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-fechar { width: 28px; height: 28px; border-radius: 6px; border: none; background: #f0f0f0; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #888; }
    .btn-fechar:hover { background: #ddd; }

    /* FORM */
    .tipo-selector { display: flex; gap: 10px; margin-bottom: 18px; }
    .tipo-btn { flex: 1; padding: 14px; border-radius: 8px; border: 2px solid var(--cinza-borda); background: #252540; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; }
    .tipo-btn.sel-receita { border-color: #16A34A; background: #16A34A; color: #22C55E; }
    .tipo-btn.sel-despesa { border-color: #c0392b; background: #f8d7da; color: #721c24; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grupo { display: flex; flex-direction: column; gap: 5px; }
    .form-grupo.span-2 { grid-column: span 2; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--texto-leve); text-transform: uppercase; letter-spacing: .04em; }
    .form-label .obrig { color: var(--danger); }
    .form-input, .form-select, .form-textarea { padding: 9px 12px; border: 1px solid var(--cinza-borda); border-radius: 6px; font-size: 13px; color: var(--texto); outline: none; width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--verde-med); box-shadow: 0 0 0 3px rgba(30,132,73,.1); }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-section-titulo { font-size: 11px; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 10px; padding-bottom: 5px; border-bottom: 2px solid #16A34A; }

    /* LOADING / EMPTY */
    .loading { display: flex; align-items: center; justify-content: center; padding: 50px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--cinza-borda); border-top-color: var(--verde-med); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vazio { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; color: var(--texto-leve); gap: 10px; }
    .vazio .icon { font-size: 44px; }

    /* TOAST */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 11px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.15); max-width: 340px; animation: slideIn .2s ease; }
    .toast.sucesso { background: #22C55E; color: #252540; }
    .toast.erro    { background: #721c24; color: #f8d7da; }
    .toast.aviso   { background: #F59E0B; color: #252540; }
    @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0d4f1e 0%, #16A34A 100%); }
    .login-card { background: #252540; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--verde); margin-top: 8px; }
    .login-logo p { font-size: 13px; color: var(--texto-leve); }
    .login-grupo { margin-bottom: 14px; }
    .login-label { display: block; font-size: 11px; font-weight: 700; color: var(--texto-leve); margin-bottom: 5px; text-transform: uppercase; }
    .login-input { width: 100%; padding: 9px 13px; border: 1.5px solid var(--cinza-borda); border-radius: 7px; font-size: 14px; outline: none; }
    .login-input:focus { border-color: var(--verde-med); }
    .login-btn { width: 100%; padding: 11px; background: var(--verde-med); color: #252540; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; margin-top: 6px; }
    .login-btn:hover { background: var(--verde); }
    .login-erro { background: #f8d7da; color: #721c24; border-radius: 6px; padding: 9px 12px; font-size: 13px; margin-bottom: 12px; }

    /* DETALHE MODAL */
    .detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detalhe-item { padding: 10px 14px; background: #252540; border-radius: 7px; border: 1px solid var(--cinza-borda); }
    .detalhe-item-label { font-size: 10px; font-weight: 700; color: var(--texto-leve); text-transform: uppercase; margin-bottom: 3px; }
    .detalhe-item-valor { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = (window.ERP_CONFIG && window.ERP_CONFIG.API_URL) || 'http://localhost:3001/api';

// ── helpers ──────────────────────────────────────────────────
function fmtMoeda(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); }
function fmtData(d)  { if(!d)return'—'; return new Date(d+'T00:00:00').toLocaleDateString('pt-BR'); }
function iniciais(n) { return (n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase(); }

async function apiFetch(path, opts={}) {
  const token = localStorage.getItem('erp_access');
  const res = await fetch(API+path,{
    headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})},
    ...opts, body:opts.body?JSON.stringify(opts.body):undefined,
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.erro||'Erro desconhecido');
  return data;
}

let _setToasts=null;
function Toast({toasts}){ return <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.tipo}`}>{t.msg}</div>)}</div>; }
function useToast(){ const [toasts,setToasts]=useState([]); _setToasts=setToasts; return toasts; }
function toast(msg,tipo='sucesso'){ if(!_setToasts)return; const id=Date.now(); _setToasts(p=>[...p,{id,msg,tipo}]); setTimeout(()=>_setToasts(p=>p.filter(t=>t.id!==id)),4000); }

// ── Login ────────────────────────────────────────────────────
function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  const [erro,setErro]=useState('');
  const [loading,setLoading]=useState(false);
  async function submit(e){ e.preventDefault(); setErro(''); setLoading(true);
    try{
      if(email&&senha){
        const u={nome:'Administrador',cargo:'CEO',perfil:'admin'};
        localStorage.setItem('erp_access','demo_token');
        localStorage.setItem('erp_user',JSON.stringify(u));
        onLogin(u);
      } else setErro('Preencha e-mail e senha.');
    }catch(err){setErro(err.message);}finally{setLoading(false);}
  }
  return <div className="login-wrap"><div className="login-card">
    <div className="login-logo"><div style={{fontSize:48}}>⚽</div><h1>ERP SAF</h1><p>Módulo Financeiro</p></div>
    {erro&&<div className="login-erro">⚠️ {erro}</div>}
    <form onSubmit={submit}>
      <div className="login-grupo"><label className="login-label">E-mail</label><input className="login-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/></div>

    </form>
  </div></div>;
}

// ── Gráfico de barras simples ────────────────────────────────
function GraficoFluxo({dados}){
  if(!dados.length) return null;
  const maxVal = Math.max(...dados.flatMap(d=>[d.receitas,d.despesas]),1);
  const pct = v => Math.max(4, Math.round((v/maxVal)*140));
  const fmtK = v => v>=1000000 ? (v/1000000).toFixed(1)+'M' : v>=1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0);
  return(
    <div className="grafico-wrap">
      <div className="grafico-titulo">
        Fluxo de Caixa — Últimos 6 Meses
        <div className="grafico-legenda">
          <span className="legenda-item"><span className="legenda-dot" style={{background:'#1e8449'}}/> Receitas</span>
          <span className="legenda-item"><span className="legenda-dot" style={{background:'#c0392b'}}/> Despesas</span>
        </div>
      </div>
      <div className="barras">
        {dados.map(d=>(
          <div className="barra-grupo" key={d.mes}>
            <div className="barra-container">
              <div className="barra barra-receita" style={{height:pct(d.receitas)+'px'}} title={fmtMoeda(d.receitas)}>
                <div className="barra-valor">{fmtK(d.receitas)}</div>
              </div>
              <div className="barra barra-despesa" style={{height:pct(d.despesas)+'px'}} title={fmtMoeda(d.despesas)}>
                <div className="barra-valor">{fmtK(d.despesas)}</div>
              </div>
            </div>
            <div className="barra-label">{d.label}</div>
          </div>
        ))}
      </div>
      <div className="saldo-linha">
        {dados.map(d=>(
          <div key={d.mes} className={`saldo-mes ${d.saldo>=0?'saldo-positivo':'saldo-negativo'}`}>
            {d.saldo>=0?'+':''}{fmtK(d.saldo)}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Auto-geração de folha de pagamento ────────────────────────
function gerarFolhaMensal(atletasArr, mesRef){
  if(!atletasArr||!atletasArr.length) return [];
  const [ano, mes] = mesRef.split('-').map(Number);
  const ultimoDia = new Date(ano, mes, 0).getDate();
  const dataComp = `${mesRef}-${String(ultimoDia).padStart(2,'0')}`;
  const mm = String(mes).padStart(2,'0');
  const entries = [];
  atletasArr.forEach(a=>{
    if(a.contrato_fim){
      try{
        const fim = new Date(a.contrato_fim+'T12:00:00');
        if(fim < new Date(ano, mes-1, 1)) return;
      }catch(e){}
    }
    const isFormacao = a.contrato_tipo==='formacao';
    if((a.salario_bruto||0)>0){
      entries.push({
        id:`auto_sal_${a.id}_${mesRef}`, tipo:'despesa',
        descricao:`Salário – ${a.nome_guerra||a.nome} (${mm}/${ano})`,
        valor:a.salario_bruto,
        categoria:isFormacao?'Contratos PJ':'Salários CLT',
        categoria_icone:isFormacao?'📋':'👔', categoria_cor:'#c0392b',
        status:'previsto', data_competencia:dataComp, data_pagamento:null,
        centro_custo:'Futebol Profissional',
        auto_gerado:true, atleta_id:a.id, mes_referencia:mesRef
      });
    }
    if((a.direitos_imagem||0)>0){
      entries.push({
        id:`auto_di_${a.id}_${mesRef}`, tipo:'despesa',
        descricao:`Dir. Imagem – ${a.nome_guerra||a.nome} (${mm}/${ano})`,
        valor:a.direitos_imagem,
        categoria:'Contratos PJ', categoria_icone:'📋', categoria_cor:'#e74c3c',
        status:'previsto', data_competencia:dataComp, data_pagamento:null,
        centro_custo:'Futebol Profissional',
        auto_gerado:true, atleta_id:a.id, mes_referencia:mesRef
      });
    }
  });
  return entries;
}

// ── Módulo Financeiro ─────────────────────────────────────────
function ModuloFinanceiro(){
  const [lancamentos, setLancamentos] = useState(DEMO_LANCAMENTOS);
  const [resumo,      setResumo]      = useState(DEMO_RESUMO);
  const [fluxo,       setFluxo]       = useState(DEMO_FLUXO);
  const [categorias,  setCategorias]  = useState(DEMO_CATEGORIAS);
  const [centros,     setCentros]     = useState(DEMO_CENTROS);
  const [contas,      setContas]      = useState(DEMO_CONTAS);
  const [carregando,  setCarregando]  = useState(false);

  // ── Carregar dados reais da API (fallback para DEMO em caso de erro) ──
  useEffect(()=>{
    let ativo = true;
    async function carregar(){
      setCarregando(true);
      try{
        const [rLanc, rRes, rCats, rCentros, rContas] = await Promise.allSettled([
          apiFetch('/financeiro/lancamentos?limite=200'),
          apiFetch('/financeiro/resumo'),
          apiFetch('/financeiro/categorias'),
          apiFetch('/financeiro/centros-custo'),
          apiFetch('/financeiro/contas-bancarias'),
        ]);
        if(!ativo) return;
        if(rLanc.status==='fulfilled' && Array.isArray(rLanc.value.dados) && rLanc.value.dados.length){
          setLancamentos(rLanc.value.dados);
        } else {
          try{
            const d=new Date(); const mesRef=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            const raw=localStorage.getItem('erp_atletas');
            if(raw){ const novos=gerarFolhaMensal(JSON.parse(raw),mesRef); setLancamentos([...novos,...DEMO_LANCAMENTOS]); }
          }catch(e){}
        }
        if(rRes.status==='fulfilled' && rRes.value && rRes.value.mes_atual) setResumo(rRes.value);
        if(rCats.status==='fulfilled' && Array.isArray(rCats.value) && rCats.value.length) setCategorias(rCats.value);
        if(rCentros.status==='fulfilled' && Array.isArray(rCentros.value) && rCentros.value.length) setCentros(rCentros.value);
        if(rContas.status==='fulfilled' && Array.isArray(rContas.value) && rContas.value.length) setContas(rContas.value);
      }catch(e){
        console.warn('[Financeiro] usando dados demo:', e.message);
      }finally{
        if(ativo) setCarregando(false);
      }
    }
    carregar();
    return ()=>{ ativo=false; };
  },[]);
  const [filtroTipo,   setFiltroTipo]   = useState('');

  function parseDateBR(val){
    if(!val) return null;
    const s = String(val).trim();
    const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // Excel serial date
    if(!isNaN(Number(s))){
      const d = new Date(Math.round((Number(s)-25569)*86400*1000));
      return d.toISOString().slice(0,10);
    }
    return null;
  }

      ['categoria','Patrocínio | Bilheteria | Salários CLT | Contratos PJ | etc.'],
      ['status','"realizado" ou "previsto"'],
      ['data_competencia','DD/MM/AAAA (ex: 15/03/2026)'],

      ['receita','Bilheteria – Rodada 1',31000,'Bilheteria','realizado','08/03/2026','08/03/2026','Futebol Profissional'],
      ['despesa','Folha de pagamento CLT – Março',198000,'Salários CLT','previsto','31/03/2026','','Administrativo'],
      ['despesa','Aluguel e manutenção CT',18000,'Aluguel e Infraestrutura','realizado','05/03/2026','05/03/2026','Infraestrutura'],

    const ws = XLSX.utils.aoa_to_sheet([headers,...examples]);

    XLSX.utils.book_append_sheet(wb, ws, 'Lancamentos');

    const wsCat = XLSX.utils.aoa_to_sheet(catData);

  function handleImportFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = window.XLSX.read(data, {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.find(s=>s.toLowerCase().includes('lan')) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = window.XLSX.utils.sheet_to_json(ws, {defval:''});
        const validos = [], erros = [];
        rows.forEach((row, idx) => {
          const tipo = String(row.tipo||'').toLowerCase().trim();
          const descricao = String(row.descricao||'').trim();
          const valorRaw = String(row.valor||'').replace(/[R$\s.]/g,'').replace(',','.');
          const valor = parseFloat(valorRaw);
          const categoriaStr = String(row.categoria||'').trim();
          const status = String(row.status||'previsto').toLowerCase().trim();
          const dataComp = parseDateBR(row.data_competencia);
          const dataPag = parseDateBR(row.data_pagamento)||null;
          const centro = String(row.centro_custo||'').trim();
          const erroRow = [];
          if(!['receita','despesa'].includes(tipo)) erroRow.push('tipo inválido');
          if(!descricao) erroRow.push('sem descrição');
          if(isNaN(valor)||valor<=0) erroRow.push('valor inválido');
          if(!dataComp) erroRow.push('data de competência inválida');
          if(erroRow.length>0){
            erros.push({linha:idx+2, descricao:descricao||'(vazio)', erro:erroRow.join(', ')});
          } else {
            const cat = categorias.find(c=>c.nome&&c.nome.toLowerCase()===categoriaStr.toLowerCase())||{};
            const cc  = centros.find(c=>c.nome&&c.nome.toLowerCase()===centro.toLowerCase())||{};
            validos.push({id:Date.now()+idx+Math.random(), tipo, descricao, valor,
              categoria_id: cat.id||null,
              categoria:cat.nome||categoriaStr, categoria_icone:cat.icone||'📌',
              categoria_cor:cat.cor||'#94A3B8',
              centro_custo_id: cc.id||null, status,
              data_competencia:dataComp, data_pagamento:dataPag, centro_custo:centro});
          }
        });
        setImportRows(validos);
        setImportErros(erros);
        setModalImport(true);
      } catch(err) {
        toast('Erro ao ler o arquivo. Verifique se é um .xlsx válido.', 'erro');
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  }

  async function confirmarImport(){
    setModalImport(false);
    let ok=0, falha=0, semCat=0;
    for(const row of importRows){
      try{
        if(!row.categoria_id){ semCat++; falha++; continue; }
        const payload={
          tipo:            row.tipo,
          descricao:       row.descricao,
          valor:           row.valor,
          categoria_id:    row.categoria_id,
          centro_custo_id: row.centro_custo_id||null,
          status:          row.status,
          data_competencia:row.data_competencia,
          data_pagamento:  row.data_pagamento||null,
          observacoes:     row.observacoes||'',
          origem_tipo:     'importacao_excel',
        };
        const r = await apiFetch('/financeiro/lancamentos', {method:'POST', body:payload});
        const novo = r.lancamento||{...payload, id:Date.now()+ok};
        setLancamentos(prev=>[novo,...prev]);
        ok++;
      }catch(e){
        falha++;
      }
    }
    setImportRows([]);
    setImportErros([]);
    if(falha===0){
      toast('✅ '+ok+' lançamento(s) importado(s) com sucesso!');
    } else {
      const aviso = semCat>0 ? ' ('+semCat+' sem categoria cadastrada)' : '';
      toast('⚠️ '+ok+' importado(s), '+falha+' com erro'+aviso+'.', 'aviso');
    }
  }

  // ── Extrato Bancário (OFX / CSV / PDF) ───────────────────
  async function abrirModalExtrato() {
    try {
      const d = await apiFetch('/extrato/aux/categorias');
      setCategoriasAPI(d.categorias || []);
      setContasAPI(d.contas || []);
    } catch(e) {
      setCategoriasAPI([]); setContasAPI([]);
    }
    setModalExtrato('upload');
  }

  async function handleUploadExtrato(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['ofx','qif','csv','pdf'].includes(ext)) {
      toast('Formato inválido. Use OFX, CSV ou PDF.', 'erro'); return;
    }
    setProcessando(true);
    try {
      const token = localStorage.getItem('erp_access');
      const fd = new FormData();
      fd.append('arquivo', file);
      if (contaSelecionada) fd.append('conta_bancaria_id', contaSelecionada);
      const res = await fetch(API + '/extrato/upload', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
        body: fd,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.erro || 'Erro no upload');
      setImportacaoAtiva(data.importacao);
      // Pré-preencher categoria_id com a sugerida
      setLancamentosRev((data.lancamentos || []).map(l => ({
        ...l,
        categoria_id: l.categoria_id || l.categoria_sugerida_id,
      })));
      setModalExtrato('revisao');
    } catch(err) {
      toast('Erro: ' + err.message, 'erro');
    } finally {
      setProcessando(false);
      if (extratoInputRef.current) extratoInputRef.current.value = '';
    }
  }

  function atualizarLancamentoRev(id, campo, valor) {
    setLancamentosRev(prev => prev.map(l => l.id === id ? { ...l, [campo]: valor } : l));
  }

  function marcarTodos(status) {
    setLancamentosRev(prev => prev.map(l => ({ ...l, status })));
  }

  async function confirmarExtrato() {
    if (!importacaoAtiva) return;
    setProcessando(true);
    try {
      // 1. Salvar alterações de categoria/status em bulk
      const atualizacoes = lancamentosRev.map(l => ({
        id: l.id, categoria_id: l.categoria_id, status: l.status,
      }));
      await apiFetch(`/extrato/${importacaoAtiva.id}/lancamentos/bulk`, {
        method: 'PUT', body: { atualizacoes },
      });
      // 2. Confirmar — cria lançamentos financeiros
      const result = await apiFetch(`/extrato/${importacaoAtiva.id}/confirmar`, { method: 'POST' });
      toast(`✅ ${result.total_confirmados} lançamentos confirmados e registrados no financeiro!`);
      setModalExtrato(null);
      setImportacaoAtiva(null);
      setLancamentosRev([]);
    } catch(err) {
      toast('Erro ao confirmar: ' + err.message, 'erro');
    } finally {
      setProcessando(false);
    }
  }

  function sincronizarFolha(){
    const d=new Date(); const mesRef=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const raw=localStorage.getItem('erp_atletas');
    if(!raw){ toast('⚠️ Abra o módulo Atletas primeiro para carregar os dados'); return; }
    try{
      const novos=gerarFolhaMensal(JSON.parse(raw),mesRef);
      setLancamentos(prev=>{
        const base=prev.filter(l=>!(l.auto_gerado&&l.mes_referencia===mesRef));
        return [...novos,...base];
      });
      toast(`🔄 Folha ${mesRef.slice(5,7)}/${mesRef.slice(0,4)}: ${novos.length} lançamentos sincronizados`);
    }catch(e){ toast('Erro ao sincronizar folha'); }
  }

    const okCat    = !filtroCat    || l.categoria===categorias.find(c=>c.id==filtroCat)?.nome;
    return okBusca&&okTipo&&okStatus&&okCat;

  const totalPags = Math.ceil(filtrados.length/LIMITE);
  const paginados = filtrados.slice((pagina-1)*LIMITE, pagina*LIMITE);

async function salvar(payload, editando){

      setLancamentos(prev=>prev.map(l=>l.id===payload.id ? atualizado : l));

      setLancamentos(prev=>[novo, ...prev]);
    }
    toast('Lançamento salvo com sucesso!');
    setModalNovoLancamento(null);
  } catch(e) {
    toast('Erro ao salvar: ' + (e.message||'verifique a conexão'), 'erro');
  }
}

        <ModalLancamento
          lancamento={modalForm.id?modalForm:null}
          categorias={categorias} centros={centros} contas={contas}
          onSalvar={salvar} onFechar={()=>setModalForm(null)}
        />
      )}
      {modalDetalhe&&(
        <ModalDetalhe
          lanc={modalDetalhe}
          onFechar={()=>setModalDetalhe(null)}
          onEditar={l=>{setModalForm(l);setModalDetalhe(null);}}
          onRealizar={realizarLancamento}
        />
      )}

      {modalImport&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setModalImport(false);setImportRows([]);setImportErros([]);}}}>
          <div className="modal modal-import">
            <div className="modal-header">
              <span className="modal-titulo">📤 Importar Lançamentos via Excel</span>
              <button className="btn-fechar" onClick={()=>{setModalImport(false);setImportRows([]);setImportErros([]);}}>✕</button>
            </div>
            <div className="modal-body" style={{overflowY:'auto',maxHeight:'70vh'}}>
              <div className="import-resumo">
                <span className="import-badge ok">✅ {importRows.length} válido{importRows.length!==1?'s':''}</span>
                {importErros.length>0&&<span className="import-badge err">⚠️ {importErros.length} com erro</span>}
              </div>

              {importRows.length>0&&(
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,color:'var(--texto-leve)',fontWeight:600,marginBottom:8}}>LANÇAMENTOS A IMPORTAR</div>
                  <div style={{overflowX:'auto'}}>
                    <table className="import-table">
                      <thead><tr>
                        <th>Tipo</th><th>Descrição</th><th>Valor</th><th>Categoria</th>
                        <th>Status</th><th>Data Comp.</th><th>Centro</th>
                      </tr></thead>
                      <tbody>
                        {importRows.map((r,i)=>(
                          <tr key={i} className={r.tipo}>
                            <td style={{color:r.tipo==='receita'?'var(--verde)':'var(--vermelho)',fontWeight:700}}>{r.tipo==='receita'?'⬆️ receita':'⬇️ despesa'}</td>
                            <td>{r.descricao}</td>
                            <td style={{textAlign:'right',fontFamily:'monospace'}}>{fmtMoeda(r.valor)}</td>
                            <td>{r.categoria}</td>
                            <td><span style={{background:r.status==='realizado'?'rgba(34,197,94,.15)':'rgba(245,158,11,.15)',color:r.status==='realizado'?'var(--verde)':'var(--dourado)',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:700}}>{r.status}</span></td>
                            <td>{fmtData(r.data_competencia)}</td>
                            <td>{r.centro_custo||'—'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {importErros.length>0&&(
                <div>
                  <div style={{fontSize:12,color:'var(--vermelho)',fontWeight:600,marginBottom:8}}>LINHAS COM ERRO (não serão importadas)</div>
                  <table className="import-table">
                    <thead><tr><th>Linha</th><th>Descrição</th><th>Problema</th></tr></thead>
                    <tbody>
                      {importErros.map((e,i)=>(
                        <tr key={i} className="erro">
                          <td>{e.linha}</td><td>{e.descricao}</td><td>{e.erro}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {importRows.length===0&&importErros.length===0&&(
                <div style={{textAlign:'center',padding:'40px 0',color:'var(--texto-leve)'}}>
                  Nenhum lançamento encontrado no arquivo. Verifique se usou a aba "Lancamentos".
                </div>
              )}
            </div>
            <div className="modal-footer" style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn-import" onClick={()=>{setModalImport(false);setImportRows([]);setImportErros([]);}}>Cancelar</button>
              {importRows.length>0&&(
                <button className="btn btn-receita" style={{background:'var(--verde)',color:'#111'}} onClick={confirmarImport}>
                  ✅ Importar {importRows.length} lançamento{importRows.length!==1?'s':''}
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL EXTRATO BANCÁRIO ── */}
      {modalExtrato === 'upload' && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget) setModalExtrato(null);}}>
          <div className="modal" style={{maxWidth:520}}>
            <div className="modal-header">
              <span className="modal-titulo">🏦 Importar Extrato Bancário</span>
              <button className="btn-fechar" onClick={()=>setModalExtrato(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:12,color:'var(--texto-leve)',marginBottom:6}}>Conta bancária (opcional)</label>
                <select value={contaSelecionada} onChange={e=>setContaSelecionada(e.target.value)}
                  style={{width:'100%',background:'var(--input-bg)',border:'1px solid var(--card-borda)',borderRadius:6,padding:'8px 10px',color:'var(--texto)',fontSize:13}}>
                  <option value="">— Selecionar conta —</option>
                  {contasAPI.map(c=><option key={c.id} value={c.id}>{c.nome}{c.banco?' · '+c.banco:''}</option>)}
                </select>
              </div>
              <div
                className={'import-drop'+(dragOver?' drag-over':'')}
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={e=>{e.preventDefault();setDragOver(false);handleUploadExtrato(e.dataTransfer.files[0]);}}
                onClick={()=>!processando&&extratoInputRef.current?.click()}
                style={{cursor:processando?'wait':'pointer'}}
              >
                {processando ? (
                  <div style={{color:'var(--verde)',fontSize:15}}>⏳ Processando arquivo...</div>
                ) : (
                  <>
                    <div style={{fontSize:36,marginBottom:8}}>📂</div>
                    <div style={{fontSize:15,fontWeight:600,color:'var(--texto)',marginBottom:4}}>Arraste o arquivo aqui</div>
                    <div style={{fontSize:12,color:'var(--texto-leve)',marginBottom:12}}>ou clique para selecionar</div>
                    <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
                      {['OFX','CSV','PDF'].map(f=><span key={f} style={{background:'var(--card-bg)',border:'1px solid var(--card-borda)',borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:700,color:'var(--texto-leve)'}}>{f}</span>)}
                    </div>
                  </>
                )}
              </div>
              <div style={{marginTop:14,fontSize:11,color:'var(--texto-leve)',lineHeight:1.6}}>
                💡 <strong>OFX/QIF</strong>: Exportado direto pelo app do Sicoob (mais preciso)<br/>
                💡 <strong>CSV</strong>: Exportado pelo internet banking (aba "Exportar extrato")<br/>
                💡 <strong>PDF</strong>: Extrato em PDF — funciona bem para Sicoob
              </div>
            </div>
          </div>
        </div>
      )}

      {modalExtrato === 'revisao' && importacaoAtiva && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:'95vw',width:1100}}>
            <div className="modal-header">
              <div>
                <span className="modal-titulo">🔍 Revisar Extrato — {importacaoAtiva.nome_arquivo}</span>
                <div style={{fontSize:12,color:'var(--texto-leve)',marginTop:2}}>
                  {importacaoAtiva.total_lancamentos} lançamentos · {fmtData(importacaoAtiva.periodo_inicio)} a {fmtData(importacaoAtiva.periodo_fim)}
                </div>
              </div>
              <button className="btn-fechar" onClick={()=>{if(confirm('Cancelar revisão? Os dados não serão salvos.'))setModalExtrato(null);}}>✕</button>
            </div>
            <div className="modal-body" style={{padding:0}}>
              {/* Resumo */}
              <div style={{display:'flex',gap:12,padding:'12px 18px',background:'var(--card-bg)',borderBottom:'1px solid var(--card-borda)',flexWrap:'wrap',alignItems:'center'}}>
                <span style={{background:'rgba(34,197,94,.15)',color:'var(--verde)',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700}}>
                  ⬆️ Créditos: {fmtMoeda(importacaoAtiva.valor_total_credito)}
                </span>
                <span style={{background:'rgba(255,92,92,.15)',color:'var(--vermelho)',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700}}>
                  ⬇️ Débitos: {fmtMoeda(importacaoAtiva.valor_total_debito)}
                </span>
                <span style={{color:'var(--texto-leve)',fontSize:12}}>
                  ✅ {lancamentosRev.filter(l=>l.status==='confirmado').length} confirmados ·
                  🚫 {lancamentosRev.filter(l=>l.status==='ignorado').length} ignorados ·
                  ⏳ {lancamentosRev.filter(l=>l.status==='pendente').length} pendentes
                </span>
                <div style={{marginLeft:'auto',display:'flex',gap:8}}>
                  <button onClick={()=>marcarTodos('confirmado')} style={{background:'rgba(34,197,94,.15)',border:'none',borderRadius:6,padding:'5px 12px',color:'var(--verde)',cursor:'pointer',fontSize:12,fontWeight:600}}>✅ Confirmar todos</button>
                  <button onClick={()=>marcarTodos('ignorado')} style={{background:'rgba(255,92,92,.1)',border:'none',borderRadius:6,padding:'5px 12px',color:'var(--vermelho)',cursor:'pointer',fontSize:12,fontWeight:600}}>🚫 Ignorar todos</button>
                </div>
              </div>
              {/* Tabela de revisão */}
              <div style={{overflowY:'auto',maxHeight:'60vh'}}>
                <table className="import-table" style={{fontSize:12}}>
                  <thead><tr style={{position:'sticky',top:0,zIndex:1}}>
                    <th style={{width:90}}>Data</th>
                    <th>Descrição</th>
                    <th style={{width:110,textAlign:'right'}}>Valor</th>
                    <th style={{width:200}}>Categoria</th>
                    <th style={{width:80,textAlign:'center'}}>Confiança</th>
                    <th style={{width:130,textAlign:'center'}}>Status</th>
                  </tr></thead>
                  <tbody>
                    {lancamentosRev.map(l => {
                      const conf = Math.round((l.confianca_sugestao || 0) * 100);
                      const confCor = conf >= 70 ? 'var(--verde)' : conf >= 40 ? 'var(--dourado)' : 'var(--vermelho)';
                      const catsFiltradas = categoriasAPI.filter(c => c.tipo === l.tipo || c.tipo === 'ambos');
                      return (
                        <tr key={l.id} style={{opacity: l.status==='ignorado' ? 0.4 : 1, background: l.status==='confirmado' ? 'rgba(34,197,94,.04)' : 'transparent'}}>
                          <td style={{fontFamily:'monospace'}}>{fmtData(l.data_lancamento)}</td>
                          <td>
                            <div style={{fontWeight:600, color: l.tipo==='receita'?'var(--verde)':'var(--vermelho)'}}>{l.tipo==='receita'?'⬆️':'⬇️'} {fmtMoeda(l.valor)}</div>
                            <div style={{color:'var(--texto)',marginTop:2}}>{l.descricao}</div>
                            {l.keywords_match && <div style={{color:'var(--texto-leve)',fontSize:10}}>🔍 match: "{l.keywords_match}"</div>}
                          </td>
                          <td style={{textAlign:'right',fontFamily:'monospace',fontWeight:700,color:l.tipo==='receita'?'var(--verde)':'var(--vermelho)'}}></td>
                          <td>
                            <select
                              value={l.categoria_id || ''}
                              onChange={e=>atualizarLancamentoRev(l.id, 'categoria_id', e.target.value ? parseInt(e.target.value) : null)}
                              style={{width:'100%',background:'var(--input-bg)',border:'1px solid var(--card-borda)',borderRadius:5,padding:'4px 6px',color:'var(--texto)',fontSize:11}}
                            >
                              <option value="">— Sem categoria —</option>
                              {catsFiltradas.map(c=><option key={c.id} value={c.id}>{c.icone} {c.nome}</option>)}
                            </select>
                          </td>
                          <td style={{textAlign:'center'}}>
                            <span style={{color:confCor,fontWeight:700,fontSize:11}}>{conf}%</span>
                          </td>
                          <td style={{textAlign:'center'}}>
                            <select
                              value={l.status}
                              onChange={e=>atualizarLancamentoRev(l.id, 'status', e.target.value)}
                              style={{background:'var(--input-bg)',border:'1px solid var(--card-borda)',borderRadius:5,padding:'4px 6px',color:'var(--texto)',fontSize:11,width:110}}
                            >
                              <option value="pendente">⏳ Pendente</option>
                              <option value="confirmado">✅ Confirmar</option>
                              <option value="ignorado">🚫 Ignorar</option>
                            </select>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
            <div className="modal-footer" style={{display:'flex',gap:10,justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:'var(--texto-leve)'}}>
                {lancamentosRev.filter(l=>l.status==='confirmado').length} de {lancamentosRev.length} selecionados para confirmar
              </span>
              <div style={{display:'flex',gap:10}}>
                <button className="btn-import" onClick={()=>{if(confirm('Cancelar revisão?'))setModalExtrato(null);}}>Cancelar</button>
                <button
                  className="btn btn-receita"
                  style={{background:'var(--verde)',color:'#111',opacity:processando?0.6:1}}
                  disabled={processando || lancamentosRev.filter(l=>l.status==='confirmado').length === 0}
                  onClick={confirmarExtrato}
                >
                  {processando ? '⏳ Confirmando...' : `✅ Confirmar ${lancamentosRev.filter(l=>l.status==='confirmado').length} lançamentos`}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────
function App(){
  const [usuario,setUsuario]=useState(()=>{try{return JSON.parse(localStorage.getItem('erp_user'));}catch{return null;}});
  const [pagina,setPagina]=useState('financeiro');
  const toasts=useToast();

  function logout(){ localStorage.removeItem('erp_access'); localStorage.removeItem('erp_user'); setUsuario(null); }
  if(!usuario) return <Login onLogin={u=>setUsuario(u)}/>;

  const navItems=[
    {id:'funcionarios',icon:'👥',label:'Funcionários',href:'index.html'},
    {id:'financeiro',  icon:'💰',label:'Financeiro'},
    {id:'pedidos',     icon:'🛒',label:'Pedidos de Compra',disabled:true},
    {id:'atletas',     icon:'⚽',label:'Contratos de Atletas',disabled:true},
    {id:'investidores',icon:'📈',label:'Investidores',disabled:true},
    {id:'metas',       icon:'🎯',label:'Metas',disabled:true},
    {id:'relatorios',  icon:'📊',label:'Relatórios',disabled:true},
  ];

  return(
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="icon">⚽</div>
          <div><div className="title">ERP SAF</div><div className="sub">Sistema de Gestão</div></div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-label">Módulos</div>
          {navItems.map(item=>(
            <div key={item.id}
              className={`nav-item ${pagina===item.id?'ativo':''}`}
              style={item.disabled?{opacity:.45,cursor:'not-allowed'}:{cursor:'pointer'}}
              onClick={()=>{
                if(item.disabled)return;
                if(item.href){window.location.href=item.href;}
                else setPagina(item.id);
              }}
              title={item.disabled?'Em breve':''}
            >
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.disabled&&<span style={{marginLeft:'auto',fontSize:10,opacity:.7}}>em breve</span>}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="usuario-info">
            <div className="usuario-avatar">{iniciais(usuario.nome)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="usuario-nome" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{usuario.nome}</div>
              <div className="usuario-cargo">{usuario.cargo||usuario.perfil}</div>
            </div>
            <button onClick={logout} title="Sair" style={{background:'none',border:'none',color:'rgba(255,255,255,.6)',fontSize:16,cursor:'pointer'}}>⏻</button>
          </div>
        </div>
      </aside>
      <main className="main">
        <div className="topbar">
          <span className="topbar-title">💰 Financeiro</span>
          <span style={{fontSize:13,color:'var(--texto-leve)'}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
        </div>
        {pagina==='financeiro'&&<ModuloFinanceiro/>}
      </main>
      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
