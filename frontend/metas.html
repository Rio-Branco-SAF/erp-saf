<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Metas ‚Äî ERP SAF</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;display:flex;min-height:100vh}
.sidebar{width:220px;background:#0f172a;color:#94a3b8;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:#fff;border-bottom:1px solid #1e293b}
.sidebar-logo span{color:#f59e0b}
.sidebar nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;transition:.15s}
.nav-item:hover{background:#1e293b;color:#e2e8f0}
.nav-item.active{background:#1d4ed8;color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid #1e293b}
.user-chip{display:flex;align-items:center;gap:8px}
.ua{width:30px;height:30px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:180px;font-weight:700;color:#0f172a}
.topbar-sub#Ff˙tjasze:12px;color:#64748b;margin-top:2px;font-weight:600}
.search-input{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:200px;outline:none}
.search-input:focus{border-color:#1d4ed8}
