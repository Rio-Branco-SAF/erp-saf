/* META CARD */
.metas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.meta-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:18px 20px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.meta-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px}
.meta-card.esportiva::before{background:#1d4ed8}
.meta-card.financeira::before{background:#16a34a}
.meta-card.institucional::before{background:#7c3aed}
.meta-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09)}
.meta-card.concluida{opacity:.85;background:#f0fdf4}
.meta-card.nao_atingida{opacity:.8;background:#fff5f5}
.meta-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}

function App(){
    const [usuario,setUsuario]=useState(USUARIO);
    function logout(){TOKEN=null;USUARIO=null;localStorage.removeItem('erp_token');localStorage.removeItem('erp_usuario');setUsuario(null);}
    if(!usuario) return <Login onLogin={u=>setUsuario(u)}/>;
    return <><Sidebar usuario={usuario} onLogout={logout}/><div className="main"><ModuloMetas usuario={usuario}/></div></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
