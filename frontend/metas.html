<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Metas — ERP SAF</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="config.js"></script>
<style>
    :root {
    --bg:          #141414;
    --sidebar-bg:  #1a1a1a;
    --card-bg:     #242424;
    --card-borda:  #363636;
    --input-bg:    #1f1f1f;
    --verde:       #22C55E;
    --verde-med:   #16A34A;
    --verde-dark:  #15803D;
    --vermelho:    #FF5C5C;
    --dourado:     #D4A017;
    --dourado-vivo:#F0B429;
    --azul:        #3B82F6;
    --azul-dark:   #1D4ED8;
    --texto:       #F0F0F0;
    --texto-leve:  #9CA3AF;
    --roxo:        #8B5CF6;
    --laranja:     #F97316;
    --cinza:       #2e2e2e;
    --danger:      #EF4444;
    --warning:     #F59E0B;
    --info:        #3B82F6;
    --verde-bg:    rgba(34,197,94,.1);
    --sombra:      0 2px 8px rgba(0,0,0,.4);
  }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background: var(--bg);color: var(--texto);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--texto-leve);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;border-right:1px solid var(--card-borda)}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:var(--texto);border-bottom:1px solid var(--card-borda)}
.sidebar-logo span{color:var(--dourado-vivo)}
.sidebar nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13.5px;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(212,160,23,.08);color:var(--texto)}
.nav-item.active{background:rgba(212,160,23,.12);color:var(--dourado-vivo);border-left-color:var(--dourado);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--card-borda)}
.user-chip{display:flex;align-items:center;gap:8px}
.ua{width:30px;height:30px;background:var(--azul-dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--card-bg)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--card-bg);border-bottom:1px solid var(--card-borda);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;color:var(--sidebar-bg)}
.topbar-sub{font-size:12px;color:#64748b;margin-top:2px}
.content{padding:24px 28px;flex:1}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--azul-dark);color:var(--card-bg)}.btn-primary:hover{background:#1e40af}
.btn-outline{background:var(--card-bg);color:#475569;border:1px solid var(--card-borda)}.btn-outline:hover{background:var(--card-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-ghost{background:transparent;color:#64748b;border:none;font-size:13px;cursor:pointer;padding:4px 8px}
.btn-success{background:#16a34a;color:var(--card-bg)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--card-bg);border-radius:12px;padding:14px 18px;border:1px solid var(--card-borda)}
.kpi-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:24px;font-weight:800;margin:5px 0 2px;color:var(--sidebar-bg)}
.kpi-sub{font-size:11px;color:var(--texto-leve)}
.kpi-card.ok .kpi-value{color:#16a34a}
.kpi-card.alerta .kpi-value{color:#d97706}
.kpi-card.urgente .kpi-value{color:#FF5C5C}

/* FILTERS */
.filters-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--card-borda);background:var(--card-bg);color:#475569;transition:.15s}
.filter-btn.active{border-color:transparent}
.filter-btn.tipo-esportiva.active{background:#dbeafe;color:var(--azul-dark);border-color:#bfdbfe}
.filter-btn.tipo-financeira.active{background:#dcfce7;color:#16a34a;border-color:#bbf7d0}
.filter-btn.tipo-institucional.active{background:#f3e8ff;color:#7c3aed;border-color:#ddd6fe}
.filter-btn.tipo-all.active{background:var(--sidebar-bg);color:var(--card-bg);border-color:var(--sidebar-bg)}
.search-input{padding:8px 12px;border:1px solid var(--card-borda);border-radius:8px;font-size:13px;width:200px;outline:none}
.search-input:focus{border-color:var(--azul-dark)}
select.filter-sel{padding:8px 12px;border:1px solid var(--card-borda);border-radius:8px;font-size:13px;background:var(--card-bg);outline:none;color:#475569;cursor:pointer}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-alta{background:#fee2e2;color:#FF5C5C}
.pill-media{background:#fef9c3;color:#a16207}
.pill-baixa{background:var(--bg);color:#64748b}
.pill-ativa{background:#dbeafe;color:var(--azul-dark)}
.pill-concluida{background:#dcfce7;color:#16a34a}
.pill-nao_atingida{background:#fee2e2;color:#FF5C5C}
.pill-cancelada{background:var(--bg);color:var(--texto-leve)}
.tipo-badge-esportiva{background:#dbeafe;color:var(--azul-dark);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
.tipo-badge-financeira{background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
.tipo-badge-institucional{background:#f3e8ff;color:#7c3aed;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}

/* META CARD */
.metas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.meta-card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-borda);padding:18px 20px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.meta-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px}
.meta-card.esportiva::before{background:var(--azul-dark)}
.meta-card.financeira::before{background:#16a34a}
.meta-card.institucional::before{background:#7c3aed}
.meta-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09)}
.meta-card.concluida{opacity:.85;background:#f0fdf4}
.meta-card.nao_atingida{opacity:.8;background:var(--card-bg)5f5}
.meta-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.meta-titulo{font-size:14px;font-weight:700;color:var(--sidebar-bg);line-height:1.4;flex:1}
.meta-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}

/* BARRA DE PROGRESSO */
.progress-wrap{margin-bottom:12px}
.progress-info{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.progress-valores{font-size:12.5px;color:#475569}
.progress-pct{font-size:18px;font-weight:800}
.progress-bar{height:10px;background:var(--bg);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width .6s ease}
.pct-low{color:#FF5C5C}
.pct-mid{color:#d97706}
.pct-high{color:#16a34a}
.fill-low{background:linear-gradient(90deg,#fca5a5,#FF5C5C)}
.fill-mid{background:linear-gradient(90deg,#fcd34d,#d97706)}
.fill-high{background:linear-gradient(90deg,#86efac,#16a34a)}
.fill-done{background:linear-gradient(90deg,#34d399,#059669)}

/* META FOOTER */
.meta-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg);font-size:12px;color:var(--texto-leve)}
.dias-badge{padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700}
.dias-ok{background:#dcfce7;color:#16a34a}
.dias-warning{background:#fef9c3;color:#a16207}
.dias-urgent{background:#fee2e2;color:#FF5C5C}
.dias-vencido{background:var(--bg);color:#64748b}

/* CONQUISTA BANNER */
.conquista-banner{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#f59e0b,#d97706);color:var(--card-bg);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:800;display:flex;align-items:center;gap:3px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--card-bg);border-radius:16px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--card-borda);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--card-bg);z-index:10}
.modal-body{padding:24px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--card-borda);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card-bg)}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--texto-leve);margin-top:2px}
.close-btn:hover{color:var(--sidebar-bg)}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:11.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bg)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.detail-item label{display:block;font-size:10.5px;color:var(--texto-leve);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.detail-item span{font-size:14px;font-weight:600;color:var(--sidebar-bg)}

/* ATUALIZAR PROGRESSO */
.update-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;margin-bottom:18px}
.update-box h4{font-size:13px;font-weight:700;color:var(--azul-dark);margin-bottom:10px}

/* TIMELINE */
.timeline{list-style:none}
.tl-item{display:flex;gap:10px;padding-bottom:14px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:10px;top:22px;bottom:0;width:2px;background:var(--bg)}
.tl-dot{width:22px;height:22px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;color:var(--azul-dark);font-weight:800}
.tl-dot.up{background:#dcfce7;color:#16a34a}
.tl-dot.down{background:#fee2e2;color:#FF5C5C}
.tl-acao{font-size:13px;font-weight:600;color:var(--sidebar-bg)}
.tl-desc{font-size:12px;color:#64748b;margin-top:1px}
.tl-data{font-size:11px;color:var(--texto-leve);margin-top:2px}
.tl-delta{font-size:11.5px;font-weight:700;margin-top:2px}
.tl-delta.pos{color:#16a34a}
.tl-delta.neg{color:#FF5C5C}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{padding:8px 11px;border:1px solid var(--card-borda);border-radius:8px;font-size:13.5px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--azul-dark);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.form-group textarea{resize:vertical;min-height:60px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);width:100%}
.login-card{background:var(--card-bg);border-radius:16px;padding:40px;width:380px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h2{font-size:22px;font-weight:800;color:var(--sidebar-bg);margin-top:10px}
.login-err{background:#fee2e2;color:#FF5C5C;border-radius:8px;padding:10px;font-size:13px;margin-bottom:14px}
.empty-state{text-align:center;padding:50px 20px;color:var(--texto-leve)}
.empty-icon{font-size:44px;margin-bottom:10px}

/* NOVA META MODAL */
.nova-meta-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.nova-meta-modal{background:var(--card-bg);border-radius:16px;width:100%;max-width:660px;max-height:88vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
</style>
</head>

let TOKEN = localStorage.getItem('erp_access');
let USUARIO = null;
try { USUARIO = JSON.parse(localStorage.getItem('erp_user')); } catch(e){}

async function apiFetch(path, options={}) {
    try {
        const headers={'Content-Type':'application/json'};
        if(TOKEN) headers['Authorization']='Bearer '+TOKEN;
        const res = await fetch(API_URL+path,{...options,headers});
        if(res.status===401){TOKEN=null;localStorage.removeItem('erp_access');localStorage.removeItem('erp_user');window.location.href='login.html';}
        return await res.json();
    } catch(e){return null;}
}

function fmt(v){if(!v&&v!==0)return '—';return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function fmtNum(v,u=''){if(v===null||v===undefined)return '—';if(u==='R$')return fmt(v);return Number(v).toLocaleString('pt-BR')+(u?' '+u:'');}
function fmtData(d){if(!d)return '—';return new Date(d+(d.length===10?'T00:00:00':'')).toLocaleDateString('pt-BR');}
function fmtDataHora(d){if(!d)return '—';return new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function initials(n){return(n||'?').split(' ').filter(Boolean).map(x=>x[0]).slice(0,2).join('').toUpperCase();}

function getPctClass(pct){return pct>=80?'pct-high':pct>=50?'pct-mid':'pct-low';}
function getFillClass(pct,status){if(status==='concluida')return 'fill-done';return pct>=80?'fill-high':pct>=50?'fill-mid':'fill-low';}
function getDiasClass(d){if(d<0)return 'dias-vencido';if(d<30)return 'dias-urgent';if(d<90)return 'dias-warning';return 'dias-ok';}

function Login({onLogin}) {
    const [u,setU]=useState('admin'),[s,setS]=useState('admin123'),[err,setErr]=useState(''),[l,setL]=useState(false);
    async function submit(e){
        e.preventDefault();setL(true);setErr('');
        const d=await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({usuario:u,senha:s})});
        setL(false);
        if(d?.token){TOKEN=d.token;USUARIO=d.usuario;localStorage.setItem('erp_access',TOKEN);localStorage.setItem('erp_user',JSON.stringify(USUARIO));onLogin(d.usuario);}
        else if(u==='admin'&&s==='admin123'){USUARIO={id:1,nome:'Administrador',perfil:'admin'};localStorage.setItem('erp_user',JSON.stringify(USUARIO));onLogin(USUARIO);}
        else setErr('Usuário ou senha incorretos.');
    }
    return <div className="login-wrap"><div className="login-card">
        <div className="login-logo"><div style={{fontSize:40}}>🏟️</div><h2>ERP SAF</h2><p>Metas Esportivas e Financeiras</p></div>
        {err&&<div className="login-err">{err}</div>}
        <form onSubmit={submit}>
            <div className="form-group" style={{marginBottom:12}}><label>Usuário</label><input value={u} onChange={e=>setU(e.target.value)} required/></div>
            <div className="form-group" style={{marginBottom:20}}><label>Senha</label><input type="password" value={s} onChange={e=>setS(e.target.value)} required/></div>
            <button type="submit" className="btn btn-primary" style={{width:'100%',padding:11}} disabled={l}>{l?'Entrando...':'Entrar'}</button>
        </form>
        <div style={{textAlign:'center',marginTop:16,fontSize:12,color:'var(--texto-leve)'}}>Demo: admin / admin123</div>
    </div></div>;
}

function ModalMeta({meta, onClose, onAtualizar}){
    const [detalhe,setDetalhe]=useState(null);
    const [novoValor,setNovoValor]=useState('');
    const [novoDesc,setNovoDesc]=useState('');
    const [saving,setSaving]=useState(false);
    const [sucesso,setSucesso]=useState('');

    useEffect(()=>{
        async function buscar(){
            const d=await apiFetch('/metas/'+meta.id);
            if(d?.id) setDetalhe(d);
            else setDetalhe({...meta, historico: DEMO_HIST[meta.id]||[]});
        }
        buscar();
    },[meta.id]);

    async function atualizar(){
        if(!novoValor) return;
        setSaving(true);
        const d=await apiFetch('/metas/'+meta.id+'/atualizar',{method:'PATCH',body:JSON.stringify({valor_novo:parseFloat(novoValor),descricao:novoDesc})});
        setSaving(false);
        if(d){
            setSucesso(d.mensagem||'Atualizado!');
            setNovoValor(''); setNovoDesc('');
            onAtualizar();
            const d2=await apiFetch('/metas/'+meta.id);
            if(d2?.id) setDetalhe(d2);
            else setDetalhe(prev=>({...prev, valor_atual:parseFloat(novoValor), historico:[{id:Date.now(),valor_anterior:prev.valor_atual,valor_novo:parseFloat(novoValor),descricao:novoDesc,created_at:new Date().toISOString(),usuario_nome:'Você'},...(prev.historico||[])]}));
            setTimeout(()=>setSucesso(''),3000);
        }
    }

    const d = detalhe||meta;
    const pct = d.percentual||0;
    const fmtValor = (v)=>{
        if(d.unidade==='R$'||d.unidade?.startsWith('R$')) return fmt(v);
        return Number(v||0).toLocaleString('pt-BR')+' '+(d.unidade||'');
    };

    return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="modal">
            <div className="modal-header">
                <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                        <span style={{fontSize:20}}>{CATEGORIA_ICON[d.categoria]||'🎯'}</span>
                        <span className={'tipo-badge-'+d.tipo}>{TIPO_LABEL[d.tipo]}</span>
                        <span className={'pill pill-'+d.prioridade}>{d.prioridade}</span>
                        <span className={'pill pill-'+d.status}>{d.status.replace('_',' ')}</span>
                    </div>
                    <h2 style={{fontSize:17,fontWeight:800,color:'var(--sidebar-bg)',lineHeight:1.3}}>{d.titulo}</h2>
                    {d.atleta_nome && <div style={{fontSize:12,color:'#64748b',marginTop:3}}>⚽ {d.atleta_nome}{d.atleta_guerra?' "'+d.atleta_guerra+'"':''}</div>}
                </div>
                <button className="close-btn" onClick={onClose}>✕</button>
            </div>
            <div className="modal-body">

                {sucesso && <div style={{background:'#dcfce7',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px',color:'#16a34a',fontWeight:700,marginBottom:14,fontSize:13}}>{sucesso}</div>}

                {/* BARRA DE PROGRESSO GRANDE */}
                <div style={{background:'#f8fafc',borderRadius:12,padding:'16px 18px',marginBottom:20}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                        <div style={{fontSize:13,color:'#475569',fontWeight:600}}>
                            {d.sentido==='abaixo'?'Atual:':'Progresso:'} <strong>{fmtValor(d.valor_atual)}</strong> de <strong>{fmtValor(d.valor_meta)}</strong>
                        </div>
                        <div style={{fontSize:28,fontWeight:900}} className={getPctClass(pct)}>{pct}%</div>
                    </div>
                    <div style={{height:14,background:'var(--card-borda)',borderRadius:100,overflow:'hidden'}}>
                        <div className={getFillClass(pct,d.status)} style={{width:pct+'%',height:'100%',borderRadius:100,transition:'width .8s ease'}}/>
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11.5,color:'var(--texto-leve)'}}>
                        <span>📅 {fmtData(d.data_inicio)} → {fmtData(d.data_fim)}</span>
                        {d.dias_restantes>0
                            ? <span className={'dias-badge '+ getDiasClass(d.dias_restantes)}>{d.dias_restantes} dias restantes</span>
                            : <span className="dias-badge dias-vencido">Prazo encerrado</span>}
                    </div>
                </div>

                {/* ATUALIZAR PROGRESSO */}
                {d.status==='ativa' && <div className="update-box">
                    <h4>📝 Atualizar Progresso</h4>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:10}}>
                        <div className="form-group">
                            <label>Novo valor ({d.unidade||''})</label>
                            <input type="number" step="any" value={novoValor} onChange={e=>setNovoValor(e.target.value)} placeholder={String(d.valor_atual)}/>
                        </div>
                        <div className="form-group">
                            <label>Descrição (opcional)</label>
                            <input value={novoDesc} onChange={e=>setNovoDesc(e.target.value)} placeholder="Ex: Rodada 11 — vitória 2x0"/>
                        </div>
                    </div>
                    <button className="btn btn-primary btn-sm" style={{marginTop:10}} onClick={atualizar} disabled={saving||!novoValor}>
                        {saving?'Salvando...':'💾 Salvar Atualização'}
                    </button>
                </div>}

                {/* DADOS */}
                <div className="detail-section">
                    <h3>Informações</h3>
                    <div className="detail-grid">
                        <div className="detail-item"><label>Temporada</label><span>{d.temporada}</span></div>
                        <div className="detail-item"><label>Categoria</label><span>{CATEGORIA_ICON[d.categoria]} {d.categoria?.replace(/_/g,' ')}</span></div>
                        <div className="detail-item"><label>Responsável</label><span>{d.responsavel_nome||'—'}</span></div>
                    </div>
                    {d.descricao && <div style={{marginTop:12,padding:'10px 12px',background:'#f8fafc',borderRadius:8,fontSize:13,color:'#475569',lineHeight:1.6}}>{d.descricao}</div>}
                    {d.observacoes && <div style={{marginTop:8,padding:'8px 12px',background:'#fffbeb',borderRadius:8,fontSize:12.5,color:'#92400e',border:'1px solid #fde68a'}}>💡 {d.observacoes}</div>}
                </div>

                {/* HISTÓRICO */}
                <div className="detail-section">
                    <h3>📅 Histórico de Atualizações ({detalhe?.historico?.length||0})</h3>
                    {!detalhe?.historico?.length
                        ? <div style={{color:'var(--texto-leve)',fontSize:13,padding:'12px 0'}}>Nenhuma atualização registrada ainda.</div>
                        : <ul className="timeline">
                            {detalhe.historico.map(h=>{
                                const delta = (h.valor_novo||0)-(h.valor_anterior||0);
                                const isUp = d.sentido==='abaixo' ? delta<0 : delta>0;
                                return <li key={h.id} className="tl-item">
                                    <div className={'tl-dot '+(isUp?'up':'down')}>{isUp?'↑':'↓'}</div>
                                    <div style={{flex:1}}>
                                        <div className="tl-acao">{fmtValor(h.valor_anterior)} → <strong>{fmtValor(h.valor_novo)}</strong>{h.usuario_nome?' · '+h.usuario_nome:''}</div>
                                        {h.descricao && <div className="tl-desc">{h.descricao}</div>}
                                        <div className="tl-data">{fmtDataHora(h.created_at)}</div>
                                        {delta!==0 && <div className={'tl-delta '+(isUp?'pos':'neg')}>{isUp?'+':''}{fmtValor(delta)}</div>}
                                    </div>
                                </li>;
                            })}
                        </ul>
                    }
                </div>
            </div>
            <div className="modal-footer">
                <button className="btn btn-outline" onClick={onClose}>Fechar</button>
            </div>
        </div>
    </div>;
}

function ModuloMetas({usuario}){

    const carregar=useCallback(async()=>{
        setLoading(true);
        const params=new URLSearchParams({temporada:'2026'});
        if(filtroTipo) params.set('tipo',filtroTipo);
        if(filtroStatus) params.set('status',filtroStatus);
        if(busca) params.set('busca',busca);

        const [listData,resumoData]=await Promise.all([
            apiFetch('/metas?'+params.toString()),
            apiFetch('/metas/resumo?temporada=2026')
        ]);

        if(Array.isArray(listData)){ setMetas(listData); }
        else {
            let f=DEMO_METAS;
            if(filtroTipo) f=f.filter(m=>m.tipo===filtroTipo);
            if(filtroStatus) f=f.filter(m=>m.status===filtroStatus);
            if(busca) f=f.filter(m=>m.titulo.toLowerCase().includes(busca.toLowerCase()));
            setMetas(f);
        }
        if(resumoData?.total) setResumo(resumoData);
        setLoading(false);
    },[filtroTipo,filtroStatus,busca]);

    useEffect(()=>{carregar();},[carregar]);

                <input className="search-input" placeholder="Buscar meta..." value={busca} onChange={e=>setBusca(e.target.value)}/>
                {(busca||filtroStatus!=='ativa')&&<button className="btn-ghost" onClick={()=>{setBusca('');setFiltroStatus('ativa');}}>✕ Limpar</button>}
                <div style={{marginLeft:'auto',fontSize:13,color:'var(--texto-leve)'}}>{metas.length} meta{metas.length!==1?'s':''}</div>
            </div>

            {loading ? (
                <div style={{textAlign:'center',padding:'60px',color:'var(--texto-leve)'}}>Carregando...</div>
            ) : metas.length===0 ? (
                <div className="empty-state"><div className="empty-icon">🎯</div><p>Nenhuma meta encontrada.</p></div>
            ) : (
                grupos.map(g => <div key={g.tipo} style={{marginBottom:28}}>
                    <div style={{fontSize:15,fontWeight:800,color:'var(--sidebar-bg)',marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
                        {g.label}
                        <span style={{fontSize:12,fontWeight:600,color:'var(--texto-leve)',background:'#f1f5f9',padding:'2px 8px',borderRadius:100}}>{g.metas.length}</span>
                    </div>
                    <div className="metas-grid">
                        {g.metas.map(m=>{
                            const pct=m.percentual||0;
                            const fmtV=(v)=>(m.unidade==='R$'||m.unidade?.startsWith('R$'))?fmt(v):Number(v||0).toLocaleString('pt-BR')+(m.unidade?' '+m.unidade:'');
                            return <div key={m.id} className={'meta-card '+m.tipo+(m.status!=='ativa'?' '+m.status:'')} onClick={()=>setDetalhe(m)}>
                                {m.status==='concluida' && <div className="conquista-banner">🏆 Concluída!</div>}
                                <div className="meta-card-header">
                                    <div>
                                        <div className="meta-titulo">{CATEGORIA_ICON[m.categoria]||'🎯'} {m.titulo}</div>
                                        <div className="meta-badges">
                                            <span className={'pill pill-'+m.prioridade}>{m.prioridade}</span>
                                            {m.atleta_nome&&<span style={{background:'#f1f5f9',color:'#475569',padding:'2px 7px',borderRadius:100,fontSize:10.5,fontWeight:600}}>⚽ {m.atleta_nome.split(' ')[0]}</span>}
                                        </div>
                                    </div>
                                </div>
                                <div className="progress-wrap">
                                    <div className="progress-info">
                                        <span className="progress-valores">{fmtV(m.valor_atual)} / {fmtV(m.valor_meta)}</span>
                                        <span className={'progress-pct '+getPctClass(pct)}>{pct}%</span>
                                    </div>
                                    <div className="progress-bar">
                                        <div className={getFillClass(pct,m.status)} style={{width:pct+'%'}}/>
                                    </div>
                                </div>
                                <div className="meta-footer">
                                    <span>{m.observacoes?.slice(0,50)+(m.observacoes?.length>50?'...':'')}</span>
                                    {m.dias_restantes>0
                                        ? <span className={'dias-badge '+getDiasClass(m.dias_restantes)}>{m.dias_restantes}d</span>
                                        : <span className="dias-badge dias-vencido">Encerrado</span>}
                                </div>
                            </div>;
                        })}
                    </div>
                </div>)
            )}
        </div>

        {detalhe && <ModalMeta meta={detalhe} onClose={()=>setDetalhe(null)} onAtualizar={carregar}/>}

        {/* MODAL NOVA META */}
        {showNova && <div className="nova-meta-overlay" onClick={e=>e.target===e.currentTarget&&setShowNova(false)}>
            <div className="nova-meta-modal">
                <div className="modal-header">
                    <h2 style={{fontSize:17}}>🎯 Nova Meta</h2>
                    <button className="close-btn" onClick={()=>setShowNova(false)}>✕</button>
                </div>
                <div className="modal-body">
                    <div className="form-grid" style={{marginBottom:12}}>
                        <div className="form-group form-full"><label>Título *</label><input value={novaMeta.titulo} onChange={e=>setNovaMeta(m=>({...m,titulo:e.target.value}))} placeholder="Ex: Atingir 70 pontos na Série B"/></div>
                        <div className="form-group">
                            <label>Tipo *</label>
                            <select value={novaMeta.tipo} onChange={e=>setNovaMeta(m=>({...m,tipo:e.target.value,categoria:CATEGORIAS_POR_TIPO[e.target.value][0]}))}>
                                <option value="esportiva">🏆 Esportiva</option>
                                <option value="financeira">💰 Financeira</option>
                                <option value="institucional">🌱 Institucional</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Categoria *</label>
                            <select value={novaMeta.categoria} onChange={e=>setNovaMeta(m=>({...m,categoria:e.target.value}))}>
                                {(CATEGORIAS_POR_TIPO[novaMeta.tipo]||[]).map(c=><option key={c} value={c}>{CATEGORIA_ICON[c]} {c.replace(/_/g,' ')}</option>)}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Valor da Meta *</label>
                            <input type="number" step="any" value={novaMeta.valor_meta} onChange={e=>setNovaMeta(m=>({...m,valor_meta:e.target.value}))} placeholder="Ex: 65"/>
                        </div>
                        <div className="form-group">
                            <label>Unidade</label>
                            <input value={novaMeta.unidade} onChange={e=>setNovaMeta(m=>({...m,unidade:e.target.value}))} placeholder="pontos, gols, R$, %..."/>
                        </div>
                        <div className="form-group">
                            <label>Sentido</label>
                            <select value={novaMeta.sentido} onChange={e=>setNovaMeta(m=>({...m,sentido:e.target.value}))}>
                                <option value="acima">Quanto maior melhor (↑)</option>
                                <option value="abaixo">Quanto menor melhor (↓)</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Prioridade</label>
                            <select value={novaMeta.prioridade} onChange={e=>setNovaMeta(m=>({...m,prioridade:e.target.value}))}>
                                <option value="alta">🔴 Alta</option>
                                <option value="media">🟡 Média</option>
                                <option value="baixa">⚪ Baixa</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Prazo Final *</label>
                            <input type="date" value={novaMeta.data_fim} onChange={e=>setNovaMeta(m=>({...m,data_fim:e.target.value}))}/>
                        </div>
                        <div className="form-group form-full">
                            <label>Descrição</label>
                            <textarea value={novaMeta.descricao} onChange={e=>setNovaMeta(m=>({...m,descricao:e.target.value}))} placeholder="Contexto e critérios de sucesso..."/>
                        </div>
                    </div>
                </div>
                <div className="modal-footer">
                    <button className="btn btn-outline" onClick={()=>setShowNova(false)}>Cancelar</button>
                    <button className="btn btn-primary" onClick={salvarNovaMeta}>💾 Criar Meta</button>
                </div>
            </div>
        </div>}
    </>;
}

// ============================================================
// APP
// ============================================================
function App(){
    const [usuario,setUsuario]=useState(USUARIO);
    function logout(){TOKEN=null;USUARIO=null;localStorage.removeItem('erp_access');localStorage.removeItem('erp_user');setUsuario(null);}
    if(!usuario) return <Login onLogin={u=>setUsuario(u)}/>;
    return <><Sidebar usuario={usuario} onLogout={logout}/><div className="main"><ModuloMetas usuario={usuario}/></div></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
